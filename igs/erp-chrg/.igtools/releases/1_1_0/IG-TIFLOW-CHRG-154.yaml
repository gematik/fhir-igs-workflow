text: Der E-Rezept-Fachdienst MUSS beim Einstellen einer Nachricht über die HTTP-Operation
  POST auf den Endpunkt /Communication die im HTTP-Request-Body übergebene Communication-Ressource
  gegen das aus der Kommunikationsbeziehung ableitbare zulässige Schema prüfen und
  den Aufruf bei Nicht-Konformität mit dem http-Status-Code 400 ablehnen, damit ausschließlich
  konforme E-Rezept-Nachrichten ausgetauscht werden.
