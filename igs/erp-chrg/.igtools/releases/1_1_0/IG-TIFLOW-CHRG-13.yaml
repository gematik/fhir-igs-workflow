text: "Das E-Rezept-FdV MUSS im Anwendungsfall \"Abrechnungsinformation exportieren\"\
  \ auf Basis der vom E-Rezept-Fachdienst zu einer Prescription-ID heruntergeladenen\
  \ ChargeItem, Verordnungsdatensatz, PKV-Abgabedatensatz und Quittung Ressourcen\n\
  \      <ul>\n        <li>einen Ausdruck erstellen,</li>\n        <li>für den Ausdruck\
  \ ein PDF gemäß PDF/A-3-Standard (ISO 19005-3) erstellen,</li>\n        <li>in das\
  \ Dokument den signierten Verordnungsdatensatz (&#60;Prescription-ID&#62;_verordnung.p7s),\
  \ den signierten PKV-Abgabedatensatz (&#60;Prescription-ID&#62;_abgabedaten.p7s)\
  \ und den signierten Quittung Datensatz (&#60;Prescription-ID&#62;_quittung.p7s)\
  \ gemäß PDF/A-3 einbetten.</li>\n      </ul>"
title: 'E-Rezept-FdV: Abrechnungsinformation exportieren - PDF/A erstellen'
version: 0
