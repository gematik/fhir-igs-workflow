text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-PUT-Operation auf eine konkrete
  über &#60;id&#62; adressierte /ChargeItem/&#60;id&#62; Ressource durch eine abgebende
  LEI eine 256-Bit-Zufallszahl mit einer Mindestentropie von 120 Bit erzeugen, hexadezimal
  kodieren ([0-9a-f]{64}) und diese im zu speichernden ChargeItem als externe ID in
  ChargeItem.identifier:AccessCode als https://gematik.de/fhir/erp/NamingSystem/GEM_ERP_NS_AccessCode
  überschreiben, damit nachfolgende Zugriffe auf diesen Datensatz nur durch Berechtigte
  in Kenntnis des AccessCodes erfolgen.
title: E-Rezept-Fachdienst – Abrechnungsinformation ändern – Apotheke – Generierung
  AccessCode
