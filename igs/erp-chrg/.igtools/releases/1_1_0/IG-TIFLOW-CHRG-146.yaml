text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-Operation DELETE auf den Endpunkt
  /Consent die Ressource löschen, bei der Consent.patient.identifier der KVNR aus
  dem ACCESS_TOKEN im "Authorization"-Header des HTTP-Requests sowie Consent.category.coding.code
  dem in ?category übermittelten Wert entspricht.
