text: Der E-Rezept-Fachdienst MUSS die im HTTP-POST-Operation auf die Ressource Consent
  übertragene Consent-Ressource gegen das FHIR-Profil Consent prüfen und bei Nicht-Konformität
  das Anlegen der Ressource im E-Rezept-Fachdienst mit dem http-Status-Code 400 ablehnen,
  damit nur FHIR-valide Ressourcen in den E-Rezept-Fachdienst hochgeladen werden.
