text: 'Der E-Rezept-Fachdienst MUSS beim Aufruf der Http-POST-Operation auf den Endpunkt
  /ChargeItem das Signaturzertifikats des PKV-Abgabedatensatzes prüfen. Das Signaturzertifikat
  muss anhand der Zertifikatsprüfung für [mathematisch gültig UND zeitlich gültig
  UND online gültig] befunden werden und der Aufruf anderenfalls mit Status 400 abgebrochen
  werden, um ausschließlich authentische Daten zu verwalten.

  Wenn die Abfrage des OCSP-Response für das Signaturzertifikat fehlschlägt, muss
  der HTTP-Request mit dem HTTP-Status-Code 512 abgelehnt werden.'
title: E-Rezept-Fachdienst – Abrechnungsinformation bereitstellen – Prüfung Signaturzertifikat
  PKV-Abgabedatensatz
