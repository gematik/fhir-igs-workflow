text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-PUT-Operation auf eine konkrete
  über <id> adressierte /ChargeItem/<id> Ressource durch eine abgebende LEI die Signatur
  des PKV-Abgabedatensatzes gemäß ETSI_QES prüfen und bei fehlender oder nicht gültiger
  Signatur mit Status 400 und einem Hinweis auf die ungültige Signatur in OperationOutcome
  abbrechen, um ausschließlich authentische Daten zu verwalten.
