text: Der E-Rezept-Fachdienst MUSS beim Aufruf der Http-POST-Operation auf den Endpunkt
  /ChargeItem das im URL-Parameter "secret=..." übertragene Secret gegen das im referenzierten
  Task gespeicherte Secret Task.identifier:Secret als https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_NS_Secret
  prüfen und bei Ungleichheit oder Fehlen des URL-Parameters die Operation mit dem
  HTTP-Fehlercode 403 abbrechen, damit der Zugriff auf diesen Datensatz nur durch
  die berechtigten Apotheke in Kenntnis des Secrets erfolgt.
