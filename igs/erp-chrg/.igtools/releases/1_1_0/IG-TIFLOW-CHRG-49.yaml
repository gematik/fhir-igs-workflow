text: Der E-Rezept-Fachdienst MUSS das Eingrenzen einer Suchanfrage auf /ChargeItem
  über die URL-Parameter gemäß https://www.hl7.org/fhir/chargeitem.html#search mindestens
  für die Attribute ChargeItem.enteredDate und ChargeItem.meta.__lastUpdated erlauben,
  damit Versicherte und Apotheken eine Suche nach neuen Abrechnungsinformationseinträgen
  durchführen können.
