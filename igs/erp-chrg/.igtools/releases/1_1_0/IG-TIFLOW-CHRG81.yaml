text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-PUT-Operation auf eine konkrete
  über &#60;id&#62; adressierte /ChargeItem/&#60;id&#62; Ressource durch eine abgebende
  LEI den im containedBinary übermittelten PKV-Abgabedatensatz herauslösen und entfernen,
  die Ressource zur ChargeItem-Ressource speichern und in ChargeItem.supportingInformation:dispenseItem
  die Referenz hinzufügen.
