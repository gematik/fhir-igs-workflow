text: "Das E-Rezept-FdV MUSS im Anwendungsfall \"Abrechnungsinformation markieren\"\
  \ es dem Nutzer ermöglichen, eine oder mehrere der folgenden Inhalte als Markierung\
  \ für eine Abrechnungsinformation zu wählen oder abzuwählen:\n      <ul>\n     \
  \   <li>zur Abrechnung bei Krankenversicherung eingereicht (extention \"insuranceProvider\"\
  )</li>\n        <li>zur Abrechnung bei der Beihilfe eingereicht (extention \"subsity\"\
  )</li>\n        <li>zur Einreichung beim Finanzamt verwendet (extention \"taxOffice\"\
  )</li>\n      </ul>"
