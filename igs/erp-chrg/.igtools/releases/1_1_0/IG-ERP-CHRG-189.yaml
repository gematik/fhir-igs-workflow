text: Der E-Rezept-Fachdienst MUSS beim Aufruf der Http-POST-Operation auf den Endpunkt
  /ChargeItem sicherstellen, dass der zum Task zugehörige Verordnungsdatensatz unter
  Coverage.type.coding.code den Wert "PKV" enthält und bei fehlgeschlagener Prüfung
  mit dem HTTP-Fehlercode 400 abbrechen, damit nur eine Abrechnungsinformation für
  E-Rezepte mit zulässigen Kostenträger angelegt wird.
