text: Der E-Rezept-Fachdienst MUSS ein Signatur-Zertifikat einer nonQES-Signatur einer
  Leistungserbringerinstitution gemäß gemSpec_PKI#TUC_PKI_018 mit den Parametern oid_smc_b_osig,
  intendedKeyUsage nonRepudiation, intendedExtendedKeyUsage leer, OCSP-Graceperiod
  12 Stunden, Offline-Modus nein, Prüfmodus OCSP auf Gültigkeit prüfen. Die OCSP-Response
  darf 12 Stunden zwischengespeichert werden.
