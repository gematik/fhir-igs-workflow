text: Das E-Rezept-FdV MUSS im Anwendungsfall "Abrechnungsinformation-Token einer
  Apotheke übermitteln" es dem Nutzer ermöglichen, ein E-Rezept auszuwählen, um den
  zugehörigen Abrechnungsinformation-Token der Apotheke, welche den PKV-Abgabedatensatz
  bereitgestellt hat, mittels einer Nachricht zu übermitteln und die Apotheke somit
  für das Ändern des PKV-Abgabedatensatzes zu berechtigen.
title: 'E-Rezept-FdV: Abrechnungsinformation-Token übermitteln - E-Rezept auswählen'
