text: Der E-Rezept-Fachdienst DARF beim Aufruf der HTTP-PUT-Operation auf eine konkrete
  über &#60;id&#62; adressierte /ChargeItem/&#60;id&#62; Ressource durch eine abgebende
  LEI das in "ChargeItem.supportingInformation" referenzierte Element "https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_Bundle"
  und den Identifier ChargeItem.identifier:AccessCode NICHT in den Response übernehmen,
  sodass die abgebende LEI nicht die Quittung und AccessCode erhält.
title: E-Rezept-Fachdienst – Abrechnungsinformation ändern – Apotheke – kein AccessCode
  und Quittung
