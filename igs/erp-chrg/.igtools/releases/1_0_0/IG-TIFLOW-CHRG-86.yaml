text: "Der TI-Flow-Fachdienst MUSS die im HTTP-PUT-Operation auf die Ressource ChargeItem\
  \ übertragene ChargeItem-Ressource gegen das FHIR-Profil ChargeItem prüfen, auf\
  \ die Zulässigkeit der änderbaren Felder prüfen: \n<ul>\n <li>abgebende LEI: darf\
  \ nur PKV-Abgabedatensatz ändern </li>\n</ul>\nund bei fehlerhafter Prüfung die\
  \ Operation mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"border:\
  \ 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>400\
  \ - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n\
  \ <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>SVC_VALIDATION_FAILED</td>\n </tr>\n <tr>\n <th>Details Text</th>\n <td>FHIR\
  \ Profile Validation Failed</td>\n </tr>\n </table> \n abbrechen, damit kein Schadcode\
  \ und keine fachfremden Daten in den TI-Flow-Fachdienst hochgeladen werden."
title: TI-Flow-Fachdienst - Abrechnungsinformation ändern - FHIR-Validierung ChargeItem
version: 1
