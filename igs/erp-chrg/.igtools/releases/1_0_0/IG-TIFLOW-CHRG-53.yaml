text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf eine konkreten\
  \ über &#60;id&#62; adressierte /ChargeItem/&#60;id&#62; Ressource durch eine abgebende\
  \ Leistungserbringerinstitution, den im URL-Parameter \"?ac=...\" übertragenen AccessCode\
  \ gegen den im referenzierten ChargeItem gespeicherten AccessCode ChargeItem.identifier:AccessCode\
  \ als https://gematik.de/fhir/erp/NamingSystem/GEM_ERP_NS_AccessCode prüfen und\
  \ bei Ungleichheit oder Fehlen des URL-Parameters die Operation mit dem folgenden\
  \ Fehler:\n <table id=\"error-code\" style=\"border: 1px solid black; border-collapse:\
  \ collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>403 - Forbidden</td>\n </tr>\n\
  \ <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n\
  \ </tr>\n <tr>\n <th>Details Code</th>\n <td>TIFLOW_ACCESSCODE_MISMATCH</td>\n </tr>\n\
  \ <tr>\n <th>Details Text</th>\n <td>-</td>\n </tr>\n </table> \n abbrechen, damit\
  \ Zugriffe auf diesen Datensatz nur durch Berechtigte in Kenntnis des AccessCodes\
  \ erfolgen."
title: TI-Flow-Fachdienst - Abrechnungsinformation abrufen - Apotheke - Prüfung AccessCode
version: 1
