text: Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf eine konkreten
  über &#60;id&#62; adressierte /ChargeItem/&#60;id&#62; Ressource durch eine abgebende
  Leistungserbringerinstitution, den im URL-Parameter "?ac=..." übertragenen AccessCode
  gegen den im referenzierten ChargeItem gespeicherten AccessCode ChargeItem.identifier:AccessCode
  als https://gematik.de/fhir/erp/NamingSystem/GEM_ERP_NS_AccessCode prüfen und bei
  Ungleichheit oder Fehlen des URL-Parameters die Operation mit dem HTTP-Fehlercode
  403 abbrechen, damit Zugriffe auf diesen Datensatz nur durch Berechtigte in Kenntnis
  des AccessCodes erfolgen.
title: TI-Flow-Fachdienst – Abrechnungsinformation abrufen – Apotheke – Prüfung AccessCode
