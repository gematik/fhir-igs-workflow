text: Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-PUT-Operation auf eine konkrete
  über &#60;id&#62; adressierte /ChargeItem/&#60;id&#62; Ressource durch eine abgebende
  Leistungserbringerinstitution (Apotheke) den im URL-Parameter "?ac=..." übertragenen
  AccessCode gegen den im referenzierten ChargeItem gespeicherten AccessCodeChargeItem.identifier:AccessCode
  als https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_AccessCode prüfen
  und bei Ungleichheit oder Fehlen des URL-Parameters die Operation mit dem HTTP-Fehlercode
  403 abbrechen, damit Zugriffe auf diesen Datensatz nur durch Berechtigte in Kenntnis
  des AccessCodes erfolgen.
title: TI-Flow-Fachdienst – Abrechnungsinformation ändern – Apotheke – Prüfung AccessCode
