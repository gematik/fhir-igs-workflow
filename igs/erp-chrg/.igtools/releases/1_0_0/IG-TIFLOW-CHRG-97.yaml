text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der Http-POST-Operation auf den Endpunkt\
  \ /ChargeItem das Signaturzertifikats des PKV-Abgabedatensatzes prüfen und, wenn\
  \ die Abfrage des OCSP-Response für das Signaturzertifikat fehlschlägt, die Operation\
  \ mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"border: 1px solid\
  \ black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>512 - OCSP\
  \ Backend Error</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n\
  \ <tr>\n <th>Code</th>\n <td>transient</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_OCSP_BACKEND_ERROR</td>\n </tr>\n <tr>\n <th>Details Text</th>\n <td>-</td>\n\
  \ </tr>\n </table> \n abbrechen."
title: TI-Flow-Fachdienst – Abrechnungsinformation bereitstellen – Prüfung Signaturzertifikat
  PKV-Abgabedatensatz
