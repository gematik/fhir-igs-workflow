text: Der TI-Flow-Fachdienst DARF beim Aufruf der Operation GET /ChargeItem/&#60;id&#62;
  durch eine abgebende Leistungserbringerinstitution das in ChargeItem.supportingInformation
  referenzierte Element ChargeItem.supportingInformation:receiptBundle und den Identifier
  ChargeItem.identifier:AccessCode NICHT in den Response übernehmen, sodass die abgebende
  LEI nur den Verordnungsdatensatz und durch sie änderbaren PKV-Abgabedatensatz erhält.
title: TI-Flow-Fachdienst - Abrechnungsinformation abrufen - Apotheke - kein AccessCode
  und Quittung
