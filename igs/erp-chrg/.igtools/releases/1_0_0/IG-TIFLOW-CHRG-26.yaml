text: "Das PS der abgebenden LEI MUSS im Anwendungsfall \"Abrechnungsinformation bereitstellen\"\
  \ die HTTP-Operation POST /ChargeItem/ des E-Rezept-Fachdienstes mit\n      <ul>\n\
  \        <li>ACCESS_TOKEN im Authorization-Header</li>\n        <li>Task-ID als\
  \ URL-Parameter ?task=</li>\n        <li>Geheimnis in URL-Parameter ?secret=</li>\n\
  \        <li>ChargeItem im http-Body des Aufrufs als data</li>\n      </ul>\n  \
  \    ausführen."
