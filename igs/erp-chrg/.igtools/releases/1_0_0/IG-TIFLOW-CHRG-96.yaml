text: "Der TI-Flow-Fachdienst MUSS beim Einstellen einer Nachricht der Profile GEM_ERPCHRG_PR_Communication_ChargChangeReq\
  \ oder GEM_ERPCHRG_PR_Communication_ChargChangeReply über die HTTP-Operation POST\
  \ auf den Endpunkt /Communication prüfen und, wenn Communication.basedOn eine nicht\
  \ existierende ChargeItem Ressource referenziert, mit dem folgenden Fehler:\n <table\
  \ id=\"error-code\" style=\"border: 1px solid black; border-collapse: collapse;\"\
  >\n <tr>\n <th>HTTP-Code</th>\n <td>400 - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n\
  \ <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n\
  \ <th>Details Code</th>\n <td>TIFLOW_CHARGEITEM_NOT_FOUND</td>\n </tr>\n <tr>\n\
  \ <th>Details Text</th>\n <td>-</td>\n </tr>\n </table> \n abbrechen, um Spam und\
  \ nicht-rezeptbezogene Kommunikation zu verhindern."
title: TI-Flow-Fachdienst – Nachricht einstellen – Prüfung Existenz ChargeItem
version: 1
