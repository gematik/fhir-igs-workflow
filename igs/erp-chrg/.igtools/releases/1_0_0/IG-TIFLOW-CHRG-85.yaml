text: 'Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-PUT-Operation auf eine konkrete
  über &#60;id&#62; adressierte /ChargeItem/&#60;id&#62; Ressource durch eine abgebende
  LEI, das Signaturzertifikats des PKV-Abgabedatensatzes prüfen. Das Signaturzertifikat
  muss anhand der Zertifikatsprüfung für [mathematisch gültig UND zeitlich gültig
  UND online gültig] befunden werden und der Aufruf anderenfalls mit Status 400 und
  einem Hinweis auf das abgelaufene/gesperrte Signaturzertifikat in OperationOutcome
  abgebrochen werden, um ausschließlich authentische Daten zu verwalten.

  Wenn die Abfrage des OCSP-Response für das Signaturzertifikat fehlschlägt, muss
  der HTTP-Request mit dem HTTP-Status-Code 512 abgelehnt werden.'
title: TI-Flow-Fachdienst – Abrechnungsinformation ändern – Apotheke – Prüfung Signaturzertifikat
  PKV-Abgabedatensatz
