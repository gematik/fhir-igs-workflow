text: "Das PS abgebende LEI MUSS im Anwendungsfall \"PKV-Abgabedatensatz ändern\"\
  \ die HTTP-Operation PUT /ChargeItem/&#60;id&#62;/ des TI-Flow-Fachdienstes mit\n\
  \ <ul>\n <li>ACCESS_TOKEN im Authorization-Header</li>\n <li>Prescription-ID in\
