text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-PUT-Operation auf eine konkrete\
  \ über &#60;id&#62; adressierte /ChargeItem/&#60;id&#62; Ressource durch eine abgebende\
  \ LEI die im HTTP-PUT-Operation auf die Ressource ChargeItem übertragene PKV-Abgabedatensatz-Ressource\
  \ gegen das FHIR-Profil PKV-Abgabedatensatz prüfen und bei Nicht-Konformität das\
  \ Anlegen der Ressource im TI-Flow-Fachdienst mit dem folgenden Fehler:\n <table\
  \ id=\"error-code\" style=\"border: 1px solid black; border-collapse: collapse;\"\
  >\n <tr>\n <th>HTTP-Code</th>\n <td>400 - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n\
  \ <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n\
  \ <th>Details Code</th>\n <td>SVC_VALIDATION_FAILED</td>\n </tr>\n <tr>\n <th>Details\
  \ Text</th>\n <td>FHIR Profile Validation Failed</td>\n </tr>\n </table> \n ablehnen,\
  \ damit nur FHIR-valide Ressourcen in den TI-Flow-Fachdienst hochgeladen werden."
title: TI-Flow-Fachdienst – Abrechnungsinformation ändern – Apotheke – FHIR-Validierung
  PKV-Abgabedatensatz
