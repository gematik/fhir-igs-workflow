text: Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-PUT-Operation auf eine konkrete
  über &#60;id&#62; adressierte /ChargeItem/&#60;id&#62; Ressource durch eine abgebende
  LEI die im HTTP-PUT-Operation auf die Ressource ChargeItem übertragene PKV-Abgabedatensatz-Ressource
  gegen das FHIR-Profil PKV-Abgabedatensatz prüfen und bei Nicht-Konformität das Anlegen
  der Ressource im TI-Flow-Fachdienst mit dem http-Status-Code 400 und einem Hinweis
  auf die FHIR-Invalidität in OperationOutcome ablehnen, damit nur FHIR-valide Ressourcen
  in den TI-Flow-Fachdienst hochgeladen werden.
