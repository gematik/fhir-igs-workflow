text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-PUT-Operation auf eine konkrete\
  \ über &#60;id&#62; adressierte /ChargeItem/&#60;id&#62; Ressource durch eine abgebende\
  \ LEI, das Signaturzertifikats des PKV-Abgabedatensatzes prüfen. Wenn die Abfrage\
  \ des OCSP-Response für das Signaturzertifikat fehlschlägt, muss der HTTP-Request\
  \ mit dem folgenden Fehler:\n      <table id=\"error-code\" style=\"border: 1px\
  \ solid black; border-collapse: collapse;\">\n        <tr>\n            <th>HTTP-Code</th>\n\
  \            <td>512 - OCSP Backend Error</td>\n        </tr>\n        <tr>\n  \
  \          <th>Severity</th>\n            <td>error</td>\n        </tr>\n      \
  \  <tr>\n            <th>Code</th>\n            <td>transient</td>\n        </tr>\n\
  \        <tr>\n            <th>Details Code</th>\n            <td>TIFLOW_OCSP_BACKEND_ERROR</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Text</th>\n            <td>-</td>\n\
  \        </tr>\n    </table> \n    abgelehnt werden."
title: TI-Flow-Fachdienst – Abrechnungsinformation ändern – Apotheke – Prüfung Signaturzertifikat
  PKV-Abgabedatensatz
