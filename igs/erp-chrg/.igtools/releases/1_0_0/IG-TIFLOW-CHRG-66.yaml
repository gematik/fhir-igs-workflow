text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der Http-POST-Operation auf den Endpunkt\
  \ /ChargeItem die Signatur des PKV-Abgabedatensatzes gemäß ETSI_QES prüfen und bei\
  \ fehlender oder nicht gültiger Signatur die Operation mit dem folgenden Fehler:\n\
  \ <table id=\"error-code\" style=\"border: 1px solid black; border-collapse: collapse;\"\
  >\n <tr>\n <th>HTTP-Code</th>\n <td>400 - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n\
  \ <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n\
  \ <th>Details Code</th>\n <td>TIFLOW_CHARGEITEM_DISPENSE_SIGNATURE_INVALID</td>\n\
  \ </tr>\n <tr>\n <th>Details Text</th>\n <td>-</td>\n </tr>\n </table> \n abbrechen,\
  \ um ausschließlich authentische Daten zu verwalten."
title: TI-Flow-Fachdienst – Abrechnungsinformation bereitstellen – Signaturprüfung
  PKV-Abgabedatensatz
