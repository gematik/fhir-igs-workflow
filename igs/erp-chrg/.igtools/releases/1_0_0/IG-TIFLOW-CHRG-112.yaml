text: Der E-Rezept-Fachdienst DARF beim Aufruf der Operation GET /ChargeItem/<id>
  durch eine abgebende Leistungserbringerinstitution das in ChargeItem.supportingInformation
  referenzierte Element ChargeItem.supportingInformation:receipt und den Identifier
  Task.identifier:AccessCode NICHT in den Response übernehmen, sodass die abgebende
  LEI nur den Verordnungsdatensatz und den durch sie änderbaren PKV-Abgabedatensatz
  erhält.
title: E-Rezept-Fachdienst – Abrechnungsinformation abrufen – Apotheke – kein AccessCode
  und Quittung
