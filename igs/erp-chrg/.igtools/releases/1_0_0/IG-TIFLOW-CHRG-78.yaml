text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der Http-PUT-Operation auf eine konkrete\
  \ über &#60;id&#62; adressierte /ChargeItem/&#60;id&#62; Ressource sicherstellen,\
  \ dass ausschließlich Nutzer in einer der Rollen \n <ul>\n <li>oid_oeffentliche_apotheke</li>\n\
  \ <li>oid_krankenhausapotheke</li>\n </ul>\n die Operation am TI-Flow-Fachdienst\
  \ aufrufen dürfen und die Rolle \"professionOID\" des Aufrufers im ACCESS_TOKEN\
  \ im HTTP-RequestHeader \"Authorization\" feststellen, damit eine Abrechnungsinformation\
  \ nicht durch Unberechtigte aktualisiert werden kann."
title: TI-Flow-Fachdienst – Abrechnungsinformation ändern – Rollenprüfung
