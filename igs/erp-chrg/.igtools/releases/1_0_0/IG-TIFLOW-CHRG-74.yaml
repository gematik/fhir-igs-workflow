text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-Operation PATCH auf den Endpunkt\
  \ /ChargeItem ohne Angabe einer &#60;id&#62; für eine konkrete Ressource die Operation\
  \ mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"border: 1px solid\
  \ black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>405 - Method\
  \ Not Allowed</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n\
  \ <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_CHARGEITEM_ID_REQUIRED</td>\n </tr>\n <tr>\n <th>Details Text</th>\n\
  \ <td>-</td>\n </tr>\n </table> \n abbrechen, um das Ändern mehrerer Ressourcen\
  \ über einen Request zu verhindern."
title: TI-Flow-Fachdienst - Abrechnungsinformation ändern (PATCH) - alles Ändern verbieten
