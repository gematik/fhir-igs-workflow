text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-Operation DELETE auf den Endpunkt
  /Consent prüfen, dass der für ?category angegebene Wert im System https://gematik.de/fhir/erpchrg/CodeSystem/GEM_ERPCHRG_CS_ConsentType
  enthalten ist und bei fehlerhafter Prüfung den Request mit dem Fehler 400 abbrechen,
  damit nur Löschrequests für definierte Consent-Typen ausgeführt werden.
