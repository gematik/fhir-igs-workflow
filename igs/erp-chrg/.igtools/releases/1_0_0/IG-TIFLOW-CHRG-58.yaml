text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der Http-POST-Operation auf den Endpunkt\
  \ /ChargeItem sicherstellen, dass zu der im URL-Parameter \"task=...\" übertragene\
  \ Task-ID eine Task-Ressource mit dem Status Task.status = completed existiert und\
  \ bei fehlgeschlagener Prüfung mit dem folgenden Fehler:\n <table id=\"error-code\"\
  \ style=\"border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>409 - Conflict</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_TASK_NOT_FOUND</td>\n </tr>\n <tr>\n <th>Details Text</th>\n <td>-</td>\n\
  \ </tr>\n </table> \n abbrechen, damit nur eine Abrechnungsinformation für E-Rezepte\
  \ mit dem Status „quittiert“ angelegt wird."
title: TI-Flow-Fachdienst – Abrechnungsinformation bereitstellen – Prüfung Existenz
  Task
version: 1
