text: "Das E-Rezept-FdV MUSS im Anwendungsfall \"Abrechnungsinformation markieren\"\
  \ zum Speichern der Information im TI-Flow-Fachdienst die HTTP-Operation PATCH /ChargeItem/&#60;id&#62;\
  \ mit \n <ul>\n <li>ACCESS_TOKEN im Authorization-Header</li>\n <li>Prescription-ID\
  \ in URL &#60;id&#62;</li>\n </ul>\n für jede zu ändernde Markierung\n <ul>\n <li>\"\
  add\" in type</li>\n <li>zu ändernde Markierung in path</li>\n <li>geänderter Wert\
  \ in value</li>\n </ul>\n ausführen."
