text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der Http-PATCH-Operation auf eine konkrete\
  \ über &#60;id&#62; adressierte /ChargeItem/&#60;id&#62; Ressource sicherstellen,\
  \ dass ausschließlich Nutzer in der Rolle oid_versicherter die Operation am TI-Flow-Fachdienst\
  \ aufrufen dürfen und die Rolle \"professionOID\" des Aufrufers im ACCESS_TOKEN\
  \ im HTTP-RequestHeader \"Authorization\" feststellen, und bei Abweichungen mit\
  \ dem folgenden Fehler:\n <table id=\"error-code\" style=\"border: 1px solid black;\
  \ border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>403 - Forbidden</td>\n\
  \ </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n\
  \ <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n <td>TIFLOW_AUTH_ROLE_NOT_ALLOWED</td>\n\
  \ </tr>\n <tr>\n <th>Details Text</th>\n <td>Der Nutzer ist nicht berechtigt, die\
  \ aufgerufene Operation anzufordern</td>\n </tr>\n </table> \n abrechen, damit eine\
  \ Abrechnungsinformation nicht durch Unberechtigte aktualisiert werden kann."
title: TI-Flow-Fachdienst – Abrechnungsinformation ändern (PATCH) – Rollenprüfung
version: 1
