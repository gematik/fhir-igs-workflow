text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-PATCH-Operation auf eine konkrete\
  \ über &#60;id&#62; adressierte /ChargeItem/&#60;id&#62; Ressource durch einen Versicherten,\
  \ den Versicherten anhand des zeta-user-info.identifier des Nutzers (KVNR) identifizieren,\
  \ diese gegen die im gespeicherten Datensatz in ChargeItem.subject.identifier hinterlegte\
  \ KVNR des begünstigten Versicherten prüfen und bei Ungleichheit die Operation mit\
  \ dem folgenden Fehler:\n <table id=\"error-code\" style=\"border: 1px solid black;\
  \ border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>403 - Forbidden</td>\n\
  \ </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n\
  \ <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n <td>SVC_IDENTITY_MISMATCH</td>\n\
  \ </tr>\n <tr>\n <th>Details Text</th>\n <td>Identity mismatch: Access token or\
  \ x-insurantid header does not match FHIR data (Telematik-ID / KVNR)</td>\n </tr>\n\
  \ </table> \n abbrechen, damit ausschließlich der begünstigte Versicherte eine Abrechnungsinformation\
  \ ändert."
title: TI-Flow-Fachdienst - Abrechnungsinformation ändern (PATCH) - Versicherter -
  Prüfung KVNR
version: 1
