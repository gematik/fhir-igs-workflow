text: "Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf eine konkrete\
  \ über &#60;id&#62; adressierte /ChargeItem/&#60;id&#62; Ressource sicherstellen,\
  \ dass ausschließlich Versicherte oder Apotheken in den Rollen \n    <ul>\n    \
  \    <li>oid_versicherter</li>\n        <li>oid_oeffentliche_apotheke</li>\n   \
  \     <li>oid_krankenhausapotheke</li> \n    </ul>\n    die Operation am E-Rezept-Fachdienst\
  \ aufrufen dürfen und die Rolle \"professionOID\" des Aufrufers im ACCESS_TOKEN\
  \ im HTTP-RequestHeader \"Authorization\" feststellen, damit E-Rezepte nicht durch\
  \ Unberechtigte ausgelesen werden können."
title: E-Rezept-Fachdienst – Abrechnungsinformation abrufen – Rollenprüfung Versicherter
  oder Apotheker
