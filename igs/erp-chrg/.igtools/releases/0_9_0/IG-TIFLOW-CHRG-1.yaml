text: "Das E-Rezept-FdV MUSS im Anwendungsfall \"Abrechnungsinformation-Token einer\
  \ Apotheke übermitteln\" eine FHIR Ressource Communication des Profils https://gematik.de/fhir/erpchrg/StructureDefinition/GEM_ERPCHRG_PR_Communication_ChargChangeReq\
  \ mit \n    <ul>\n        <li>Telematik-ID der ausgewählten abgebenden LEI in recipient</li>\n\
  \        <li>Textnachricht in payload contentString</li>\n        <li>E-Rezept-Token\
  \ in basedOn reference auf Task inkl. AccessCode als \"/ChargeItem/&#60;id&#62;?ac=...\"\
  </li>\n    </ul> \n    erstellen."
