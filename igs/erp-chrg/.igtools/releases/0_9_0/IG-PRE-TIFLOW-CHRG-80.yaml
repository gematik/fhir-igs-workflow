text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-PUT-Operation auf eine konkrete
  über &#60;id&#62; adressierte /ChargeItem/&#60;id&#62; Ressource durch eine abgebende
  Leistungserbringerinstitution (Apotheke), diese anhand der Telematik-ID aus dem
  ACCESS_TOKEN im "Authorization"-Header des HTTP-Requests identifizieren, diese gegen
  die im gespeicherten Datensatz in ChargeItem.enterer.identifier hinterlegte Telematik-ID
  prüfen und bei Ungleichheit den Aufruf mit dem HTTP-Fehlercode 403 abweisen, damit
  ausschließlich die Apotheke, welche die Abrechnungsinformation bereitgestellt hat,
  diese ändert.
title: E-Rezept-Fachdienst – Abrechnungsinformation ändern – Apotheke – Prüfung Telematik-ID
