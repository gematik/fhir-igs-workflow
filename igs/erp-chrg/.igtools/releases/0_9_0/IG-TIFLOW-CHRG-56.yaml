text: "Der E-Rezept-Fachdienst MUSS beim Aufruf der Http-POST-Operation auf den Endpunkt\
  \ /ChargeItem sicherstellen, dass ausschließlich Nutzer in einer der Rollen \n \
  \   <ul>\n        <li>oid_oeffentliche_apotheke</li>\n        <li>oid_krankenhausapotheke</li>\n\
  \    </ul>\n    die Operation am E-Rezept-Fachdienst aufrufen dürfen und die Rolle\
  \ \"professionOID\" des Aufrufers im ACCESS_TOKEN im HTTP-RequestHeader \"Authorization\"\
  \ feststellen, damit eine Abrechnungsinformation nicht durch Unberechtigte eingestellt\
  \ werden kann."
title: E-Rezept-Fachdienst – Abrechnungsinformation bereitstellen – Rollenprüfung
