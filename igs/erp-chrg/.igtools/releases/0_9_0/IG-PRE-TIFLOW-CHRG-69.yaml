text: Der E-Rezept-Fachdienst MUSS beim Aufruf der Http-POST-Operation auf den Endpunkt
  /ChargeItem das Quittung-Bundle vom Profil GEM_ERP_PR_Bundle ohne die Signatur zur
  im URL-Parameter "task=..." übertragenen Task-ID identifizieren und zur ChargeItem-Ressource
  mit dem Identifier PrescriptionID speichern und in ChargeItem.supportingInformation:receipt
  die Referenz hinzufügen.
