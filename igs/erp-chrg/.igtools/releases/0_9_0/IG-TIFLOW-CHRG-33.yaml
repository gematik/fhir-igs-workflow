  \        <li>UC 3.12 - Abrechnungsinformationen durch den Versicherten markieren</li>\n\
  \        <li>UC 3.11 - Abrechnungsinformationen durch den Versicherten löschen</li>\n\
  \        <li>Berechtigen der Apotheke zum Ändern des PKV-Abgabedatensatzes</li>\n\
  \    </ul>\n    umsetzen."
