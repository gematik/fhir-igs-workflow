text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der Http-POST-Operation auf den Endpunkt\
  \ /ChargeItem sicherstellen, dass der zum Task zugehörige Verordnungsdatensatz unter\
  \ Coverage.type.coding.code den Wert \"PKV\" enthält und bei fehlgeschlagener Prüfung\
  \ mit dem folgenden Fehler:\n      <table id=\"error-code\" style=\"border: 1px\
  \ solid black; border-collapse: collapse;\">\n        <tr>\n            <th>HTTP-Code</th>\n\
  \            <td>400 - Bad Request</td>\n        </tr>\n        <tr>\n         \
  \   <th>Severity</th>\n            <td>error</td>\n        </tr>\n        <tr>\n\
  \            <th>Code</th>\n            <td>invalid</td>\n        </tr>\n      \
  \  <tr>\n            <th>Details Code</th>\n            <td>TIFLOW_CHARGEITEM_COVERAGE_NOT_PKV</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Text</th>\n            <td>-</td>\n\
  \        </tr>\n    </table> \n    abbrechen, damit nur eine Abrechnungsinformation\
  \ für E-Rezepte mit zulässigen Kostenträger angelegt wird."
title: TI-Flow-Fachdienst - Abrechnungsinformation bereitstellen - Prüfung Flowtype
