text: "Der TI-Flow-Fachdienst MUSS die im HTTP-POST-Operation auf die Ressource ChargeItem\
  \ übertragene ChargeItem-Ressource gegen das FHIR-Profil ChargeItem prüfen und \n\
  \    <ul>\n    <li>die Korrektheit der Rezept-ID (GEM_ERP_PR_PrescriptionId) im\
  \ referenzierten Task als ChargeItem.identifier, </li>\n    <li>die Korrektheit\
  \ der Versicherten-ID des Versicherten im referenzierten Task (Task.for) gegen ChargeItem.subject.identifier\
  \ </li>\n    <li>und die Korrektheit der Telematik-ID der Apotheke gemäß Nutzerinformation\
  \ (zeta-user-info.identifier) mit dem Wert in ChargeItem.enterer.identifier</li>\n\
  \    </ul>\n    prüfen und bei Nicht-Konformität die Operation mit dem folgenden\
  \ Fehler:\n      <table id=\"error-code\" style=\"border: 1px solid black; border-collapse:\
  \ collapse;\">\n        <tr>\n            <th>HTTP-Code</th>\n            <td>400\
  \ - Bad Request</td>\n        </tr>\n        <tr>\n            <th>Severity</th>\n\
  \            <td>error</td>\n        </tr>\n        <tr>\n            <th>Code</th>\n\
  \            <td>invalid</td>\n        </tr>\n        <tr>\n            <th>Details\
  \ Code</th>\n            <td>SVC_VALIDATION_FAILED</td>\n        </tr>\n       \
  \ <tr>\n            <th>Details Text</th>\n            <td>FHIR Profile Validation\
  \ Failed</td>\n        </tr>\n    </table> \n    abbrechen, damit nur FHIR-valide\
  \ Ressourcen in den TI-Flow-Fachdienst hochgeladen werden."
title: TI-Flow-Fachdienst - Abrechnungsinformation bereitstellen - FHIR-Validierung
  ChargeItem
version: 0
