text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-PUT-Operation auf eine konkrete\
  \ über &#60;id&#62; adressierte /ChargeItem/&#60;id&#62; Ressource durch eine abgebende\
  \ Leistungserbringerinstitution (Apotheke), diese anhand des zeta-user-info.identifier\
  \ des Nutzers (Telematik-ID) identifizieren, diese gegen die im gespeicherten Datensatz\
  \ in ChargeItem.enterer.identifier hinterlegte Telematik-ID prüfen und bei Ungleichheit\
  \ die Operation mit dem folgenden Fehler:\n      <table id=\"error-code\" style=\"\
  border: 1px solid black; border-collapse: collapse;\">\n        <tr>\n         \
  \   <th>HTTP-Code</th>\n            <td>403 - Forbidden</td>\n        </tr>\n  \
  \      <tr>\n            <th>Severity</th>\n            <td>error</td>\n       \
  \ </tr>\n        <tr>\n            <th>Code</th>\n            <td>invalid</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Code</th>\n            <td>SVC_IDENTITY_MISMATCH</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Text</th>\n            <td>Identity\
  \ mismatch: Access token or x-insurantid header does not match FHIR data (Telematik-ID\
  \ / KVNR)</td>\n        </tr>\n    </table> \n    abbrechen, damit ausschließlich\
  \ die Apotheke, welche die Abrechnungsinformation bereitgestellt hat, diese ändert."
title: TI-Flow-Fachdienst - Abrechnungsinformation ändern - Apotheke - Prüfung Telematik-ID
version: 0
