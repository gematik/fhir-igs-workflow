# Versicherter Use Cases
- id: UC_3_10_Abrechungsinformationen_durch_Versicherten_abrufen
  anchor: uc_3_10_abrechungsinformationen_durch_versicherten_abrufen
  link: menu-technische-umsetzung-anwendungsfaelle.html#uc_3_10_abrechungsinformationen_durch_versicherten_abrufen
  title: "UC 3.10 - Abrechnungsinformationen durch Versicherten abrufen"
  roles: ["Versicherter"]
  description: |
    Der Versicherte ruft die Abrechnungsinformationen aus dem E-Rezept-Fachdienst ab
    und kann sie anzeigen, exportieren oder weiterleiten.
  preconditions: |
    - Einwilligung liegt vor.
    - Abrechnungsinformationen wurden durch eine Apotheke bereitgestellt.
  actions: |
    - Liste per GET /ChargeItem abrufen.
    - Detailabruf via GET /ChargeItem/&#60;id&#62; durchführen.
    - Fachdienst signiert Datensätze beim Detailabruf.
  postconditions: |
    - Daten stehen im FdV zur Anzeige und zum Export bereit; Abruf ist protokolliert.
  interface: |
    - [Abrechnungsinformation abrufen](./query-api-chargeitem.html#get-chargeitem-liste)
  diagram: seq-uc-3-10-abrechungsinformationen-durch-versicherten-abrufen

- id: Abrechungsinformationen_durch_Versicherten_weitergeben
  anchor: abrechungsinformationen_durch_versicherten_weitergeben
  link: menu-technische-umsetzung-anwendungsfaelle.html#abrechungsinformationen_durch_versicherten_weitergeben
  title: "Abrechnungsinformationen durch den Versicherten weitergeben"
  roles: ["Versicherter"]
  description: |
    Der Versicherte gibt die Abrechnungsinformation aus dem E-Rezept-FdV heraus an eine 
    Ziel-App weiter (z. B. Service-App der Krankenversicherung, Service-App der Beihilfe) oder exportiert sie als PDF/A.
  preconditions: |
    - Der Versicherte hat über das E-Rezept-FdV die Abrechnungsinformation vom E-Rezept-Fachdienst abgerufen.
  actions: |
    - Das FdV erstellt eine PDF/A-Datei mit der eingebetteten Abrechnungsinformation.
    - Das FdV übergibt die PDF/A-Datei an die Ziel-App oder bietet sie zum Download an.
  postconditions: |
    - Die Abrechnungsinformation ist in der Ziel-App übertragen.
  interface: |
    - [Abrechnungsinformation weitergeben](./menu-technische-umsetzung-chargeitem-req-fdv.html#abrechnungsinformationen-exportieren)
  diagram: seq-abrechnungsinformation-weitergeben

- id: UC_3_12_Abrechungsinformation_durch_Versicherten_markieren
  anchor: uc_3_12_abrechungsinformation_durch_versicherten_markieren
  link: menu-technische-umsetzung-anwendungsfaelle.html#uc_3_12_abrechungsinformationen_durch_versicherten_markieren
  title: "Abrechnungsinformationen durch den Versicherten markieren"
  roles: ["Versicherter"]
  description: |
    Der Versicherte markiert die Abrechnungsinformation im E-Rezept-FdV, um sie für bestimmte Aktionen zu kennzeichnen. Der E-Rezept-Fachdienst speichert die Markierung und stellt sie bei Abruf der Abrechnungsinformation bereit.
  preconditions: |
    - Eine LEI hat den Anwendungsfall "Abrechnungsinformation durch Abgebenden bereitstellen" für das E-Rezept durchgeführt. Die Abrechnungsinformation ist auf dem E-Rezept-Fachdienst gespeichert.
    - Der Versicherte hat sich über den Anwendungsfall "Abrufen der Abrechnungsinformation durch den Versicherten" die zu markierende Abrechnungsinformation herausgesucht.
  actions: |
    - Ein Versicherter wählt im E-Rezept-FdV die zu markierende Abrechnungsinformation sowie die zu Optionen für die Markierung aus.
    - Der E-Rezept-Fachdienst speichert die Information.
  postconditions: |
    - Die Information zur Markierung ist im E-Rezept-Fachdienst gespeichert. Der Datenzugriff ist im E-Rezept-Fachdienst protokolliert.
  interface: |
    - [Abrechnungsinformation markieren](./menu-technische-umsetzung-chargeitem-req-fdv.html#abrechnungsinformationen-markieren)
  diagram: seq-uc-3-12-abrechungsinformation-durch-versicherten-markieren

- id: UC_3_11_Abrechungsinformation_durch_Versicherten_löschen
  anchor: uc_3_11_abrechungsinformation_durch_versicherten_löschen
  link: menu-technische-umsetzung-anwendungsfaelle.html#uc_3_11_abrechungsinformation_durch_versicherten_löschen
  title: "Abrechnungsinformationen durch den Versicherten löschen"
  roles: ["Versicherter"]
  description: |
    Ein Versicherter wählt im E-Rezept-FdV die zu löschende Abrechnungsinformation aus und bestätigt das Löschen. Das FdV überträgt den Lösch-Request. Der E-Rezept-Fachdienst löscht die Abrechnungsinformation
  preconditions: |
    - Eine LEI hat den Anwendungsfall "Abrechnungsinformation durch Abgebenden bereitstellen" für das E-Rezept durchgeführt.
    - Der Versicherte hat sich über den Anwendungsfall "Abrufen der Abrechnungsinformation durch den Versicherten" die Abrechnungsinformation auf sein FdV heruntergeladen.
  actions: |
    - Ein Versicherter wählt im E-Rezept-FdV die zu löschende Abrechnungsinformation aus und bestätigt das Löschen.
    - Das E-Rezept-FdV überträgt den Löschrequest
    - Der E-Rezept-Fachdienst löscht die Abrechnungsinformation.
  postconditions: |
    - Die Abrechnungsinformation sind auf dem E-Rezept-Fachdienst gelöscht. Das Löschen ist im E-Rezept-Fachdienst protokolliert.
  interface: |
    - [Abrechnungsinformation löschen](./menu-technische-umsetzung-chargeitem-req-fdv.html#abrechnungsinformationen-löschen)
  diagram: seq-uc-3-11-abrechungsinformation-durch-versicherten-loeschen

- id: accesscode-an-apotheke-übermitteln
  core-uc: UC_3_3_Nachricht_durch_Versicherten_uebermitteln
  anchor: accesscode-an-apotheke-übermitteln
  link: menu-technische-umsetzung-anwendungsfaelle.html#accesscode-an-apotheke-übermitteln
  title: "Berechtigen der Apotheke zum Ändern des PKV-Abgabedatensatzes"
  description: |
    Der Versicherte übermittelt der abgebenden LEI einen AccessCode, um die Apotheke zum Abruf und einmaligen Ändern zu berechtigen. Die Übermittlung erfolgt gemäß dem Anwendungsfall "UC 3.3 - Nachricht durch Versicherten übermitteln".
  preconditions: |
    - Ein Mitarbeiter der abgebenden LEI hat den Anwendungsfall "UC 4.11 - Abrechnungsinformation durch Abgebenden bereitstellen" durchgeführt.
  actions: |
    - Das E-Rezept-FdV erzeugt einen Abrechnungsinformation-Token.
    - Der Versicherte übermittelt den Token per Nachricht (Communication) oder zeigt einen 2D-Code.    
  postconditions: |
    - Das AVS nutzt den AccessCode für Abruf/Änderung der Abrechnungsinformation.