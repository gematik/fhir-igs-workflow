text: "Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mit Flowtype 162 mittels\
  \ HTTP-POST-Operation über /Task/&#60;id&#62;/$activate prüfen, ob die Extension\
  \ Coverage.payor.identifier.extension:alternativeID vorhanden ist und in diesem\
  \ Fall die Operation mit dem folgenden Fehler:\n      <table id=\"error-code\" style=\"\
  border: 1px solid black; border-collapse: collapse;\">\n        <tr>\n         \
  \   <th>HTTP-Code</th>\n            <td>400 - Bad Request</td>\n        </tr>\n\
  \        <tr>\n            <th>Severity</th>\n            <td>error</td>\n     \
  \   </tr>\n        <tr>\n            <th>Code</th>\n            <td>invalid</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Code</th>\n            <td>TIFLOW_ALTERNATIVE_IK_FORBIDDEN</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Text</th>\n            <td>-</td>\n\
  \        </tr>\n    </table> \n    abbrechen, um sicherzustellen, dass dieser Workflow\
  \ nicht für Verordnungen genutzt wird, die zu Lasten von Unfallkassen oder Berufsgenossenschaften\
  \ gehen."
