text: Der TI-Flow-Fachdienst MUSS jeden Aufruf von Operationen gemäß "TAB_DiGA_004
  Versichertenprotokoll" protokollieren und die gelesene bzw. geschriebene Ressource
  im Protokolleintrag AuditEvent.entity.what als Referenz hinzufügen sowie die KVNR
  des betroffenen Versicherten in AuditEvent.entity.name speichern. Mit diesen Informationen
  kann der Versicherte die Zugriffe auf seine Daten nachvollziehen und bei einem unberechtigten
  Zugriff ggf. intervenieren.
