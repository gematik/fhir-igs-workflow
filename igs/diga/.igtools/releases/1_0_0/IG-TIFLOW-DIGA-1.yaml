text: "Der E-Rezept-Fachdienst MUSS beim Zurückweisen eines Tasks mit Flowtype 162\
  \ HTTP-POST-Operation über /Task/&lt;id&gt;/$reject die Rolle \"professionOID\"\
  \ des Aufrufers im ACCESS_TOKEN im HTTP-RequestHeader \"Authorization\" feststellen\
  \ und sicherstellen, dass ausschließlich Institutionen in der Rolle\n  <ul>\n  \
  \  <li>oid_kostentraeger</li>\n  </ul>\n  die Operation am Fachdienst aufrufen,\
  \ damit die Verordnung nicht durch einen Unberechtigten zurückgewiesen werden kann."
title: E-Rezept-Fachdienst - Task zurückweisen - Flowtype 162 - Rollenprüfung
