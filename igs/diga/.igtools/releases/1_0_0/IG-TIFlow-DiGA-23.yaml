text: "<Beschreibung>\n Der E-Rezept-Fachdienst MUSS beim Zurückweisen eines Tasks\
  \ für eine Verordnung mit Flowtype 162 mittels HTTP-POST/$reject-Operation auf den\
  \ in der URL referenzierten/Task/&#60;id&#62; die Rolle \"professionOID\" des Aufrufers\
  \ im ACCESS_TOKEN im HTTP-RequestHeader \"Authorization\" feststellen und sicherstellen,\
  \ dass ausschließlich Institutionen in der Rolle\n <ul>\n <li>oid_kostentraeger</li>\n\
  \ </ul>\n die Operation am Fachdienst aufrufen, damit die Verordnung nicht durch\
  \ einen Unberechtigten zurückgewiesen werden kann.\n </Beschreibung>\n <!-- A_19170-02\
  \ -->"
title: E-Rezept-Fachdienst - Task zurückweisen - Flowtype 162 - Rollenprüfung
