text: "Der E-Rezept-Fachdienst MUSS beim Abrufen eines Tasks für eine Verordnung mit\
  \ Flowtype 162 mittels HTTP-POST/$accept-Operation auf den in der URL referenzierten/Task/&#60;id&#62;\
  \ die Rolle \"professionOID\" des Aufrufers im ACCESS_TOKEN im HTTP-RequestHeader\
  \ \"Authorization\" feststellen und sicherstellen, dass ausschließlich Institutionen\
  \ in der Rolle\n  <ul>\n    <li>oid_kostentraeger</li>\n  </ul>\n  die Operation\
  \ am Fachdienst aufrufen, damit die Verordnung nicht durch einen Unberechtigten\
  \ abgerufen werden kann."
title: E-Rezept-Fachdienst - Task akzeptieren - Flowtype 162 - Rollenprüfung
