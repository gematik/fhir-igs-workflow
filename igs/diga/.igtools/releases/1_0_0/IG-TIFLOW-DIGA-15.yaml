text: "Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mit Flowtype 162 mittels\
  \ HTTP-POST-Operation über /Task/&#60;id&#62;/$activate, wenn die QES gemäß der\
  \ professionOID des Signaturzertifikats des Signierenden nicht von einer Berufsgruppe\
  \ ausgestellt wurde, die einer der folgenden professionOID entspricht:\n <ul>\n\
  \ <li>oid_arzt</li>\n <li>oid_zahnarzt</li>\n <li>oid_psychotherapeut</li>\n <li>oid_ps_psychotherapeut</li>\n\
  \ <li>oid_kuj_psychotherapeut</li>\n </ul>\n die Operation mit dem folgenden Fehler:\n\
  \ <table id=\"error-code\" style=\"border: 1px solid black; border-collapse: collapse;\"\
  >\n <tr>\n <th>HTTP-Code</th>\n <td>400 - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n\
  \ <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n\
  \ <th>Details Code</th>\n <td>TIFLOW_SIGNATURE_INVALID_ISSUING_ROLE</td>\n </tr>\n\
  \ <tr>\n <th>Details Text</th>\n <td>-</td>\n </tr>\n </table> \n abbrechen, damit\
  \ nur solche Leistungserbringer ein signiertes E-Rezept einstellen, die zur Verordnung\
  \ von DiGAs ermächtigt sind."
title: TI-Flow-Fachdienst - Task aktivieren - Flowtype 162 - QES durch berechtigte
  Berufsgruppe
version: 1
