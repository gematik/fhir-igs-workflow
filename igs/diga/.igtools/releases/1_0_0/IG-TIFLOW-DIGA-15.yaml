text: "Der TI-Flow-Fachdienst MUSS die Aktivierung eines Tasks mit Flowtype 162 mit\
  \ dem HTTP-Status-Code 400 abbrechen, wenn die QES gemäß der professionOID des Signaturzertifikats\
  \ des Signierenden nicht von einer Berufsgruppe ausgestellt wurde, die der folgenden\
  \ professionOID entspricht:\n <ul>\n <li>oid_arzt</li>\n <li>oid_zahnarzt</li>\n\
  \ <li>oid_psychotherapeut</li>\n <li>oid_ps_psychotherapeut</li>\n <li>oid_kuj_psychotherapeut</li>\n\
  \ </ul>\n damit nur solche Leistungserbringer ein signiertes E-Rezept einstellen,\
  \ die zur Verordnung von DiGAs ermächtigt sind."
title: TI-Flow-Fachdienst - Task aktivieren - Flowtype 162 - QES durch berechtigte
  Berufsgruppe
