text: "Der TI-Flow-Fachdienst MUSS beim Aktivieren eines Tasks mit Flowtype 162 mittels\
  \ $activate prüfen, dass im Bundle eine <i>DeviceRequest</i>-Ressource und in der\
  \ <i>Composition.type.coding.code=e16D</i> enthalten ist. Der TI-Flow-Fachdienst\
  \ MUSS andernfalls mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"\
  border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>400 - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_FLOWTYPE_MISMATCH</td>\n </tr>\n <tr>\n <th>Details Text</th>\n <td>Für\
  \ diesen Workflowtypen sind nur Verordnungen für Digitale Gesundheitsanwendungen\
  \ zulässig</td>\n </tr>\n </table> \n abbrechen."
title: TI-Flow-Fachdienst - Task aktivieren - Flowtype 162 - Prüfung Verordnung von
  DiGAs
