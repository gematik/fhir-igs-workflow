text: "Der TI-Flow-Fachdienst MUSS beim Abrufen eines Tasks für eine Verordnung mit\
  \ Flowtype 162 mittels HTTP-POST/$accept-Operation auf den in der URL referenzierten/Task/&#60;id&#62;\
  \ die Rolle \"professionOID\" des Aufrufers im ACCESS_TOKEN im HTTP-RequestHeader\
  \ \"Authorization\" feststellen und sicherstellen, dass ausschließlich Institutionen\
  \ in der Rolle\n <ul>\n <li>oid_kostentraeger</li>\n </ul>\n die Operation am Fachdienst\
  \ aufrufen, und bei Abweichungen mit dem folgenden Fehler:\n <table id=\"error-code\"\
  \ style=\"border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>403 - Forbidden</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_AUTH_ROLE_NOT_ALLOWED</td>\n </tr>\n <tr>\n <th>Details Text</th>\n\
  \ <td>Der Nutzer ist nicht berechtigt, die aufgerufene Operation anzufordern</td>\n\
  \ </tr>\n </table> \n abrechen, damit die Verordnung nicht durch einen Unberechtigten\
  \ abgerufen werden kann."
title: TI-Flow-Fachdienst - Task akzeptieren - Flowtype 162 - Rollenprüfung
version: 1
