text: "<Beschreibung>\n Der E-Rezept-Fachdienst MUSS beim Aktivieren eines Task des\
  \ Flowtype Task.extension:flowType = 162 mittels HTTP-POST-Operation über /Task/&#60;id&#62;/$activate\
  \ prüfen, ob die Extension Coverage.payor.identifier.extension:alternativeID vorhanden\
  \ ist und in diesem Fall die Operation mit Http-Fehlercode 400 abbrechen, um sicherzustellen,\
  \ dass dieser Workflow nicht für Verordnungen genutzt wird, die zu Lasten von Unfallkassen\
  \ oder Berufsgenossenschaften gehen.\n </Beschreibung>\n <!-- A_26372 -->"
