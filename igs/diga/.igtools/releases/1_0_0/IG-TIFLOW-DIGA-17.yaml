text: "Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mit Flowtype 162 mittels\
  \ HTTP-POST-Operation über /Task/&#60;id&#62;/$activate den im FHIR Profil KBV_PR_EVDGA_HealthAppRequest\
  \ gespeicherten Wert für .code[x]:codeCodeableConcept.coding.code gemäß den \"Technischen\
  \ Hinweisen zur PZN-Codierung - Prüfziffernberechnungen der PZN, PPN und Basic UDI-DI\"\
  \ beschriebenen Prüfalgorithmus validieren und bei einer fehlerhaften Prüfung die\
  \ Operation mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"border:\
  \ 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>400\
  \ - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n\
  \ <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_EREZEPT_PZN_INVALID</td>\n </tr>\n <tr>\n <th>Details Text</th>\n <td>Ungültige\
  \ PZN: Die übergebene Pharmazentralnummer entspricht nicht den vorgeschriebenen\
  \ Prüfziffer-Validierungsregeln.</td>\n </tr>\n </table> \n abbrechen."
title: TI-Flow-Fachdienst - Task aktivieren - Überprüfung der PZN im Profil KBV_PR_EVDGA_HealthAppRequest
