text: "Der E-Rezept-Fachdienst MUSS beim Löschen eines Tasks für eine Verordnung mit\
  \ Flowtype 162 mittels HTTP-POST/$abort-Operation auf den in der URL referenzierten/Task/&#60;id&#62;\
  \ die Rolle \"professionOID\" des Aufrufers im ACCESS_TOKEN im HTTP-RequestHeader\
  \ \"Authorization\" feststellen und sicherstellen, dass ausschließlich Institutionen\
  \ in der Rolle\n  <ul>\n    <li>oid_versicherter</li>\n    <li>oid_praxis_arzt</li>\n\
  \    <li>oid_zahnarztpraxis</li>\n    <li>oid_krankenhaus</li>\n    <li>oid_praxis_psychotherapeut</li>\n\
  \    <li>oid_institution-vorsorge-reha</li>\n  </ul>\n  die Operation am Fachdienst\
  \ aufrufen, damit die Verordnung nicht durch einen Unberechtigten gelöscht werden\
  \ kann."
title: E-Rezept-Fachdienst - E-Rezept löschen - Flowtype 162 - Rollenprüfung
