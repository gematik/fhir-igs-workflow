text: Der E-Rezept-Fachdienst MUSS beim Aktivieren eines Task des Flowtype Task.extension:flowType
  = 162 mittels HTTP-POST-Operation über /Task/&#60;id&#62;/$activate prüfen, obCoverage.type.coding.code
  nicht mit dem Wert "PKV" belegt ist und im Fehlerfall die Operation mit Http-Fehlercode
  400 abbrechen, um sicherzustellen, dass diese Workflows nicht für E-Rezepte für
  PKV-Versicherte genutzt werden.
