text: "Das E-Rezept-FdV SOLL im Anwendungsfall \"Kostenträger suchen\", wenn die IKNR\
  \ des Kostenträgers des Nutzers verfügbar ist, zur Ermittlung der Telematik-ID des\
  \ Kostenträgers des Nutzers folgende Suchabfrage am FHIRVZD durchführen:\n  <ul>\n\
  \  <li>Abfrage der Ressource \"HealthcareService\"</li>\n  <li>HealthcareServices,\
  \ deren Organisation aktiv sind</li>\n  <li>HealthcareServices, deren Organisation\
  \ den Typ-oid \"1.2.276.0.76.4.59\" haben</li>\n  <li>HealthcareServices, deren\
  \ Organisation einen Identifier vom Typ \"IKNR\" haben</li>\n  <li>HealthcareServices,\
  \ deren Organisation eine IKNR mit IKNR aus dem ACCESS_TOKEN enthält</li>\n  <li>HealthcareServices,\
  \ deren Organisation einen Identifier vom Typ \"Telematik-ID\" haben</li>\n  <li>Einbeziehen\
  \ der Organisation in das Rückgabeergebnis</li>\n  </ul>"
title: 'E-Rezept-FdV: Kostenträger suchen - Telematik-ID im Verzeichnisdienst suchen'
version: 0
