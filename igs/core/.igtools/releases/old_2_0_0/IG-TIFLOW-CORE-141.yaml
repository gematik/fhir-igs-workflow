text: "Der TI-Flow-Fachdienst MUSS beim Löschen eines E-Rezepts über den mittels der\
  \ &#60;id&#62; adressierten/Task/&#60;id&#62;/$abort durch verordnende Leistungserbringer\
  \ den im HTTP-Header \"X-AccessCode\" gegen den im referenzierten Task enthaltenen\
  \ AccessCode prüfen und bei Missmatch oder Fehlen im HTTP-Header, den Aufruf mit\
  \ dem folgenden Fehler:\n <table id=\"error-code\" style=\"border: 1px solid black;\
  \ border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>403 - Forbidden</td>\n\
  \ </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n\
  \ <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n <td>TIFLOW_ACCESSCODE_MISMATCH</td>\n\
  \ </tr>\n <tr>\n <th>Details Text</th>\n <td>-</td>\n </tr>\n </table> \n abweisen,\
  \ damit ausschließlich die verordnende Leistungserbringerinstitution in Kenntnis\
  \ des AccessCodes als Berechtigte ein E-Rezept löschen."
title: TI-Flow-Fachdienst - E-Rezept löschen - Verordnender - Prüfung AccessCode
version: 1
