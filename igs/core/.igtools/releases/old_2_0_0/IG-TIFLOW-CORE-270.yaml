text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der Operation GET /pushers die zeta-user-info.professionOID\
  \ des Nutzers bestimmen und sicherstellen, dass ausschließlich Nutzer in der Rolle\
  \ \n <ul>\n <li>oid_versicherter</li>\n </ul>\n die Operation aufrufen, und bei\
  \ Abweichungen mit dem folgenden Fehler:\n <table id=\"error-code-json\" style=\"\
  border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>403 - Forbidden</td>\n </tr>\n <tr>\n <th>Error Code</th>\n <td>invalidOid</td>\n\
  \ </tr>\n <tr>\n <th>Error Details</th>\n <td>-</td>\n </tr> \n </table> \n abbrechen,\
  \ damit die Operation nicht durch unberechtigte Dritte ausgeführt wird."
