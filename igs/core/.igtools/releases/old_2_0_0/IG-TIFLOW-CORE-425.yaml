text: "Der TI-Flow-Fachdienst MUSS im Falle, dass eine unbekannte Ressource-ID angefragt\
  \ wird, die Anfrage mit dem folgenden Fehler:\n      <table id=\"error-code\" style=\"\
  border: 1px solid black; border-collapse: collapse;\">\n        <tr>\n         \
  \   <th>HTTP-Code</th>\n            <td>404 - Not Found</td>\n        </tr>\n  \
  \      <tr>\n            <th>Severity</th>\n            <td>error</td>\n       \
  \ </tr>\n        <tr>\n            <th>Code</th>\n            <td>not-found</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Code</th>\n            <td>MSG_RESOURCE_ID_FAIL</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Text</th>\n            <td>Resource\
  \ is not known</td>\n        </tr>\n      </table>\n      abbrechen, damit Clients\
  \ erkennen können, dass eine Ressource mit der angeforderten ID nicht existiert."
title: TI-Flow-Fachdienst - Fehlerbehandlung - Fehlercode MSG_RESOURCE_ID_FAIL
