text: "Das PS der verordnenden LEI MUSS im Anwendungsfall \"E-Rezept durch Verordnenden\
  \ löschen\" für das zu löschende E-Rezept die HTTP-Operation POST /TASK/&lt;id&gt;/$abort\
  \ mit \n <ul>\n <li>Task-ID in URL &lt;id&gt; </li>\n <li>AccessCode im X-AccessCode-Header\
  \ oder als URL-Parameter ?ac= </li>\n </ul>\n ausführen."
