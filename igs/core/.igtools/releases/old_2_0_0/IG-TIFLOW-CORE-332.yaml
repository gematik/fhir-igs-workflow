text: "Der TI-Flow-Fachdienst MUSS beim Einstellen einer Nachricht über die http-Operation\
  \ POST auf den Endpunkt /Communication mit GEM_ERP_PR_Communication_DispReq-Ressource\
  \ für den in Communication.basedOn referenzierten Task prüfen und, wenn Task.status\
  \ ungleich ready ist, die Operation mit dem folgenden Fehler:\n <table id=\"error-code\"\
  \ style=\"border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>400 - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_TASK_STATUS_MISMATCH</td>\n </tr>\n <tr>\n <th>Details Text</th>\n\
  \ <td>Task has invalid status.</td>\n </tr>\n </table> \n abbrechen, damit ausschließlich\
  \ E-Rezepte zugewiesen werden, welche durch den Adressaten abrufbar sind."
title: TI-Flow-Fachdienst - Nachricht einstellen - Dispense Request - Prüfung Status
  Task
version: 1
