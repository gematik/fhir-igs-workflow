text: "Der TI-Flow-Fachdienst MUSS an der Webschnittstelle des Subscription Service\
  \ beim Verbindungsaufbau prüfen, dass der Client einen zeitlich und kryptographisch\
  \ gültigen Bearer-Token der Schnittstelle GET /Subscription übermittelt und bei\
  \ nicht-erfolgreicher Prüfung die Verbindung mit dem folgenden Fehler:\n <table\
  \ id=\"error-code\" style=\"border: 1px solid black; border-collapse: collapse;\"\
  >\n <tr>\n <th>HTTP-Code</th>\n <td>403 - Forbidden</td>\n </tr>\n <tr>\n <th>Severity</th>\n\
  \ <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n\
  \ <th>Details Code</th>\n <td>SVC_INVALID_ACCESS_TOKEN</td>\n </tr>\n <tr>\n <th>Details\
  \ Text</th>\n <td>Invalid access token provided</td>\n </tr>\n </table>\n ablehnen."
title: TI-Flow-Fachdienst - Subscription Service - Prüfung Bearer-Token
version: 1
