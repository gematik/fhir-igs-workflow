text: "Der TI-Flow-Fachdienst MUSS beim Einstellen einer Nachricht über die http-Operation\
  \ POST auf den Endpunkt /Communication die Nachricht prüfen und, wenn\n <ul>\n <li>der\
  \ Nachrichteninhalt Communication.payload größer als 10 kByte ist oder</li>\n <li>in\
  \ von Versicherten eingestellten Nachrichten in Communication.payload eine externe\
  \ URLs enthält oder</li>\n <li>ein Attachment mit MimeType \"application/*\" enthält,</li>\n\
  \ </ul>\n , die Operation mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"\
  border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>400 - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_COMMUNICATION_PAYLOAD_INVALID</td>\n </tr>\n <tr>\n <th>Details Text</th>\n\
  \ <td>-</td>\n </tr>\n </table> \n abbrechen, damit über den TI-Flow-Fachdienst\
  \ kein Schadcode verteilt wird."
title: TI-Flow-Fachdienst - Nachricht einstellen - Schadcodeprüfung
version: 1
