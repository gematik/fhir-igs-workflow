text: Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt
  /Consent die dem Versicherten zugeordneten Consent-Ressourcen anhand des zeta-user-info.identifier
  des Nutzers (KVNR) identifizieren und in den Response aufnehmen, die in Consent.Patient.identifier
  die entsprechende KVNR des Versicherten referenziert haben, damit ausschließlich
  Versicherte ihre eigenen Information zu Einwilligungen einsehen können.
title: TI-Flow-Fachdienst - Consent lesen - Filter KVNR
