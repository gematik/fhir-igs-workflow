text: Der TI-Flow-Fachdienst MUSS beim Beenden eines Tasks mittels POST /Task/&lt;id&gt;/$close
  für den referenzierten Task den identifier des Nutzers (Telematik-ID) in Task.owner
  speichern, damit sichergestellt werden kann, dass nachfolgende Zugriffe auf diesen
  Datensatz nur durch Berechtigte erfolgen können.
