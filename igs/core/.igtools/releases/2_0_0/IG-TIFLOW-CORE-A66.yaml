text: Der TI-Flow-Fachdienst MUSS beim Beenden eines Tasks mittels HTTP-POST-Operation
  über /Task/&lt;id&gt;/$close, wenn eine MedicationDispense Ressource übermittelt
  wird und die Operation erfolgreich abgeschlossen werden kann, den Push Notification
  Prozess für den Trigger mit der ChannelId "erp.task.close" und den Versicherten
  mit der KVNR = Task.for initiieren.
