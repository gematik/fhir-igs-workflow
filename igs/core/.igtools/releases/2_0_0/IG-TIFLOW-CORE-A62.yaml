text: "Der TI-Flow-Fachdienst MUSS beim Beenden eines Tasks mittels POST /Task/&lt;id&gt;/$close\
  \ das im HTTP-Body des Requests enthaltene Parameters-Objekt gegen das Profil https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_PAR_CloseOperation_Input\
  \ prüfen, insbesondere bei der darin enthaltenen MedicationDispense:\n    <ul>\n\
  \        <li>die Korrektheit der Rezept-ID https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_PrescriptionId\
  \ als MedicationDispense.identifier,</li>\n        <li>die KVNR des Versicherten\
  \ im referenzierten Task (Task.for) gegen KVNR in MedicationDispense.subject:identifier\
  \ und</li>\n        <li>ob der zeta-user-info.identifier des Nutzers mit dem Wert\
  \ in MedicationDispense.performer.actor:identifier übereinstimmt</li>\n    </ul>\n\
  \    und im Fehlerfall die Operation mit dem folgenden Fehler:\n    <table id=\"\
  error-code\" style=\"border: 1px solid black; border-collapse: collapse;\">\n  \
  \      <tr>\n            <th>HTTP-Code</th>\n            <td>400 - Bad Request</td>\n\
  \        </tr>\n        <tr>\n            <th>Severity</th>\n            <td>error</td>\n\
  \        </tr>\n        <tr>\n            <th>Code</th>\n            <td>invalid</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Code</th>\n            <td>SVC_VALIDATION_FAILED</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Text</th>\n            <td>FHIR\
  \ Profile Validation Failed</td>\n        </tr>\n    </table>\n    abbrechen."
title: TI-Flow-Fachdienst - Task schließen - Schemaprüfung MedicationDispense
version: 0
