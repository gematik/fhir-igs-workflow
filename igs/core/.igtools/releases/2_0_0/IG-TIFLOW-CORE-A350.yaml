text: "Der TI-Flow-Fachdienst MUSS für die Registrierung der Subscription einen Bearer-Token\
  \ mit den Claims \n     <ul>\n     <li>subscriptionid: Pseudonym der Telematik-ID</li>\n\
  \     <li>iAt: Timestamp wann Subscription erstellt wurde</li>\n     <li>exp: Timestamp\
  \ Ablauf der Subscription</li>\n     </ul>\n     erstellen und mit einer Identität\
  \ des TI-Flow-Fachdienstes signieren (Signature Algortihm: ES256)."
