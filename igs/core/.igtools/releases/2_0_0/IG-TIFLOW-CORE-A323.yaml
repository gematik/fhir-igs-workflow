text: Der TI-Flow-Fachdienst MUSS beim Einstellen einer Nachricht über die http-Operation
  POST auf den Endpunkt /Communication die Absenderidentifikation aus dem zeta-user-info.identifier
  der Nutzerinformation mit dem entsprechenden System https://gematik.de/fhir/sid/telematik-id
  für Institutionen der TI bzw. http://fhir.de/sid/gkv/kvid-10 für Versicherte übernehmen
  sowie das Absendedatum Communication.sent auf die aktuelle Systemzeit des TI-Flow-Fachdienstes
  setzen, damit Absender und Sendezeitpunkt für den Empfänger eindeutig sind.
