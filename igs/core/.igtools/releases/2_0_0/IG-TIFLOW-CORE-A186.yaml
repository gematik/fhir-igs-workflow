text: "Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation\
  \ über /Task/&#60;id&#62;/$activate die im QES-Datensatz enthaltene Verordnung in\
  \ ein Bundle gleichen Typs in JSON-Repräsentation beim Aufruf der HTTP-GET-Operation\
  \ auf den Endpunkt /Task/&#60;id&#62; zurück liefern. Dies gilt für folgende Bundles:\
  \ https://fhir.kbv.de/StructureDefinition/KBV_PR_ERP_Bundlehttps://fhir.kbv.de/StructureDefinition/KBV_PR_EVDGA_Bundle\
  \ <br>\n    Der TI-Flow-Fachdienst MUSS für diese Bundles \n    <ul>\n        <li>einen\
  \ neuen, eindeutigen Identifier für die Bundle.id als UUID generieren,</li>\n  \
  \      <li>das Bundle entsprechend der Kanonisierungsregeln http://hl7.org/fhir/canonicalization/json#static\
  \ normalisieren (Bundle.text und Bundle.meta im \"root-Element\" entfernen),</li>\n\
  \        <li>mit der Signaturidentität des Fachdienstes ID.FD.OSIG gemäß [FHIR-Sig]\
  \ signieren und</li>\n        <li>das signierte Bundle mit Referenz in Task.input\
  \ mit Codingsystem https://gematik.de/fhir/erp/CodeSystem/GEM_ERP_CS_DocumentType\
  \ = 2 zurück liefern,</li>\n    </ul>\n    damit der Versicherte einen Nachweis\
  \ über die Integrität der gespeicherten Daten einsehen kann."
title: TI-Flow-Fachdienst - Task aktivieren - Serversignatur
