text: Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt
  /MedicationDispense die dem Versicherten zugeordneten MedicationDispense-Ressourcen
  anhand des zeta-user-info.identifier des Nutzers (KVNR) identifizieren, die in MedicationDispense.subject
  die entsprechende KVNR des begünstigten Patienten referenziert haben, damit ausschließlich
  Versicherte ihre eigenen Dispensierinformationen einsehen können.
title: TI-Flow-Fachdienst - MedicationDispense abrufen - Filter MedicationDispense
  auf KVNR des Versicherten
