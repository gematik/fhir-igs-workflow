text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation auf den Endpunkt\
  \ /Consent sicherstellen, dass der zeta-user-info.identifier des Nutzers (KVNR)\
  \ und die KVNR in Consent.patient.identifier übereinstimmen und im Fehlerfall die\
  \ Operation mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"border:\
  \ 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>403\
  \ - Forbidden</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n\
  \ <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>SVC_IDENTITY_MISMATCH</td>\n </tr>\n <tr>\n <th>Details Text</th>\n <td>FHIR\
  \ Profile Validation Failed</td>\n </tr>\n </table> \n abbrechen, damit eine Einwilligung\
  \ für einen Versicherten nicht durch Dritte erteilt werden kann."
title: TI-Flow-Fachdienst - Consent schreiben - Prüfung KVNR
version: 1
