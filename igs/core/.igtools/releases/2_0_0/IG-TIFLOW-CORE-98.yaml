text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt\
  \ /Task mit HTTP-Header X-PoPP-Token durch eine abgebende LEI, den im HTTP-Header\
  \ X-PoPP-Token übermittelten Token extrahieren, prüfen und bei Fehlen oder fehlerhafter\
  \ Prüfung mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"border: 1px\
  \ solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>403\
  \ - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n\
  \ <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_POPP_TOKEN_INVALID</td>\n </tr>\n <tr>\n <th>Details Text</th>\n <td>PoPP\
  \ token invalid</td>\n </tr>\n </table> \n abbrechen, damit die Autorisierung zum\
  \ Zugriff auf die Daten nur erfolgt, wenn ein Anwesenheitsnachweis erfolgreich durchgeführt\
  \ wurde."
title: TI-Flow-Fachdienst - Rezepte lesen - Apotheke - Prüfung PoPP-Token
version: 1
