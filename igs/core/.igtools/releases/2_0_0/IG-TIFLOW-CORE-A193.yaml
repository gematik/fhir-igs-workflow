text: "Der TI-Flow-Fachdienst MUSS für die Überprüfung der ANR/ZANR, wenn bei der\
  \ Prüfung eine Auffälligkeit auftritt und die Konfiguration Warning aktiv ist, mit\
  \ dem Http-Responsecode 252 antworten und den Response für die Auffälligkeit mit\
  \ einem Http-Header \"Warning\" mit\n    <ul>\n        <li>warning-code: 252</li>\n\
  \        <li>warning-agent: \"erp-server\"</li>\n        <li>warning-text: \"Ungültige\
  \ Arztnummer (LANR oder ZANR): Die übergebene Arztnummer entspricht nicht den Prüfziffer-Validierungsregeln.\"\
  </li>\n    </ul>\n    erweitern."
