text: "Der TI-Flow-Fachdienst MUSS für den Fall, dass ein Request in einen Timeout\
  \ läuft die Anfrage mit folgenden Fehler:\n      <table id=\"error-code\" style=\"\
  border: 1px solid black; border-collapse: collapse;\">\n        <tr>\n         \
  \   <th>HTTP-Code</th>\n            <td>408 - Request Timeout</td>\n        </tr>\n\
  \        <tr>\n            <th>Severity</th>\n            <td>error</td>\n     \
  \   </tr>\n        <tr>\n            <th>Code</th>\n            <td>timeout</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Code</th>\n            <td>TIFLOW_TIMEOUT</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Text</th>\n            <td>The\
  \ request timed out.</td>\n        </tr>\n      </table>\n      abbrechen, damit\
  \ Clients über Timeouts informiert werden und entsprechend reagieren können."
