text: Der TI-Flow-Fachdienst MUSS in jedem zu tätigenden Eintrag des Protokolls für
  Versicherte einen lesbaren Text in einfacher Sprache (deutsch und englisch) erzeugen,
  der mindestens den Namen des Zugreifenden, die auslösende Operation und das Ergebnis
  der Operation umfasst, damit Versicherte ohne technisches Vorwissen den Inhalt des
  Zugriffsprotokolls verstehen können.
