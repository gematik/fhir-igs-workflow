  \            <td>error</td>\n        </tr>\n        <tr>\n            <th>Code</th>\n\
  \            <td>invalid</td>\n        </tr>\n        <tr>\n            <th>Details\
  \ Code</th>\n            <td>TIFLOW_KVNR_INVALID</td>\n        </tr>\n        <tr>\n\
  \            <th>Details Text</th>\n            <td>Als Identifier für den Patienten\
  \ muss eine VersichertenID (KVNR) angegeben werden.</td>\n        </tr>\n    </table>\
