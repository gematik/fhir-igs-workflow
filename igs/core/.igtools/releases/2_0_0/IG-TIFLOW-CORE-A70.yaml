text: "Das E-Rezept-FdV MUSS im Anwendungsfall \"Nachrichten von Apotheken anzeigen\"\
  \ zum Herunterladen von Nachrichten vom TI-Flow-Fachdienst die HTTP-Operation GET\
  \ /Communication mit\n    <ul>\n        <li>optional: ?received=null für nur ungelesene\
  \ Nachrichten</li>\n        <li>optional: ?received=gtYYYY-MM-DD_sort=sent für Nachrichten\
  \ jünger als Datum DD.MM.YYYY</li>\n    </ul>\n    ausführen."
