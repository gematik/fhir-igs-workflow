text: "Der TI-Flow-Fachdienst MUSS im Falle, dass ungültige Query-Parameter verwendet\
  \ werden, die Anfrage mit dem folgenden Fehler:\n      <table id=\"error-code\"\
  \ style=\"border: 1px solid black; border-collapse: collapse;\">\n        <tr>\n\
  \            <th>HTTP-Code</th>\n            <td>400 - Bad Request</td>\n      \
  \  </tr>\n        <tr>\n            <th>Severity</th>\n            <td>error</td>\n\
  \        </tr>\n        <tr>\n            <th>Code</th>\n            <td>invalid</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Code</th>\n            <td>MSG_BAD_SYNTAX</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Text</th>\n            <td>Invalid\
  \ query parameter(s)</td>\n        </tr>\n      </table>\n      abbrechen, damit\
  \ Clients erkennen können, dass die verwendeten Query-Parameter syntaktisch oder\
  \ semantisch ungültig sind."
title: TI-Flow-Fachdienst - Fehlerbehandlung - Fehlercode MSG_BAD_SYNTAX
