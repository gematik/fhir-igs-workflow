text: Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt
  /AuditEvent die dem Versicherten zugeordneten AuditEvent-Ressourcen anhand des identifier
  des Nutzers (KVNR) identifizieren, die in AuditEvent.entity.name die entsprechende
  KVNR des begünstigten Patienten referenziert haben, damit ausschließlich Versicherte
  ihre eigenen Protokolleinträge einsehen können.
