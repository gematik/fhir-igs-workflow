text: "Der TI-Flow-Fachdienst MUSS bei der Validierung einer FHIR-Ressource vom Typ\
  \ Bundle prüfen, ob der Wert von fullUrls der entries (Bundle.entry.fullUrl) dem\
  \ [Format http-Schema] oder [Format urn:uuid-Schema] entsprechen und bei Auffälligkeiten\
  \ die Operation mit dem folgenden Fehler:\n      <table id=\"error-code\" style=\"\
  border: 1px solid black; border-collapse: collapse;\">\n        <tr>\n         \
  \   <th>HTTP-Code</th>\n            <td>400 - Bad Request</td>\n        </tr>\n\
  \        <tr>\n            <th>Severity</th>\n            <td>error</td>\n     \
  \   </tr>\n        <tr>\n            <th>Code</th>\n            <td>invalid</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Code</th>\n            <td>TIFLOW_RESOURCE_FULLURL_INVALID</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Text</th>\n            <td>Format\
  \ der fullUrl ist ungültig.</td>\n        </tr>\n    </table> \n    abbrechen."
