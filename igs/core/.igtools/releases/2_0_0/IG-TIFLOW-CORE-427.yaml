text: "Der TI-Flow-Fachdienst MUSS im Falle, dass ein unbekannter Suchparameter verwendet\
  \ wird, die Anfrage mit dem folgenden Fehler:\n      <table id=\"error-code\" style=\"\
  border: 1px solid black; border-collapse: collapse;\">\n        <tr>\n         \
  \   <th>HTTP-Code</th>\n            <td>400 - Bad Request</td>\n        </tr>\n\
  \        <tr>\n            <th>Severity</th>\n            <td>error</td>\n     \
  \   </tr>\n        <tr>\n            <th>Code</th>\n            <td>invalid</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Code</th>\n            <td>MSG_PARAM_UNKNOWN</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Text</th>\n            <td>Unknown\
  \ search parameter</td>\n        </tr>\n      </table>\n      abbrechen, damit Clients\
  \ erkennen können, dass ein verwendeter Suchparameter nicht unterstützt wird."
