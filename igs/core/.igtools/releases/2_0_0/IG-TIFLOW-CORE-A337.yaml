text: Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-DELETE-Operation auf /Communication/&lt;id&gt;
  die über &lt;id&gt; identifizierte Communication-Ressource anhand der KVNR bzw.
  Telematik-ID des aufrufenden Nutzers in zeta-user-info.identifier über das Absender-Attribut
  Communication.sender lokalisieren und löschen, damit Nutzer irrtümlich versendete
  oder nicht mehr gewünschte Nachrichten vom TI-Flow-Fachdienst entfernen können.
