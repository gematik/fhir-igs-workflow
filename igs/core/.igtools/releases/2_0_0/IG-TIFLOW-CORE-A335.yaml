text: 'Der TI-Flow-Fachdienst MUSS beim Einstellen einer Nachricht des Profils "https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_Communication_DispReq"
  oder "https://gematik.de/fhir/erpchrg/StructureDefinition/GEM_ERPCHRG_PR_Communication_ChargChangeReq"
  zur Versicherter-zu-Apotheken-Kommunikation über die http-Operation POST auf den
  Endpunkt /Communication prüfen, ob für die Telematik-ID des Empfängers Subscriptions
  registriert sind und für Registrierungen über den Subscription Service eine Notification
  (ping : subscription-id) senden.'
