text: Der TI-Flow-Fachdienst MUSS beim Erzeugen eines Tasks mittels HTTP-POST/$create-Operation
  den Parameter workflowType (Rezepttyp) aus dem HTTP-Body des POST-Requests entnehmen,
  als Attribut Task.extension:flowType des zu erstellenden Tasks verwenden und bei
  Fehlen bzw. Nicht-Konformität des Parameters den Request als unzulässig abweisen,
  damit auf Basis dieser Parameter ausschließlich gültige Workflows gestartet werden
  können und dem Versicherten bei Einsicht des Tasks der Weg in entweder eine Apotheke
  oder ein Sanitätshaus oder eine andere zuständige Einrichtung gewiesen werden kann.
title: TI-Flow-Fachdienst - Task erzeugen - Parametrierung Task für Workflow-Typ
