text: "Das PS der abgebenden LEI MUSS im Anwendungsfall \"Quittung abrufen\" für das\
  \ abgegebene E-Rezept die HTTP-Operation POST /Task/&#60;id&#62;/$close mit\n  \
  \  <ul> \n        <li>Task-ID in URL &#60;id&#62;</li>\n        <li>Geheimnis in\
  \ URL-Parameter ?secret=</li>\n        <li>optional, falls nicht zuvor mit Anwendungsfall\
  \ \"Dispensierinformation bereitstellen\" übermittelt: GEM_ERP_PR_PAR_CloseOperation_Input-Objekt</li>\n\
  \    </ul>\n    ausführen."
