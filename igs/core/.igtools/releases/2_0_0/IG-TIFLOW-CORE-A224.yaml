text: Der TI-Flow-Fachdienst MUSS die zulässige Anlage eines Tasks mittels HTTP-POST/$create-Operation
  im Status Task.status = draft vollziehen und beim erfolgreichen Abschluss der Operation
  die angelegte Ressource Task im HTTP-Body der HTTP-Response zurückgeben, damit die
  verordnende Leistungserbringerinstitution die generierte Rezept-ID für die QES verwenden
  kann.
