text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf einen einzelnen\
  \ /Task/&lt;id&gt; durch einen Versicherten, den Versicherten anhand des zeta-user-info.identifier\
  \ des Nutzers (KVNR) identifizieren, diese gegen die im gespeicherten Datensatz\
  \ in Task.for.identifier hinterlegte KVNR des begünstigten Versicherten prüfen und\
  \ bei Ungleichheit die Operation mit dem folgenden Fehler:\n <table id=\"error-code\"\
  \ style=\"border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>403 - Forbidden</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_KVNR_MISMATCH</td>\n </tr>\n <tr>\n <th>Details Text</th>\n <td>-</td>\n\
  \ </tr>\n </table> \n abbrechen, damit ausschließlich der begünstigte Versicherte\
  \ den Task abrufen kann."
title: TI-Flow-Fachdienst - Task abrufen - Versicherter - Prüfung KVNR
version: 0
