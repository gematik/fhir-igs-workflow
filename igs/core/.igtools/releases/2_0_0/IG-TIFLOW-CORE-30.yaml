text: "Der TI-Flow-Fachdienst MUSS einen Protokolleintrag mit den folgenden Werten\
  \ befüllen:\n\t<ul>\n <li>AuditEvent.type: Fester Wert rest gemäß [CodeSystem: Audit\
  \ Event ID]</li>\n <li>AuditEvent.subtype: aus dem ValueSet [ValueSet http://hl7.org/fhir/ValueSet/auditevent-sub-type]\
  \ gemäß [CodeSystem http://hl7.org/fhir/restful-interaction]:\n <ul>\n <li>create\
  \ beim Hinzufügen/Speichern/Anlegen eines Datenobjekts mit Versichertenbezug (mit\
  \ Ausnahme von AuditEvent- und Communication-Ressource)</li>\n <li>read beim lesenden\
  \ Zugriff auf ein Datenobjekt mit Versichertenbezug</li>\n <li>update, wenn das\
  \ Datenobjekt mit Versichertenbezug geändert/aktualisiert wird</li>\n <li>delete,\
  \ wenn das Datenobjekt mit Versichertenbezug manuell oder automatisch gelöscht wird</li>\n\
  \ </ul>\n </li>\n <li>AuditEvent.action: analog AuditEvent.subType (C, R, U, D)\
  \ gemäß [ValueSet http://hl7.org/fhir/ValueSet/audit-event-action]</li>\n <li>AuditEvent.recorded:\
  \ aktuelle Systemzeit des TI-Flow-Fachdienstes</li>\n <li>AuditEvent.outcome: Ergebnis\
  \ der aufgerufenen Operation gemäß [ValueSet http://hl7.org/fhir/ValueSet/audit-event-outcome]\
  \ (0 = Erfolg, 4 = Fehler auf Clientseite, 8 = Serverfehler)</li>\n <li>AuditEvent.agent:\
  \ Slicing in die Einträge user, client und internal mit jeweils gesetztem AuditEvent.agent.type.coding.system\
  \ und AuditEvent.agent.type.coding.code</li>\n <li>AuditEvent.agent[user].type:\
  \ Fester Wert humanuser aus [CodeSystem: Security Role Type]</li>\n <li>AuditEvent.agent[user].who.identifier:\
  \ aus zeta-user-info.identifier befüllt (IdentifierTelematikId oder IdentifierKvid10)</li>\n\
  \ <li>AuditEvent.agent[client].type: den festen Code 110150 (Application) aus $dcm\
  \ und entsprecht dem ValueSet TIFLOWAuditEventAgentTypeVS</li>\n <li>AuditEvent.agent[client].who.identifier:\
  \ aus zeta-user-info.identifier befüllt (IdentifierTelematikId) </li>\n <li>AuditEvent.agent[internal].type:\
  \ Fester Wert dataprocessor aus [CodeSystem: Security Role Type]</li>\n <li>AuditEvent.agent[internal].name:\
  \ Fester Wert \"TI-Flow-Fachdienst\"</li>\n <li>AuditEvent.source.site: Fester Wert\
  \ TI-Flow-Fachdienst</li>\n <li>AuditEvent.source.observer: Device-Informationen\
  \ des TI-Flow-Fachdienstes (status, serialnumber=gemäß Release)</li>\n <li>AuditEvent.entity:\
  \ mindestens ein Eintrag, Slicing in patient (1..1), task (0..1) und service (0..1)</li>\n\
  \ <li>AuditEvent.entity[patient].type: Fester Wert Patient gemäß [CodeSystem http://terminology.hl7.org/CodeSystem/audit-entity-type]</li>\n\
  \ <li>AuditEvent.entity[patient].what.identifier: als IdentifierKvid10 (KVNR) befüllt</li>\n\
  \ <li>AuditEvent.entity[task].type: Fester Wert Task gemäß [CodeSystem http://terminology.hl7.org/CodeSystem/audit-entity-type]</li>\n\
  \ <li>AuditEvent.entity[task].what.identifier: sofern vorhanden als EPrescriptionId</li>\n\
  \ <li>AuditEvent.entity[service].type: Fester Wert Other (Code 4) gemäß [CodeSystem\
  \ http://terminology.hl7.org/CodeSystem/audit-entity-type]</li>\n <li>AuditEvent.entity[service].name:\
  \ sofern vorhanden Name des aufgerufenen FHIR Data Service</li>\n </ul>"
title: TI-Flow-Fachdienst - Inhalt Protokolleintrag
version: 1
