text: Der TI-Flow-Fachdienst MUSS alle Übermittlungsaufträge für eine KVNR für 24
  Stunden pausieren, wenn das Aktenkonto aufgrund eines Umzugs nicht erreichbar ist
  und der Medication Service oder der Information Service eine Response mit dem Statuscode
  409 zurückgibt, und nach dieser Pause einen erneuten Übermittlungsversuch starten.
