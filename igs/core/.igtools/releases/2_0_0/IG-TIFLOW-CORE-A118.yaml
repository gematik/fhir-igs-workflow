text: Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf einen einzelnen
  Task mittels "/Task/&lt;id&gt;?secret=..." durch eine abgebende Institution den
  Task, sofern er den Status "completed" hat, um das referenzierte, serverseitig signierte
  Quittungs-Bundle aus Task.output mit Codingsystem https://gematik.de/fhir/erp/CodeSystem/GEM_ERP_CS_DocumentType
  = 3 als search.include im Ergebnis-Bundle ergänzen und die Ergebnismenge Task +
  Quittungs-Bundle an den Abgebenden zurückgeben, damit ein Abgebender, der ein konkretes
  E-Rezept beliefert hat, bei Bedarf genau dieses belieferte E-Rezept inkl. der Quittung
  erneut abrufen kann.
title: TI-Flow-Fachdienst - Task abrufen - abgebende Institution - Rückgabe Task inkl.
  Bundle im Bundle
