text: Alle Produkttypen, die eine Verordnungs-ID aus externen Systemen einlesen oder
  von Benutzern entgegen nehmen, MÜSSEN die Verordnungs-ID gegen ihre Prüfziffer nach
  dem Modulo-97-Verfahren gemäß [ISO 7064] prüfen und bei Ungültigkeit die Weiterverarbeitung
  verhindern, damit Benutzerfehleingaben vor der Verarbeitung erkannt werden.
