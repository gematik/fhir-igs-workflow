text: Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt
  /Task die dem Versicherten zugeordneten Task-Ressourcen anhand des zeta-user-info.identifier
  des Nutzers (KVNR) identifizieren, die in Task.for die entsprechende KVNR des begünstigten
  Patienten referenziert haben, damit ausschließlich Versicherte ihre eigenen E-Rezepte
  einsehen können.
