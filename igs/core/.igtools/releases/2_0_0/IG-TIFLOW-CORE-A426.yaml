text: "Der TI-Flow-Fachdienst MUSS im Falle, dass auf eine gelöschte Ressource zugegriffen\
  \ wird, die Anfrage mit dem folgenden Fehler:\n      <table id=\"error-code\" style=\"\
  border: 1px solid black; border-collapse: collapse;\">\n        <tr>\n         \
  \   <th>HTTP-Code</th>\n            <td>410 - Gone</td>\n        </tr>\n       \
  \ <tr>\n            <th>Severity</th>\n            <td>error</td>\n        </tr>\n\
  \        <tr>\n            <th>Code</th>\n            <td>not-found</td>\n     \
  \   </tr>\n        <tr>\n            <th>Details Code</th>\n            <td>MSG_DELETED</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Text</th>\n            <td>Resource\
  \ was deleted</td>\n        </tr>\n      </table>\n      abbrechen, damit Clients\
  \ erkennen können, dass eine Ressource dauerhaft gelöscht wurde."
title: TI-Flow-Fachdienst - Fehlerbehandlung - Fehlercode MSG_DELETED
