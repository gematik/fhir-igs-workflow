text: Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation
  über /Task/&lt;id&gt;/$accept die Operation mit dem HTTP-Fehlercode 410 abbrechen,
  wenn der referenzierte /Task/&lt;id&gt; existiert, jedoch kein AccessCode im Task.identifier:AccessCode
  als https://gematik.de/fhir/erp/NamingSystem/GEM_ERP_NS_AccessCode vorhanden ist
  oder der Status Task.status = cancelled ist, damit die abgebende Institution den
  Versicherten über die zwischenzeitliche Löschung des Datensatzes in Kenntnis setzen
  kann.
title: TI-Flow-Fachdienst - Task akzeptieren - Prüfung Datensatz zwischenzeitlich
  gelöscht
