text: Der E-Rezept-Fachdienst MUSS beim Einstellen einer Nachricht des Schemas https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_Communication_Representative
  zur Versicherter-zu-Versichertem-Kommunikation über die http-Operation POST auf
  den Endpunkt /Communication mit dem http-Status-Code 400 abbrechen, wenn der referenzierte
  Task nicht im Zustand "ready" oder "in-progress" ist, damit die Weitergabe des Zugriffs
  auf E-Rezepte ausschließlich auf einlösbare bzw. in Arbeit befindliche Verordnungen
  beschränkt wird.
title: E-Rezept-Fachdienst - Nachricht einstellen - Einlösbare E-Rezepte für Versicherter-zu-Versichertem-Kommunikation
