text: Das E-Rezept-FdV MUSS im Anwendungsfall "E-Rezept löschen", falls das E-Rezept-FdV
  die Funktionalität für Abrechnungsinformationen unterstützt, wenn der Nutzer ein
  E-Rezept mit Kostenträgertyp (Coverage.type.coding.code) "PKV" zum Löschen ausgewählt
  hat und für das E-Rezept noch keine Abrechnungsinformationen bereitgestellt wurden,
  eine Warnung anzeigen, dass ein Bereitstellen der Abrechnungsinformationen zum E-Rezept
  nach dem Löschen des E-Rezepts nicht mehr möglich ist.
title: 'E-Rezept-FdV:  E-Rezepte löschen - Coverage PKV - Warnung Abgabeinformationen'
