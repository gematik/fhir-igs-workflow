text: Der E-Rezept-Fachdienst MUSS bei der Validierung einer FHIR-Ressource vom Typ
  Bundle prüfen, ob für jedes entry im Bundle die ID der Ressource (Bundle.entry.resource.id)
  vorhanden ist und bei Auffälligkeiten mit dem HTTP-Fehlercode 400 abbrechen und
  die Fehlermeldung "Die ID einer Ressource im Bundle ist nicht vorhanden." in Form
  eines OperationOutcome ausliefern.
title: E-Rezept-Fachdienst - FHIR-Ressource validieren - Prüfung Existenz von Ressource.id
