text: Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt /Task mit
  den URL-Parameter pnw="..." durch eine abgebende LEI, falls das Ergebnis im VSDM
  Prüfungsnachweis gleich 3 ist, URL-Parameter kvnr="..." übermittelt wurde und keine
  E-Rezeptes für den Versicherten im TI-Flow-Fachdienst gespeichert sind, eine leere
  Liste mit dem Status 202 zurückgeben.
