  Anb_eRp_FD:
  - 'Sich.techn. Eignung: Gutachten (Anbieter)'
text: "<description>\n        Der Anbieter des E-Rezept-Fachdienstes MUSS das private\
  \ Schlüsselmaterial für kryptografische Verfahren (Entschlüsselung, Signaturen)\
  \ in einem HSM speichern, dessen Eignung durch eine erfolgreiche Evaluierung nachgewiesen\
  \ wurde. Als Evaluierungsschemata kommen dabei Common Criteria, ITSEC oder Federal\
  \ Information Processing Standard (FIPS) in Frage.\n\n        Die Prüftiefe MUSS\
  \ mindestens \n        <ul>\n            <li>FIPS 140-2 Level 3,</li>\n        \
  \    <li>Common Criteria EAL 4+ mit hohem Angriffspotenzial</li>\n            <li>oder\
  \ ITSEC E3 der Stärke \"hoch\"</li> \n        </ul>\n        entsprechen.\n    </description>\n\
  \    <!-- A_19586 -->"
title: Anbieter E-Rezept-Fachdienst Speicherung Schlüsselmaterial in HSM
version: 0
