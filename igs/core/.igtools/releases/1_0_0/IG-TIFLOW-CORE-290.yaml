text: "Der E-Rezept-Fachdienst MUSS für die Registrierung der Subscription einen Bearer-Token\
  \ mit den Claims \n <ul>\n <li>subscriptionid: Pseudonym der Telematik-ID</li>\n\
  \ <li>iAt: Timestamp wann Subscription erstellt wurde \n <li>exp: Timestamp Ablauf\
  \ der Subscription \n </ul>\n erstellen und mit einer Identität des E-Rezept-Fachdienstes\
  \ signieren (Signature Algortihm: ES256)."
