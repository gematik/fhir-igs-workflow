  löschen" für das zu löschende E-Rezept die HTTP-Operation POST /TASK/&lt;id&gt;/$abort
  mit ACCESS_TOKEN im Authorization-Header Task-ID in URL &lt;id&gt; AccessCode im
  X-AccessCode-Header oder als URL-Parameter ?ac= ausführen.
