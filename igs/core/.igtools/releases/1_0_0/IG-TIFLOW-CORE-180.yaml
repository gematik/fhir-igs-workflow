text: "Der TI-Flow-Fachdienst MUSS beim berechtigten Aufruf der Operation POST /Task/&#60;id&#62;/$activate\
  \ prüfen, dass die PrescriptionID des Tasks mit der PrescriptionID im übergebenen\
  \ QES-Datensatz übereinstimmt und der Präfix der PrescriptionID gleich dem Flowtype\
  \ des zu aktivierenden Tasks ist und andernfalls die Operation mit dem folgenden\
  \ Fehler:\n <table id=\"error-code\" style=\"border: 1px solid black; border-collapse:\
  \ collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>400 - Bad Request</td>\n </tr>\n\
  \ <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n\
  \ </tr>\n <tr>\n <th>Details Code</th>\n <td>TIFLOW_FLOWTYPE_MISMATCH</td>\n </tr>\n\
  \ <tr>\n <th>Details Text</th>\n <td>-</td>\n </tr>\n </table> \n abbrechen."
title: TI-Flow-Fachdienst - Task aktivieren - Prüfung Rezept-ID und Präfix gegen Flowtype
