text: Der E-Rezept-Fachdienst MUSS bei der Validierung einer FHIR-Ressource prüfen,
  ob angegebene Referenzen nach [FHIR Spezifikation Auflösen von Referenzen in Bundles]
  ermittelt werden können und bei Auffälligkeiten mit dem HTTP-Fehlercode 400 abbrechen
  und die Fehlermeldung "Referenz einer Ressource konnte nicht aufgelöst werden."
  in Form eines OperationOutcome ausliefern.
