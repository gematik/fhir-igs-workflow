text: "Der TI-Flow-Fachdienst MUSS beim Einstellen einer Nachricht über die http-Operation\
  \ POST auf den Endpunkt /Communication mit GEM_ERP_PR_Communication_DispReq-Ressource\
  \ für den in Communication.basedOn referenzierten Task prüfen, falls die Verordnung\
  \ als Mehrfachverordnung (MedicationRequest.extension:Mehrfachverordnung.extension:Kennzeichen\
  \ = true) gekennzeichnet ist, ob der Beginn der Einlösefrist (MedicationRequest.extension:Mehrfachverordnung.extension:Zeitraum.value[x]:valuePeriod.start)\
  \ zum aktuellen oder einem früheren Zeitpunkt als das aktuelle Datum liegt und anderenfalls\
  \ mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"border: 1px solid\
  \ black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>400 - Bad\
  \ Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n\
  \ <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n <td>TIFLOW_MVO_NOT_VALID_YET</td>\n\
  \ </tr>\n <tr>\n <th>Details Text</th>\n <td>Prescription is not fillable yet.</td>\n\
  \ </tr>\n </table> \n abbrechen, damit ausschließlich E-Rezepte zugewiesen werden,\
  \ deren Einlösefrist erreicht ist."
title: TI-Flow-Fachdienst - Nachricht einstellen - Dispense Request - Prüfung Beginn
  Gültigkeit Task
version: 1
