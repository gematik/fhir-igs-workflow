text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der Operation POST /channels/{pushkey}\
  \ die Rolle \"professionOID\" des Aufrufers im ACCESS_TOKEN im HTTP-RequestHeader\
  \ \"Authorization\" feststellen und sicherstellen, dass ausschließlich Versicherte\
  \ in der Rolle \n <ul>\n <li>oid_versicherter</li>\n </ul>\n die Operation aufrufen,\
  \ und bei Abweichungen mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"\
  border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>403 - Forbidden</td>\n </tr>\n <tr>\n <th>Error Code</th>\n <td>invalidOid</td>\n\
  \ </tr>\n </table> \n abrechen, damit die Operation nicht durch unberechtigte Dritte\
  \ ausgeführt wird."
title: TI-Flow-Fachdienst - Push Notifications - Channels konfigurieren - Rollenprüfung
