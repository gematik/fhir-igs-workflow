text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der Operation POST /channels/{pushkey}\
  \ die Rolle \"professionOID\" des Aufrufers im ACCESS_TOKEN im HTTP-RequestHeader\
  \ \"Authorization\" feststellen und sicherstellen, dass ausschließlich Versicherte\
  \ in der Rolle \n <ul>\n <li>oid_versicherter</li>\n </ul>\n die Operation aufrufen,\
  \ damit die Operation nicht durch unberechtigte Dritte ausgeführt wird."
