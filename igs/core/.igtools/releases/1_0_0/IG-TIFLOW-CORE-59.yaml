text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt
  /Task mit den URL-Parameter pnw="..." durch eine abgebende LEI,den im Parameter
  pnw übermittelten Prüfungsnachweis extrahieren, die Version der Prüfziffer bestimmen,
  den Prüfungsnachweis prüfen und bei Fehlen oder fehlerhafter Prüfung mit dem Fehler
  403 abbrechen, damit nur Clients die Operation aufrufen können, welche einen Anwesenheitsnachweis
  erfolgreich durchgeführt haben.
