text: Der TI-Flow-Fachdienst MUSS die Datenübermittlung an ein Aktenkonto für mindestens
  eine Minute unterbrechen, wenn ein Aufruf im Medication Service mit dem Statuscode
  500 scheitert, anschließend den Endpunkt zum Auffinden des Aktenkonto für diese
  KVNR bei allen weiteren Information Services abrufen, die Anfrage am gefundenen
  Medication Service wiederholen und bei anhaltenden Problemen einen exponentiellen
  Backoff-Mechanismus anwenden, der die Wartezeit zwischen den Versuchen sukzessive
  verdoppelt, um die Systembelastung zu minimieren.
title: TI-Flow-Fachdienst - ePA - Fehlerbehandlung - Reaktion auf Scheitern des Operationaufrufs
