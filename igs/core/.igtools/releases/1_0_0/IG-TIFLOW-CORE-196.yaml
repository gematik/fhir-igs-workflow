  \ nicht 8-stellig ist, die Operation mit dem folgenden Fehler:\n <table id=\"error-code\"\
  \ style=\"border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>400 - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_EREZEPT_PZN_INVALID</td>\n </tr>\n <tr>\n <th>Details Text</th>\n <td>Länge\
  \ PZN unzulässig (muss 8-stellig sein)</td>\n </tr>\n </table> \n abbrechen."
