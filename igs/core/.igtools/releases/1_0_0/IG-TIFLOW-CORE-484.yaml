text: Der Fachdienst E-Rezept MUSS beim Einstellen einer Nachricht des Profils "https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_Communication_DispReq",
  "https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_Communication_Reply",
  "https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_Communication_DiGA"
  oder "https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_Communication_Representative"
  über die http-Operation POST auf den Endpunkt /Communication mit dem http-Status-Code
  400 abbrechen, wenn das Pflichtfeld Communication.basedOn einen Task referenziert,
  der nicht existiert, um Spam und nicht-verordnungsbezogene Kommunikation zu verhindern.
