  eRp_FD:
  - Herstellererklärung
text: "Der E-Rezept-Fachdienst MUSS für den Anwendungsfall \"Nachricht durch Abgebenden\
  \ übermitteln\" Nachrichten mit der folgenden Datenstruktur in der contentString-Eigenschaft\
  \ des GEM_ERP_PR_Communication_Reply unterstützen.\n     \n     <table>\n  <thead>\n\
  \    <tr>\n      <th>Attribut</th>\n      <th>verpflichtend</th>\n      <th>Beschreibung</th>\n\
  \      <th>zulässige Werte</th>\n      <th>Beispiel</th>\n    </tr>\n  </thead>\n\
  \  <tbody>\n    <tr>\n      <td>version</td>\n      <td>ja</td>\n      <td>Gibt\
  \ die Version des JSON an. Aktuell immer 1. Kann im weiteren Lebenszyklus verändert\
  \ werden.</td>\n      <td>nummerisch, bis zu 6 Stellen</td>\n      <td>1</td>\n\
  \    </tr>\n    <tr>\n      <td>supplyOptionsType</td>\n      <td>ja</td>\n    \
  \  <td>Wird gemäß des Servicerequests gesetzt, den der Nutzer wählt. Die für den\
  \ Nutzer zur Auswahl stehenden Services gibt die Apotheke vor, indem sie den servicespezifischen\
  \ Zuweisungs-Endpunkt angibt, oder nicht.</td>\n      <td>onPremise, shipment, delivery</td>\n\
  \      <td>onPremise</td>\n    </tr>\n    <tr>\n      <td>info_text</td>\n     \
  \ <td>nein</td>\n      <td>Zusätzlicher Freitext des Versicherten an die Apotheke</td>\n\
  \      <td>500 Stellen, UTF-8</td>\n      <td>Wir möchten Sie informieren, dass\
  \ Ihre bestellten Medikamente zur Abholung bereitstehen. Den Abholcode finden Sie\
  \ anbei.</td>\n    </tr>\n    <tr>\n      <td>url</td>\n      <td>nein</td>\n  \
  \    <td>Einbettung einer externen URL ausschließlich für das Einlösen von E-Rezepten\
  \ in einer externen Bestellplattform</td>\n      <td>500 Stellen, URL gemäß RFC3986</td>\n\
  \      <td>https://www.meine-apotheke.de/pickup/59b52340-7a6a-430d-99ea-45a8e5cd03f6</td>\n\
  \    </tr>\n    <tr>\n      <td>pickUpCodeHR</td>\n      <td>nein</td>\n      <td>Menschenlesbarer\
  \ Abholcode. Nur bei supplyOptionsType \"onPremise\". Wenn gesetzt, wird dem Nutzer\
  \ der Inhalt des \"pickUpCodeHR\" optisch hervorgehoben angezeigt.</td>\n      <td>8\
  \ Stellen, UTF-8</td>\n      <td>12315615</td>\n    </tr>\n    <tr>\n      <td>pickUpCodeDMC</td>\n\
  \      <td>nein</td>\n      <td>Maschinenlesbarer Abholcode (Data-Matrix-Code).\
  \ Nur bei supplyOptionsType \"onPremise\". Wenn gesetzt, kann sich der Nutzer den\
  \ Inhalt als Data-Matrix-Code anzeigen lassen. Der Inhalt wird gemäß ISO/IEC 16022:2006\
  \ von der App in einen DMC gewandelt. Fehlt die Interpretation, so wird der Code\
  \ als Freitext angezeigt.</td>\n      <td>128 Stellen, UTF-8</td>\n      <td>5346a991-c5c6-49c8-b87b-4cdd255bbde4</td>\n\
  \    </tr>\n  </tbody>\n</table>\n\n<div><figcaption><strong>Tabelle: </strong>Nachricht\
  \ als Apotheke an einen Versicherten schicken</figcaption></div>"
title: 'E-Rezept-Fachdienst: Nachrichtenaustausch - Nachricht durch Abgebenden übermitteln
  - Datenstruktur Nachricht'
version: 0
