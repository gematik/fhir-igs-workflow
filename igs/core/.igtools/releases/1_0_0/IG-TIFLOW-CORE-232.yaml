text: Das Clientsystem MUSS, wenn es sich mit seiner SM-B authentisiert, den CHALLENGE_TOKEN
  des IdP-Dienstes mit der Identität ID.HCI.AUT der SM-B signieren. Das Clientsystem
  MUSS, wenn es den Konnektor oder den Basis-Consumer nutzt, für das Signieren die
  Operation ExternalAuthenticate verwenden und als zu signierende Daten BinaryString
  den SHA-256-Hashwert des CHALLENGE_TOKEN in Base64-Codierung übergeben.
