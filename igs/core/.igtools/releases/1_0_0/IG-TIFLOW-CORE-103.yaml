text: Der E-Rezept-Fachdienst MUSS beim Löschen eines E-Rezepts über den mittels der
  &#60;id&#62; adressierten/Task/&#60;id&#62;/$abort durch verordnende Leistungserbringer
  den im HTTPHeader "X-AccessCode" gegen den im referenzierten Task enthaltenen AccessCode
  prüfen und bei Missmatch oder Fehlen im HTTP-Header oder wenn der Task.Status ungleich
  "ready" ist, den Aufruf mit dem HTTP-Fehlercode 403 abweisen, damit ausschließlich
  die verordnende Leistungserbringerinstitution in Kenntnis des AccessCodes als Berechtigte
  ein E-Rezept löschen.
title: E-Rezept-Fachdienst - E-Rezept löschen - Verordnender - Prüfung AccessCode
  und Status
