text: Der Hersteller des Clientsystem des TI-Flow-Fachdienstes MUSS sich über einen
  organisatorischen Prozess beim Anbieter des IDP-Dienstes für die Dienste, für welche
  Token abgerufen werden sollen, registrieren. Der IDP-Dienst vergibt dabei eine "client_id".
  Diese "client_id" MUSS vom Clientsystem bei Nutzung des IDP-Dienstes übertragen
  werden.
