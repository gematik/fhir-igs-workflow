text: 'Das PS der verordnenden LEI MUSS den Anwendungsfall "UC 2.5 - E-Rezept durch
  Verordnenden löschen" aus [gemSysL_eRp] gemäß TAB_ILFERP_004 umsetzen. Tabelle #
  : TAB_ILFERP_004 – E-Rezept durch Verordnenden löschen Name E-Rezept durch Verordnenden
  löschen Auslöser Aufruf des Anwendungsfalls in der GUI Akteur Leistungserbringer,
  Mitarbeiter verordnende LEI Vorbedingung Der Nutzer hat ein E-Rezept zum Löschen
  markiert und das Löschen bestätigt. Die LEI hat sich gegenüber der TI authentisiert.
  Nachbedingung Das ausgewählte E-Rezept ist vom TI-Flow-Fachdienst unwiederbringlich
  gelöscht. Standardablauf Task-ID und AccessCode des E-Rezepts bestimmen E-Rezept
  auf TI-Flow-Fachdienst löschen E-Rezept-Token in PS löschen'
