text: Das E-Rezept-FdV MUSS im  Anwendungsfall "E-Rezept einer Apotheke zuweisen"
  im Rahmen der Belieferung eines Arzneimittels, wenn der Nutzer auf eine empfangene
  Nachricht einer Apotheke antwortet, die TransactionID aus der empfangenen Nachricht
  der Apotheke unverändert im payload contentString der Textnachricht an die Apotheke
  zurückgeben.
