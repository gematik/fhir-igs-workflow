text: Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation
  über /Task/&lt;id&gt;/$accept den im HTTP-Header "X-AccessCode" oder URL-Parameter
  "?ac=..." übertragenen AccessCode gegen den im referenzierten Task gespeicherten
  AccessCodeTask.identifier:AccessCode als https://gematik.de/fhir/erp/NamingSystem/GEM_ERP_NS_AccessCode
  prüfen und bei Ungleichheit oder Fehlen des URL-Parameters die Operation mit dem
  HTTP-Fehlercode 403 abbrechen, damit Zugriffe auf diesen Datensatz nur durch Berechtigte
  in Kenntnis des AccessCodes erfolgen.
title: TI-Flow-Fachdienst - Task akzeptieren - Prüfung AccessCode
