text: 'Das E-Rezept-FdV MUSS im Anwendungsfall "Einwilligung erteilen" den Text für
  die Einwilligung derart gestalten, dass dem Nutzer eine informierte Einwilligung
  möglich ist. Insbesondere MÜSSEN enthalten sein: der Verwendungszweck, die konkreten
  Informationen über die Art der erhobenen Daten, die Speicherdauer, Hinweis auf Freiwilligkeit,
  auf Widerrufsrecht, Hinweis auf die Folgen bei Verweigerung oder Widerruf.'
title: 'E-Rezept-FdV: Einwilligung erteilen - Einwilligungstext'
