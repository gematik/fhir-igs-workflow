  PS_E-Rezept_abgebend:
  - Herstellererklärung
text: "Das PS der abgebenden LEI MUSS für den Anwendungsfall \"E-Rezept einer Apotheke\
  \ zuweisen\" Nachrichten mit der Datenstruktur gemäß der Tabelle in der contentString-Eigenschaft\
  \ des GEM_ERP_PR_Communication_DispReq-Profils unterstützen. \n     \n     <table>\n\
  \  <thead>\n    <tr>\n      <th>Attribut</th>\n      <th>verpflichtend</th>\n  \
  \    <th>Beschreibung</th>\n      <th>zulässige Werte</th>\n      <th>Beispiel</th>\n\
  \    </tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td>version</td>\n      <td>ja</td>\n\
  \      <td>Gibt die Version des JSON an. Aktuell immer 1. Kann im weiteren Lebenszyklus\
  \ verändert werden.</td>\n      <td>nummerisch, bis zu 6 Stellen</td>\n      <td>1</td>\n\
  \    </tr>\n    <tr>\n      <td>supplyOptionsType</td>\n      <td>ja</td>\n    \
  \  <td>Wird gemäß des Servicerequests gesetzt, den der Nutzer wählt. Die für den\
  \ Nutzer zur Auswahl stehenden Services gibt die Apotheke vor, indem sie den servicespezifischen\
  \ Zuweisungs-Endpunkt angibt, oder nicht.</td>\n      <td>onPremise, shipment, delivery</td>\n\
  \      <td>onPremise</td>\n    </tr>\n    <tr>\n      <td>name</td>\n      <td>nein</td>\n\
  \      <td>Name des Versicherten.</td>\n      <td>100 Stellen, UTF-8</td>\n    \
  \  <td>Dr. Maximilian von Muster</td>\n    </tr>\n    <tr>\n      <td>address</td>\n\
  \      <td>nein</td>\n      <td>String-Array der Zeilen einer Adresse. Sie ist im\
  \ JSON in der korrekten Reihenfolge anzugeben und auch auszulesen. \"onPremise\"\
  : Adresse des Versicherten laut Rezept. \"delivery\"/\"shipment\": Adresse des Lieferungsempfängers\
  \ – mindestens: Strasse+Hausnummer, PLZ+Ort werden gesetzt.</td>\n      <td>Array\
  \ von Strings je 500 Stellen UTF-8</td>\n      <td><pre>\"address\": [\n  \"wohnhaft\
  \ bei Emilia Fischer\",\n  \"Bundesallee 312\",\n  \"123. OG\",\n  \"12345 Berlin\"\
  \n]</pre></td>\n    </tr>\n    <tr>\n      <td>hint</td>\n      <td>nein</td>\n\
  \      <td>Hinweis, den der Versicherte mit angeben kann.</td>\n      <td>500 Stellen,\
  \ UTF-8</td>\n      <td>Bitte im Morsecode klingeln: -.-.</td>\n    </tr>\n    <tr>\n\
  \      <td>phone</td>\n      <td>nein</td>\n      <td>Telefonnummer</td>\n     \
  \ <td>32 Stellen, UTF-8</td>\n      <td>004916094858168</td>\n    </tr>\n  </tbody>\n\
  </table>\n<div><figcaption><strong>Tabelle: </strong>E-Rezept einer Apotheke zuweisen</figcaption></div>\n\
  </requiremen>\n\n### Nachricht versenden\n\nDie für die Nachricht zu verwendende\
  \ Communication-Ressource wird modul- und anwendungsfall-spezifisch festgelegt.\n\
  \n<!-- A_19334 -->\n<requirement conformance=\"SHALL\" key=\"IG-TIFLOW-CORE-109\"\
  \ title=\"PS abgebende LEI: Nachricht versenden - Nachricht auf Fachdienst einstellen\"\
  \ version=\"0\">\n  \n  \n  Das PS der abgebenden LEI MUSS im Anwendungsfall \"\
  Nachricht an Versicherten versenden\" die HTTP-Operation POST /Communication mit\n\
  \  <ul>\n    <li>ACCESS_TOKEN im Authorization-Header</li>\n    <li>Communication\
  \ Ressource im HTTP-Request-Body</li>\n  </ul>\n  ausführen."
title: 'PS abgebende LEI: Nachrichtenaustausch - E-Rezept einer Apotheke zuweisen
  - Datenstruktur Nachricht'
version: 0
