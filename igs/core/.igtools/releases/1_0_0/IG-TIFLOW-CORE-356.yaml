text: "Der TI-Flow-Fachdienst MUSS an seinen Schnittstellen eine http-GET-Operation\
  \ auf den Endpunkt /metadata erlauben, in welcher er ein Capability Statement gemäß\
  \ https://www.hl7.org/fhir/capabilitystatement.html veröffentlicht, welches die\
  \ vom TI-Flow-Fachdienst verarbeiteten Ressourcen mit den zugehörigen http-Operationen\
  \ der angebotenen REST-Schnittstelle auflistet: \n <ul>\n <li>Task – GET-, POST-Operation,\
  \ FHIR-Operations für die Workflow-Steuerung und Einsicht durch den Versicherten\
  \ </li>\n <li>MedicationDispense – GET-Operation für das Einsehen der Medikamentinformationen\
  \ durch den Versicherten </li>\n <li>Communication – GET-, POST, DELETE-Operation\
  \ für das Senden, Empfangen und Löschen von Nachrichten </li>\n <li>AuditEvent –\
  \ GET-Operation für die Einsicht in Protokolleinträge durch den Versicherten </li>\n\
  \ <li>Device – GET-Operation mit statischen Informationen zur serverseitigen Signatur\
  \ damit der Client eine Information über die FHIR-Kompatibilität zum Fachdienst\
  \ erhält.</li>\n </ul>"
title: TI-Flow-Fachdienst - RESTful API Capability Statement
version: 1
