text: 'Der TI-Flow-Fachdienst MUSS beim Löschen einer Communication-Ressource der
  http-Response das http-Header-Feld "Warning" mit dem Zeitpunkt des Nachrichtenabrufs
  durch den Empfänger ergänzen (z.B. "Warning: ''Deleted message delivered at 2020-07-01
  10:30:00''"), wenn die Nachricht bereits durch den Empfänger abgerufen wurde (Communication.received
  ungleich NULL, bzw. enthält Datum des Abrufs), um dem Absender einen Hinweis anzeigen
  zu können.'
title: TI-Flow-Fachdienst - Nachricht löschen - Warning bei Empfänger bereits abgerufen
