text: Der E-Rezept-Fachdienst MUSS beim automatischen Löschen nach Erreichen einer
  Löschfrist gemäß "TAB_eRPFD_004a Versichertenprotokoll nach automatischen Löschen"
  protokollieren und die gelesene bzw. geschriebene Ressource im Protokolleintrag
  AuditEvent.entity.what als Referenz hinzufügen sowie die KVNR des betroffenen Versicherten
  in AuditEvent.entity.name speichern. Mit diesen Informationen kann der Versicherte
  die Zugriffe auf seine Daten nachvollziehen und bei einem unberechtigten Zugriff
  ggf. intervenieren.
title: E-Rezept-Fachdienst - Versichertenprotokoll zu automatischen Löschen
