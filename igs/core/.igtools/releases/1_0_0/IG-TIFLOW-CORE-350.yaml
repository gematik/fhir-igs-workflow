text: Der E-Rezept-Fachdienst MUSS beim Aktivieren eines Tasks mittels HTTP-POST-Operation
  über /Task/&lt;id&gt;/$activate die Operation mit dem Fehlercode 400 und einem Hinweis
  auf die Längenprüfung der PZN ("Länge PZN unzulässig (muss 8-stellig sein))" im
  OperationOutcome) abbrechen, wenn die PZN einer übergebenen PZN-Verordnung in KBV_PR_ERP_Medication_PZN.code.coding.code
  nicht 8-stellig ist.
title: E-Rezept-Fachdienst - Task aktivieren - Längenprüfung PZN
