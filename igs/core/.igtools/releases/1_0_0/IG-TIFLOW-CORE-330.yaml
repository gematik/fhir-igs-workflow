text: "Der TI-Flow-Fachdienst MUSS beim Einstellen einer Nachricht des Profils \"\
  https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_Communication_DispReq\"\
  \ durch einen Versicherten über die http-Operation POST auf den Endpunkt /Communication\
  \ die Zulässigkeit der Übermittlung auf Basis des Flowtypes des referenzierten Tasks\
  \ (Task.extension:flowType) und dem Empfänger Communication.recipient prüfen und\
  \ mit dem http-Status-Code 403 abbrechen, wenn der Empfänger laut TAB_eRPFD_028\
  \ den spezifischen Flowtype nicht empfangen darf.\n <table>\n <tr> \n\t\t<th>Empfänger\
  \ (Präfix der Telematik-ID)</th>\n\t\t<th>Zulässige Flowtypes</th>\n\t</tr>\n\t\
  <tr> \n\t\t<td>oid_oeffentliche_apotheke (3-*, 9-*)</td>\n\t\t<td>160, 166, 200</td>\n\
  \t</tr>\n <tr> \n\t\t<td>oid_kostentraeger (8-*)</td>\n\t\t<td>162</td>\n\t</tr>\n\
  \ </table>\n <div><figcaption><strong>Tabelle: </strong>Tab_eRPFD_028 Zulässige\
  \ Empfänger Communication_DispReq</figcaption></div>"
title: TI-Flow-Fachdienst - Nachricht einstellen - Prüfung des Empfängers
