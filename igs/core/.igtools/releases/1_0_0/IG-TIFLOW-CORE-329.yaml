text: "Der TI-Flow-Fachdienst MUSS das Einstellen einer Nachricht des Profils \"https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_Communication_DispReq\"\
  \ durch einen Versicherten über die http-Operation POST auf den Endpunkt /Communication\
  \ den Versichertenbezug prüfen und, wenn die KVNR des in Communication.basedOn referenzierten\
  \ Tasks Task.for ungleich der KVNR des Einstellenden in \"idNummer\" des übergebenen\
  \ ACCESS_TOKEN ist, die Operation mit dem folgenden Fehler:\n <table id=\"error-code\"\
  \ style=\"border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>400 - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_INSURANT_NOT_ELIGIBLE</td>\n </tr>\n <tr>\n <th>Details Text</th>\n\
  \ <td>-</td>\n </tr>\n </table> \n abbrechen, um irreführende Testnachrichten zu\
  \ unterbinden, die eine vermeidbare Mehrbelastung für den TI-Flow-Fachdienst darstellen."
title: TI-Flow-Fachdienst - Nachricht einstellen - Prüfung Versichertenbezug
version: 1
