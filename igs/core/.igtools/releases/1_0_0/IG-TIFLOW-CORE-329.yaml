text: Der TI-Flow-Fachdienst MUSS das Einstellen einer Nachricht des Profils "https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_Communication_DispReq"
  durch einen Versicherten über die http-Operation POST auf den Endpunkt /Communication
  mit dem http-Status-Code 400 abbrechen, wenn die KVNR des in Communication.basedOn
  referenzierten Tasks Task.for ungleich der KVNR des Einstellenden in "idNummer"
  des übergebenen ACCESS_TOKEN ist, um irreführende Testnachrichten zu unterbinden,
  die eine vermeidbare Mehrbelastung für den TI-Flow-Fachdienst darstellen.
title: TI-Flow-Fachdienst - Nachricht einstellen - Prüfung Versichertenbezug
version: 1
