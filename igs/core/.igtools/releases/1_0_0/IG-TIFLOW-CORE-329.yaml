text: "Der TI-Flow-Fachdienst MUSS das Einstellen einer Nachricht des Profils \"https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_Communication_DispReq\"\
  \ oder \"https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_Communication_Representative\"\
  \ durch einen Versicherten über die http-Operation POST auf den Endpunkt /Communication\
  \ mit dem http-Status-Code 400 abbrechen, wenn \n <ul><li>\n die KVNR des in Communication.basedOn\
  \ referenzierten Tasks Task.for ungleich der KVNR des Einstellenden in \"idNummer\"\
  \ des übergebenen ACCESS_TOKEN\n </li></ul>\n und\n <ul><li>\n der http-Header \"\
  X-AccessCode\" fehlt oder der im http-Header \"X-AccessCode\" übergebene AccessCode\
  \ ungleich dem AccessCode-Identifier des referenzierten Tasks\n </li></ul>\n ist,\
  \ um irreführende Testnachrichten zu unterbinden, die eine vermeidbare Mehrbelastung\
  \ für den TI-Flow-Fachdienst darstellen."
title: TI-Flow-Fachdienst - Nachricht einstellen - Prüfung Versichertenbezug und Berechtigung
