text: Der TI-Flow-Fachdienst MUSS beim Löschen eines E-Rezepts über den mittels der
  &#60;id&#62; adressierten/Task/&#60;id&#62;/$abort durch verordnende Leistungserbringer
  den im HTTP-Header "X-AccessCode" gegen den im referenzierten Task enthaltenen AccessCode
  prüfen und bei Missmatch oder Fehlen im HTTP-Header, den Aufruf mit dem HTTP-Fehlercode
  403 abweisen, damit ausschließlich die verordnende Leistungserbringerinstitution
  in Kenntnis des AccessCodes als Berechtigte ein E-Rezept löschen.
title: TI-Flow-Fachdienst - E-Rezept löschen - Verordnender - Prüfung AccessCode
