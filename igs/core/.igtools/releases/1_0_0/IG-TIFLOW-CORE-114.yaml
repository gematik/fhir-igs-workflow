text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf einen einzelnen\
  \ Task mittels \"/Task/&lt;id&gt;?ac=...\" durch eine abgebende Institution die\
  \ zum referenzierten Task in Task.owner gespeicherte Telematik-ID der abgebenden\
  \ Institution mit der Telematik-ID aus dem ACCESS_TOKEN vergleichen und bei Ungleichheit\
  \ die Operation mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"border:\
  \ 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>412\
  \ - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n\
  \ <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_AUTH_NOT_OWNER</td>\n </tr>\n <tr>\n <th>Details Text</th>\n <td>-</td>\n\
  \ </tr>\n </table> \n abbrechen, damit der Zugriff auf diesen Datensatz nur durch\
  \ Berechtigte erfolgt."
title: TI-Flow-Fachdienst - Task abrufen - abgebende Institution - Verordnung abrufen
  - Prüfung Telematik-ID
version: 1
