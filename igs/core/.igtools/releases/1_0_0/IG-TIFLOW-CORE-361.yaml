text: "Der E-Rezept-Fachdienst MUSS beim Einstellen einer Nachricht über die http-Operation\
  \ POST auf den Endpunkt /Communication den Inhalt der contentString-Eigenschaft\
  \ des GEM_ERP_PR_Communication_Reply-Profils auf valides JSON überprüfen und, falls\
  \ die Inhalte des strukturierten JSON die unter \"Prüfungsoperationen durch den\
  \ Fachdienst\" aufgeführten Anforderungen nicht erfüllen, mit einem Http-Fehler\
  \ 400 (Bad Request) abbrechen sowie mit einer aussagekräftigen Fehlermeldung in\
  \ Form einer eingebetteten OperationOutcome-Ressource antworten. \n     \n     <table>\n\
  \  <thead>\n    <tr>\n      <th>Attribut</th>\n      <th>Pflicht / Optional</th>\n\
  \      <th>Prüfungsoperationen durch den Fachdienst</th>\n    </tr>\n  </thead>\n\
  \  <tbody>\n    <tr>\n      <td>version</td>\n      <td>Pflicht</td>\n      <td>Der\
  \ Wert muss immer 1 sein.</td>\n    </tr>\n    <tr>\n      <td>supplyOptionsType</td>\n\
  \      <td>Pflicht</td>\n      <td>Einer der folgenden Werte muss gesetzt sein:\
  \ \"onPremise\", \"delivery\", \"shipment\".</td>\n    </tr>\n    <tr>\n      <td>info_text</td>\n\
  \      <td>Optional</td>\n      <td>Die Zeichenlänge darf maximal 500 Zeichen betragen.</td>\n\
  \    </tr>\n    <tr>\n      <td>url</td>\n      <td>Optional</td>\n      <td>Wenn\
  \ gesetzt, muss der übermittelte String eine valide URL gemäß RFC3986 sein. Die\
  \ Zeichenlänge darf maximal 500 Zeichen betragen.</td>\n    </tr>\n    <tr>\n  \
  \    <td>pickUpCodeHR</td>\n      <td>Optional</td>\n      <td>Wenn gesetzt, muss\
  \ das Attribut supplyOptionsType den Wert \"onPremise\" haben und die Zeichenlänge\
  \ darf maximal 8 Zeichen betragen.</td>\n    </tr>\n    <tr>\n      <td>pickUpCodeDMC</td>\n\
  \      <td>Optional</td>\n      <td>Wenn gesetzt, muss das Attribut supplyOptionsType\
  \ den Wert \"onPremise\" haben und die Zeichenlänge darf maximal 128 Zeichen betragen.</td>\n\
  \    </tr>\n  </tbody>\n</table>\n<div><figcaption><strong>Tabelle: </strong>Prüfungsoperationen\
  \ durch den Fachdienst GEM_ERP_PR_Communication_Reply-Profil</figcaption></div>"
title: E-Rezept-Fachdienst - Nachricht einstellen - Validierung des Payload-Inhalt
  von GEM_ERP_PR_Communication_Reply
version: 0
