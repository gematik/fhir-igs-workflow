text: Der E-Rezept-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation
  über /Task/&#60;id&#62;/$activate den im HTTP-RequestHeader "X-AccessCode" oder
  URL-Parameter "?ac=..." übertragenen AccessCode gegen den im referenzierten Task
  gespeicherten AccessCode Task.identifier:AccessCode als https://gematik.de/fhir/erp/NamingSystem/GEM_ERP_NS_AccessCode
  und den Status des Tasks auf Task.status = draft prüfen und bei Ungleichheit oder
  Fehlen des HTTP-Headers die Operation mit dem HTTP-Fehlercode 403 abbrechen, damit
  Zugriffe auf diesen Datensatz nur durch Berechtigte in Kenntnis des AccessCodes
  erfolgen.
