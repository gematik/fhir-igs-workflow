text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET, DELETE und POST-Operation\
  \ auf den Endpunkt /Communication bzw. /Communication/&lt;id&gt; sicherstellen,\
  \ dass ausschließlich Versicherte, Leistungserbingerinstitutionen und Kostenträger\
  \ in der Rolle\n <ul>\n <li>oid_versicherter</li>\n <li>oid_oeffentliche_apotheke</li>\n\
  \ <li>oid_krankenhausapotheke</li>\n <li>oid_kostentraeger</li>\n </ul>\n die Operation\
  \ am Fachdienst aufrufen dürfen und die Rolle \"professionOID\" des Aufrufers im\
  \ ACCESS_TOKEN im HTTP-RequestHeader \"Authorization\" feststellen, damit der Nachrichtenaustausch\
  \ nicht zwischen Unbefugten erfolgt."
