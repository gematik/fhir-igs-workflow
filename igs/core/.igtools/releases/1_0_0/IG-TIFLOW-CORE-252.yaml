text: Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation
  über /Task/&lt;id&gt;/$accept für den referenzierten Task den identifier aus den
  Nutzerinformationen (Telematik-ID) in Task.owner speichern, damit sichergestellt
  werden kann, dass nachfolgende Zugriffe auf diesen Datensatz nur durch Berechtigte
  erfolgen kann.
