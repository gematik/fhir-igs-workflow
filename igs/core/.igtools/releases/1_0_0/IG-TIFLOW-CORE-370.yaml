text: "Der TI-Flow-Fachdienst MUSS bei der Handhabung der Rückgabe von mehreren FHIR-Objekten\
  \ die Paginierung nach FHIR ermöglichen und folgende URL-Parameter unterstützen:\
  \ \n \n<table>\n<thead>\n<tr>\n<th>URL-Parameter</th>\n<th>Bedeutung und Funktion</th>\n\
  </tr>\n</thead>\n<tbody>\n<tr>\n<td>_count</td>\n<td>Anzahl der Elemente (Bundle.entry)\
  \ im Bundle. Maximum ist 50.</td>\n</tr>\n<tr>\n<td>__offset</td>\n<td>Nullbasierter\
  \ Index der Ergebnismenge ab welchem die Elemente angezeigt werden. Default ist\
  \ 0.</td>\n</tr>\n</tbody>\n</table>\n\n<div><figcaption><strong>Tabelle: </strong>Paginierungsparameter\
  \ für die Handhabung der Rückgabe von mehreren FHIR-Objekten</figcaption></div>"
title: TI-Flow-Fachdienst - Handhabung der Rückgabe von mehreren FHIR-Objekten - URL-Parameter
  für Paginierung
