text: "Das PS der abgebenden LEI MUSS im Anwendungsfall \"E-Rezept abrufen\" zum Herunterladen\
  \ des E-Rezepts die HTTP-Operation POST /Task/&#60;id&#62;/$accept mit\n    <ul>\
  \ \n        <li>ACCESS_TOKEN im Authorization-Header</li>\n        <li>Task-ID in\
  \ URL &#60;id&#62;</li>\n        <li>AccessCode im X-AccessCode-Header oder als\
  \ URL-Parameter ?ac=</li>\n    </ul>\n    ausführen."
