text: Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation
  über /Task/&#60;id&#62;/$reject die externe ID in Task.identifier:Secret als https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_Secret
  löschen und den Status des referenzierten Tasks auf Task.status = ready setzen,
  damit nachfolgende Zugriffe auf diesen Datensatz durch Berechtigte in Kenntnis des
  AccessCodes erfolgen können.
title: TI-Flow-Fachdienst - Task zurückweisen - Secret löschen und Status setzen
