text: 'Der TI-Flow-Fachdienst MUSS die zulässige Anzahl der Communication-Ressourcen
  des Schemas https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_Communication_Representative
  zur Versicherter-zu-Versichertem-Kommunikation auf einen konfigurierbaren Maximalwert
  (Default: 10) je referenziertem Task beschränken und bei Überschreiten des Maximalwerts
  das Einstellen einer Nachricht mit dem http-Status-Code 429 abbrechen, damit Versicherte
  den TI-Flow-Fachdienst nicht für beliebige Kommunikation außerhalb der Vertretung
  in der Einlösung von E-Rezepten benutzen.'
title: TI-Flow-Fachdienst - Nachricht einstellen - Versicherter-zu-Versichertem-Kommunikation
