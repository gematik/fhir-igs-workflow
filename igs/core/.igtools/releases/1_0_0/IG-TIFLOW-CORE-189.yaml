text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der http-POST-Operation /Task/&#60;id&#62;/$activate\
  \ einen im FHIR Profil KBV_PR_FOR_Patient gespeicherten Wert für Patient.identifier:versichertenId.value\
  \ gemäß der Anlage 1 der \"Prüfziffernberechnung für die Krankenversichertennummer\
  \ nach § 290 SGB V\" vom 26.02.2019 beschriebenen Prüfalgorithmus validieren, und\
  \ bei einer fehlerhaften Prüfung die Operation mit dem folgenden Fehler:\n <table\
  \ id=\"error-code\" style=\"border: 1px solid black; border-collapse: collapse;\"\
  >\n <tr>\n <th>HTTP-Code</th>\n <td>400 - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n\
  \ <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n\
  \ <th>Details Code</th>\n <td>TIFLOW_KVNR_INVALID</td>\n </tr>\n <tr>\n <th>Details\
  \ Text</th>\n <td>Ungültige Versichertennummer (KVNR): Die übergebene Versichertennummer\
  \ des Patienten entspricht nicht den Prüfziffer-Validierungsregeln.</td>\n </tr>\n\
  \ </table> \n abbrechen."
title: TI-Flow-Fachdienst - Task aktivieren - Überprüfung KVNR im Profil KBV_PR_FOR_Patient
version: 1
