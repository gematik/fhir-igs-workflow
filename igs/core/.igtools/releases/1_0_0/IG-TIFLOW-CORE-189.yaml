text: 'Der TI-Flow-Fachdienst MUSS beim Aufruf der http-POST-Operation /Task/&#60;id&#62;/$activate
  einen im FHIR Profil KBV_PR_FOR_Patient gespeicherten Wert für Patient.identifier:versichertenId.value
  gemäß der Anlage 1 der "Prüfziffernberechnung für die Krankenversichertennummer
  nach § 290 SGB V" vom 26.02.2019 beschriebenen Prüfalgorithmus validieren, und bei
  einer fehlerhaften Prüfung mit einem Http-Fehler 400 (Bad Request) abbrechen sowie
  die Fehlermeldung "Ungültige Versichertennummer (KVNR): Die übergebene Versichertennummer
  des Patienten entspricht nicht den Prüfziffer-Validierungsregeln." in Form einer
  OperationOutcome ausliefern.'
title: TI-Flow-Fachdienst - Task aktivieren - Überprüfung KVNR im Profil KBV_PR_FOR_Patient
