text: "Der TI-Flow-Fachdienst MUSS das QES-Signaturzertifikat C.HP.QES in der Signatur\
  \ des übergebenen QES-Datensatzes gemäß [gemSpec_PKI#TUC_PKI_030] auf Gültigkeit\
  \ prüfen. Wenn die Abfrage des OCSP-Response für das Signaturzertifikat fehlschlägt,\
  \ muss der HTTP-Request mit dem folgenden Fehler:\n      <table id=\"error-code\"\
  \ style=\"border: 1px solid black; border-collapse: collapse;\">\n        <tr>\n\
  \            <th>HTTP-Code</th>\n            <td>512 - OCSP Backend Error</td>\n\
  \        </tr>\n        <tr>\n            <th>Severity</th>\n            <td>error</td>\n\
  \        </tr>\n        <tr>\n            <th>Code</th>\n            <td>invalid</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Code</th>\n            <td>TIFLOW_OCSP_BACKEND_ERROR</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Text</th>\n            <td>OCSP\
  \ Backend Error</td>\n        </tr>\n    </table> HTTP-Status-Code 512 abgelehnt\
  \ werden."
