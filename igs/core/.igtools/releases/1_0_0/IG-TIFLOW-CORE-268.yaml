text: "Der TI-Flow-Fachdienst MUSS alle Zugriffe auf die Ressource Pushers mittels\
  \ der HTTP-Operationen PUT, PATCH, HEAD und DELETE unterbinden und mit dem folgenden\
  \ Fehler:\n <table id=\"error-code-json\" style=\"border: 1px solid black; border-collapse:\
  \ collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>405 - Method Not Allowed</td>\n\
  \ </tr>\n <tr>\n <th>Error Code</th>\n <td>methodNotAllowed</td>\n </tr>\n <tr>\n\
  \ <th>Error Details</th>\n <td>Die verwendete HTTP-Methode ist für diese Ressource\
  \ nicht zulässig</td>\n </tr>\n </table> \n abbrechen, damit keine unzulässigen\
  \ Operationen ausgeführt werden können."
