text: 'Der E-Rezept-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation
  über /Task/&lt;id&gt;/$accept die Operation mit dem Fehlercode 403 abbrechen, wenn
  das Ende der Einlösefrist (Task.ExpiryDate) zu einem früherem Zeitpunkt als das
  aktuelle Datum liegt, da Verordnungen nur bis Ende der Einlösefrist abgerufen werden
  dürfen. Im Falle dieses Fehlers ist im OperationOutcome des Response das Ende der
  Einlösefrist wie folgt anzugeben: "Verordnung bis &lt;Datum&gt; einlösbar.", wobei
  &lt;Datum&gt; der Wert Task.ExpiryDate im Format "dd.mm.yyyy" ist.'
title: E-Rezept-Fachdienst - Task akzeptieren - Ende Einlösefrist prüfen
