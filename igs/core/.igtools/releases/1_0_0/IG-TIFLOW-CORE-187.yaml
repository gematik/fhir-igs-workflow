text: 'Der TI-Flow-Fachdienst MUSS beim Aufruf der http-POST-Operation /Task/&#60;id&#62;/$activate
  einen im FHIR Profil KBV_PR_FOR_Coverage gespeicherten Wert für payor.identifier.value
  gemäß dem im "Gemeinsames Rundschreiben Institutionskennzeichen (IK)" vom 01.06.2020
  unter Kapitel 1.2.5 "Prüfziffer" beschriebenen Prüfalgorithmus validieren, und bei
  einer fehlerhaften Prüfung den Prozess mit einem Http-Fehler 400 (Bad Request) abbrechen
  sowie die Fehlermeldung "Ungültiges Institutionskennzeichen (IKNR): Das übergebene
  Institutionskennzeichen im Versicherungsstatus entspricht nicht den Prüfziffer-Validierungsregeln."
  in Form einer OperationOutcome ausliefern.'
title: TI-Flow-Fachdienst - Task aktivieren - Überprüfung der IK Nummer im Profil
  KBV_PR_FOR_Coverage
