text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der http-POST-Operation /Task/&#60;id&#62;/$activate\
  \ einen im FHIR Profil KBV_PR_FOR_Coverage gespeicherten Wert für payor.identifier.value\
  \ gemäß dem im \"Gemeinsames Rundschreiben Institutionskennzeichen (IK)\" vom 01.06.2020\
  \ unter Kapitel 1.2.5 \"Prüfziffer\" beschriebenen Prüfalgorithmus validieren, und\
  \ bei einer fehlerhaften Prüfung den Prozess mit dem folgenden Fehler:\n <table\
  \ id=\"error-code\" style=\"border: 1px solid black; border-collapse: collapse;\"\
  >\n <tr>\n <th>HTTP-Code</th>\n <td>400 - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n\
  \ <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n\
  \ <th>Details Code</th>\n <td>TIFLOW_IKNR_INVALID</td>\n </tr>\n <tr>\n <th>Details\
  \ Text</th>\n <td>Ungültiges Institutionskennzeichen (IKNR): Das übergebene Institutionskennzeichen\
  \ im Versicherungsstatus entspricht nicht den Prüfziffer-Validierungsregeln.</td>\n\
  \ </tr>\n </table> \n abbrechen."
title: TI-Flow-Fachdienst - Task aktivieren - Überprüfung der IK Nummer im Profil
  KBV_PR_FOR_Coverage
