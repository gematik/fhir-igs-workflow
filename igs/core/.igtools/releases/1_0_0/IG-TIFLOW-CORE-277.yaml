text: Die Produkttypen der Anwendung E-Rezept und die Clientsysteme des TI-Flow-Fachdienstes
  MÜSSEN bei der Erstellung jeder FHIR-Ressource sicherstellen, dass im Element meta.profile
  genau ein Eintrag enthalten ist, wenn im Profil das Element meta.profile verpflichtend
  anzugeben ist; bei Abweichung ist die Ressource als fehlerhaft zu behandeln und
  darf nicht übermittelt werden.
