text: "Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation\
  \ über /Task/&#60;id&#62;/$activate, wenn das Datum authoredOn zur Gültigkeitsberechnung\
  \ der Verordnung nicht dem Datum in QES.Erstellung im Signaturobjekt entspricht,\
  \ die Operation mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"border:\
  \ 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>400\
  \ - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n\
  \ <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_SIGNATURE_AUTHOREDON_MISMATCH</td>\n </tr>\n <tr>\n <th>Details Text</th>\n\
  \ <td>Ausstellungsdatum und Signaturzeitpunkt weichen voneinander ab, müssen aber\
  \ taggleich sein</td>\n </tr>\n </table> \n abbrechen."
