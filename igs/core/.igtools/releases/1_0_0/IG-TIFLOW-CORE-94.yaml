text: Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt
  /Task mit den URL-Parameter pnw="..." durch eine abgebende LEI, falls das Ergebnis
  im VSDM Prüfungsnachweis gleich 3 ist und URL-Parameter kvnr="..." übermittelt wurde, die
  IKNR des neuesten E-Rezeptes (wenn vorhanden) zum Fachdienst VSDM mappen, damit
  der TI-Flow-Fachdienst feststellen kann, welcher Status AcceptPN3VSDMxx zu prüfen
  ist.
