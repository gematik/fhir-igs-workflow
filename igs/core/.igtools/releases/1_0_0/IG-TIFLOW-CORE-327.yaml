text: Der E-Rezept-Fachdienst MUSS die zulässige Aktivierung eines Tasks mittels /Task/&#60;id&#62;/$activate-Operation
  im Status Task.status = ready vollziehen und bei erfolgreichem Abschluss der Operation
  die Ressource Task im HTTP-Body der HTTP-Response zurückgeben, damit die verordnende
  Leistungserbringerinstitution über den erfolgreichen Abschluss der Operation in
  Kenntnis gesetzt wird.
