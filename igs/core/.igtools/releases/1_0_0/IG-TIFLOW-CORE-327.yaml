text: "Der TI-Flow-Fachdienst MUSS beim Einstellen einer Nachricht über die http-Operation\
  \ POST auf den Endpunkt /Communication den Empfänger prüfen und, wenn der Empfänger\
  \ Communication.recipient gleich der Absenderidentifikation im Attribut idNummer\
  \ des übergebenen ACCESS_TOKEN im HTTP-Header \"Authorization\" ist, die Operation\
  \ mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"border: 1px solid\
  \ black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>400 - Bad\
  \ Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n\
  \ <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n <td>TIFLOW_MESSAGE_TO_SELF</td>\n\
  \ </tr>\n <tr>\n <th>Details Text</th>\n <td>-</td>\n </tr>\n </table> \n abbrechen,\
  \ damit irreführende Kommunikationsbeziehungen nicht zu einer vermeidbaren Mehrbelastung\
  \ des TI-Flow-Fachdienstes führen."
title: TI-Flow-Fachdienst - Nachricht einstellen - Ausschluss Nachrichten an Empfänger
  gleich Absender
version: 1
