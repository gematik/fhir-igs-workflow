text: Der E-Rezept-Fachdienst MUSS beim Löschen eines E-Rezepts über den mittels der
  &#60;id&#62; adressierten/Task/&#60;id&#62;/$abort durch verordnende Leistungserbringer
  den im referenzierten Task gespeicherten Status Task.status prüfen und mit dem Fehler
  412 abbrechen, wenn Task.status ungleich "ready" ist, damit die verordnende Leistungserbringerinstitution
  eine Verordnung nur löschen kann, wenn sie sich noch nicht in Belieferung befindet
  oder beliefert wurde.
