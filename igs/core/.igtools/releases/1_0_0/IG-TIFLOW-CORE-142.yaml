text: "Der TI-Flow-Fachdienst MUSS beim Löschen eines E-Rezepts über den mittels der\
  \ &#60;id&#62; adressierten/Task/&#60;id&#62;/$abort durch verordnende Leistungserbringer\
  \ den im referenzierten Task gespeicherten Status Task.status prüfen und, wenn Task.status\
  \ ungleich \"ready\" ist, mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"\
  border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>412 - Precondition Failed</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_TASK_STATUS_MISMATCH</td>\n </tr>\n <tr>\n <th>Details Text</th>\n\
  \ <td>Task has invalid status.</td>\n </tr>\n </table> \n abbrechen, damit die verordnende\
  \ Leistungserbringerinstitution eine Verordnung nur löschen kann, wenn sie sich\
  \ noch nicht in Belieferung befindet oder beliefert wurde."
title: TI-Flow-Fachdienst - E-Rezept löschen - Verordnender - Prüfung Status
version: 1
