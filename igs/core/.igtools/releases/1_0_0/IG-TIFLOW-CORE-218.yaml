text: Der TI-Flow-Fachdienst MUSS die im Body der HTTP-POST-Operation auf die Ressource
  Task übertragenen Parameter gegen das Schema http://gematik.de/fhir/erp/OperationDefinition/CreateOperationDefinition
  prüfen und bei Nicht-Konformität das Anlegen der Ressource im Fachdienst mit dem
  http-Status-Code 400 beantworten, damit kein Schadcode und keine "fachfremden" Daten
  in den TI-Flow-Fachdienst hochgeladen werden.
