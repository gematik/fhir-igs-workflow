text: "Der TI-Flow-Fachdienst MUSS die im Body der HTTP-POST-Operation auf die Ressource\
  \ Task übertragenen Parameter gegen das Schema http://gematik.de/fhir/erp/OperationDefinition/CreateOperationDefinition\
  \ prüfen und bei Nicht-Konformität das Anlegen der Ressource im Fachdienst mit dem\
  \ folgenden Fehler:\n <table id=\"error-code\" style=\"border: 1px solid black;\
  \ border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>400 - Bad Request</td>\n\
  \ </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n\
  \ <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n <td>SVC_VALIDATION_FAILED</td>\n\
  \ </tr>\n <tr>\n <th>Details Text</th>\n <td>FHIR Profile Validation Failed</td>\n\
  \ </tr>\n </table> \n beantworten, damit kein Schadcode und keine \"fachfremden\"\
  \ Daten in den TI-Flow-Fachdienst hochgeladen werden."
title: TI-Flow-Fachdienst - Task erzeugen - Schemavalidierung Rezept anlegen
