text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt\
  \ /Task mit den URL-Parameter pnw=\"...\" durch eine abgebende LEI, falls im VSDM\
  \ Prüfungsnachweis eine Prüfziffer enthalten ist, die Tasks nach\n <ul>\n <li>Task.status=\
  \ \"ready\"</li>\n <li>Task.for = KVNRfür die KVNR aus der Prüfziffer des Prüfungsnachweises</li>\n\
  \ <li>Task.ExpiryDatenicht vor dem aktuellen Datum liegt</li>\n <li>und Task.extension:flowType\
  \ = 160 oder 166</li>\n </ul>\n filtern und in einem Bundle der gefundenen Tasks\
  \ (ohne den signierte Anhang QES) zurückgeben, damit eine Apotheke alle zu einem\
  \ Versicherten gehörenden E-Rezepte mit dem Status \"ready\" abrufen kann."
title: TI-Flow-Fachdienst - Rezepte lesen - Apotheke - VSDM - Filter Status, KVNR
  und Workflowtype
