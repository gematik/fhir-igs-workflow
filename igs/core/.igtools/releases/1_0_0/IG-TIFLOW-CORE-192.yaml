text: 'Der TI-Flow-Fachdienst MUSS für die Überprüfung der ANR/ZANR, wenn bei der
  Prüfung eine Auffälligkeit auftritt und die Konfiguration Fehler aktiv ist, mit
  dem Http-Fehlercode 400 abbrechen und die Fehlermeldung "Ungültige Arztnummer (LANR
  oder ZANR): Die übergebene Arztnummer entspricht nicht den Prüfziffer-Validierungsregeln."
  in Form einer OperationOutcome ausliefern.'
