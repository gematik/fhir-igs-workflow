text: Der E-Rezept-Fachdienst MUSS beim Aufruf der Http-POST-Operation auf die /Subscription
  Ressource durch eine abgebende Leistungserbringerinstitution (Apotheke), diese anhand
  der Telematik-ID aus dem ACCESS_TOKEN im "Authorization"-Header des HTTP-Requests
  identifizieren, diese gegen die in der Ressource im Element criteria Attribut receipient
  hinterlegte Telematik-ID prüfen und bei Ungleichheit den Aufruf mit dem HTTP-Fehlercode
  403 abweisen, damit ausschließlich die Apotheke für sich selbst eine Subscription
  registrieren kann.
title: E-Rezept-Fachdienst – Subscription registrieren – Prüfung Telematik-ID
