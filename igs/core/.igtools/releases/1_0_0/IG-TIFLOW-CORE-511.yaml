text: Der E-Rezept-Fachdienst MUSS beim Aufruf der Http-POST-Operation auf die /Subscription
  Ressource sicherstellen, dass ausschließlich Nutzer in der Rolle oid_oeffentliche_apotheke
  oid_krankenhausapotheke oid_kostentraeger die Operation am E-Rezept-Fachdienst aufrufen
  dürfen und die Rolle "professionOID" des Aufrufers im ACCESS_TOKEN im HTTP-RequestHeader
  "Authorization" feststellen, damit eine Subscription nicht durch Unberechtigte registriert
  werden kann.
title: E-Rezept-Fachdienst – Subscription registrieren – Rollenprüfung
