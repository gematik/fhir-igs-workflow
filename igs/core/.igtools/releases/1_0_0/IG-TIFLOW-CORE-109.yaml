text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf einen konkreten\
  \ über &lt;id&gt; adressierten /Task/&lt;id&gt; (ohne die Referenz einer FHIR-Operation)\
  \ sicherstellen, dass ausschließlich Clientsysteme in einer der Rollen \n <ul>\n\
  \ <li>oid_versicherter</li>\n <li>oid_oeffentliche_apotheke</li>\n <li>oid_krankenhausapotheke</li>\n\
  \ <li>oid_kostentraeger</li> \n </ul>\n die Operation am Fachdienst aufrufen dürfen\
  \ und die Rolle \"professionOID\" des Aufrufers im ACCESS_TOKEN im HTTP-RequestHeader\
  \ \"Authorization\" feststellen, damit E-Rezepte nicht durch Unberechtigte ausgelesen\
  \ werden können."
title: TI-Flow-Fachdienst - Task abrufen - Rollenprüfung
