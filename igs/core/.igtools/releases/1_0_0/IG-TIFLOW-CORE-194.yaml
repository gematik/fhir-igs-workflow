text: 'Der TI-Flow-Fachdienst MUSS beim Aufruf der http-POST-Operation /Task/&#60;id&#62;/$activate
  den im FHIR Profil KBV_PR_ERP_Medication_PZN gespeicherten Wert für code.coding:pznCode.code
  gemäß den "Technischen Hinweisen zur PZN-Codierung - Prüfziffernberechnungen der
  PZN, PPN und Basic UDI-DI" beschriebenen Prüfalgorithmus validieren, und bei einer
  fehlerhaften Prüfung mit einem Http-Fehler 400 (Bad Request) abbrechen sowie die
  Fehlermeldung "Ungültige PZN: Die übergebene Pharmazentralnummer entspricht nicht
  den vorgeschriebenen Prüfziffer-Validierungsregeln." in Form einer OperationOutcome
  ausliefern.'
