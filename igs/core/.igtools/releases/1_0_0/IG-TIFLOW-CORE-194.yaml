text: "Das PS der abgebenden LEI MUSS im Anwendungsfall \"E-Rezept durch Abgebenden\
  \ zurückgeben\" für das zurückzugebende E-Rezept die HTTP-Operation POST /Task/&lt;id&gt;/$reject\
  \ mit \n  <ul>\n    <li>ACCESS_TOKEN im Authorization-Header</li>\n    <li>Task-ID\
  \ in URL &lt;id&gt; </li>\n    <li>Geheimnis in URL-Parameter ?secret=</li>\n  </ul>\n\
  \  ausführen."
