  TI_Flow_FD:
  - Produkttest
text: "Der TI-Flow-Fachdienst MUSS beim Beenden eines Tasks mittels POST /Task/&lt;id&gt;/$close\
  \ das im HTTP-Body des Requests enthaltene Parameters-Objekt gegen das Profil https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_PAR_CloseOperation_Input\
  \ prüfen, insbesondere bei der darin enthaltenen MedicationDispense:\n <ul>\n <li>die\
  \ Korrektheit der Rezept-ID https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_PrescriptionId\
  \ als MedicationDispense.identifier,</li>\n <li>die KVNR des Versicherten im referenzierten\
  \ Task (Task.for) gegen KVNR in MedicationDispense.subject:identifier und</li>\n\
  \ <li>ob die Telematik-ID der Apotheke gemäß ACCESS_TOKEN mit dem Wert in MedicationDispense.performer.actor:identifier\
  \ übereinstimmt</li>\n </ul>\n und im Fehlerfall die Operation mit Http-Fehlercode\
  \ 400 abbrechen."
title: TI-Flow-Fachdienst - Task schließen - Schemaprüfung MedicationDispense
version: 0
