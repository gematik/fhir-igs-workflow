text: "Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation\
  \ über /Task/&lt;id&gt;/$accept die Operation mit dem folgenden Fehler:\n <table\
  \ id=\"error-code\" style=\"border: 1px solid black; border-collapse: collapse;\"\
  >\n <tr>\n <th>HTTP-Code</th>\n <td>403 - Forbidden</td>\n </tr>\n <tr>\n <th>Severity</th>\n\
  \ <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n\
  \ <th>Details Code</th>\n <td>TIFLOW_TASK_EXPIRED</td>\n </tr>\n <tr>\n <th>Details\
  \ Text</th>\n <td>Verordnung bis %d einlösbar.</td>\n </tr>\n </table> \n abbrechen,\
  \ wenn das Ende der Einlösefrist (Task.ExpiryDate) zu einem früherem Zeitpunkt als\
  \ das aktuelle Datum liegt, da Verordnungen nur bis Ende der Einlösefrist abgerufen\
  \ werden dürfen. Im Falle dieses Fehlers ist im OperationOutcome des Response das\
  \ Ende der Einlösefrist wie folgt anzugeben: \"Verordnung bis &lt;Datum&gt; einlösbar.\"\
  , wobei &lt;Datum&gt; der Wert Task.ExpiryDate im Format \"dd.mm.yyyy\" ist."
title: TI-Flow-Fachdienst - Task akzeptieren - Ende Einlösefrist prüfen
version: 1
