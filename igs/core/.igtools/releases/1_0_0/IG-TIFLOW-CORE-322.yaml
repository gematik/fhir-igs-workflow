text: 'Der TI-Flow-Fachdienst MUSS beim Einstellen einer Nachricht über die http-Operation
  POST auf den Endpunkt /Communication, falls die Ressource dem GEM_ERP_PR_Communication_Reply-Profil
  entspricht, den Inhalt der contentString-Eigenschaft auf valides JSON sowie gegen
  die Struktur in "Tabelle: Nachricht als Apotheke an einen Versicherten schicken"
  überprüfen und bei negativem Prüfergebnis, mit einem Http-Fehler 400 (Bad Request)
  abbrechen sowie mit einer aussagekräftigen Fehlermeldung in Form einer eingebetteten
  OperationOutcome-Ressource antworten.'
title: TI-Flow-Fachdienst - Nachricht einstellen - Validierung Payload  GEM_ERP_PR_Communication_Reply
