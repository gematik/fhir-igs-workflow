text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-DELETE-Operation auf /Communication/&lt;id&gt;
  die über &lt;id&gt; identifizierte Communication-Ressource anhand der KVNR bzw.
  Telematik-ID des aufrufenden Nutzers im ACCESS_TOKEN im "Authorization"-Header des
  HTTP-Requests über das Absender-Attribut Communication.sender lokalisieren und löschen,
  damit Nutzer irrtümlich versendete oder nicht mehr gewünschte Nachrichten vom E-Rezept-Fachdienst
  entfernen können.
