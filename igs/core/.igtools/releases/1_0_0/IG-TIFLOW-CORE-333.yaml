text: Der TI-Flow-Fachdienst MUSS beim Einstellen einer Nachricht über die http-Operation
  POST auf den Endpunkt /Communication mit GEM_ERP_PR_Communication_DispReq-Ressource
  für den in Communication.basedOn referenzierten Task prüfen, dass Task.ExpiryDate
  nicht zu einem früheren Zeitpunkt als dem aktuellem Datum liegt und anderenfalls
  mit dem Http-Fehler 400 und dem OperationOutcome "Task has expired." abbrechen,
  damit ausschließlich E-Rezepte zugewiesen werden, welche deren Einlösefrist noch
  nicht erreicht ist.
