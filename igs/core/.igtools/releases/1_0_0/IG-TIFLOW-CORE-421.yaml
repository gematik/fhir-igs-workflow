text: "Der TI-Flow-Fachdienst MUSS an den Schnittstellen prüfen, dass der HTTP-Request\
  \ well-formed ist und andernfalls die Anfrage mit dem folgenden Fehler:\n      <table\
  \ id=\"error-code\" style=\"border: 1px solid black; border-collapse: collapse;\"\
  >\n        <tr>\n            <th>HTTP-Code</th>\n            <td>400 - Bad Request</td>\n\
  \        </tr>\n        <tr>\n            <th>Severity</th>\n            <td>error</td>\n\
  \        </tr>\n        <tr>\n            <th>Code</th>\n            <td>invalid</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Code</th>\n            <td>MSG_BAD_FORMAT</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Text</th>\n            <td>Invalid\
  \ request format</td>\n        </tr>\n      </table>\n      abbrechen, damit nur\
  \ korrekt formattierte Requests verarbeitet werden."
title: TI-Flow-Fachdienst - Fehlerbehandlung - HTTP Formatfehler
