text: "Der E-Rezept-Fachdienst MUSS das Einstellen einer Nachricht über die http-Operation\
  \ POST auf den Endpunkt /Communication mit dem http-Status-Code 400 abbrechen, wenn\n\
  \    <ul>\n        <li>der Nachrichteninhalt Communication.payload größer als 10\
  \ kByte ist oder</li>\n        <li>in von Versicherten eingestellten Nachrichten\
  \ in Communication.payload eine externe URLs enthält oder</li>\n        <li>ein\
  \ Attachment mit MimeType \"application/*\" enthält,</li>\n    </ul>\n    damit\
  \ über den E-Rezept-Fachdienst kein Schadcode verteilt wird."
title: E-Rezept-Fachdienst - Nachricht einstellen - Schadcodeprüfung
