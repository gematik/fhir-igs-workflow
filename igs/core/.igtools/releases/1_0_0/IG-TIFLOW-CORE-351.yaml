text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der Http-POST-Operation auf die /Subscription\
  \ Ressource durch eine abgebende Leistungserbringerinstitution (Apotheke), diese\
  \ anhand der Telematik-ID aus dem ACCESS_TOKEN im \"Authorization\"-Header des HTTP-Requests\
  \ identifizieren, diese gegen die in der Ressource im Element criteria Attribut\
  \ receipient hinterlegte Telematik-ID prüfen und bei Ungleichheit den Aufruf mit\
  \ dem folgenden Fehler:\n <table id=\"error-code\" style=\"border: 1px solid black;\
  \ border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>403 - Forbidden</td>\n\
  \ </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n\
  \ <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n <td>SVC_IDENTITY_MISMATCH</td>\n\
  \ </tr>\n <tr>\n <th>Details Text</th>\n <td>Identity mismatch: Access token or\
  \ x-insurantid header does not match FHIR data (Telematik-ID / KVNR)</td>\n </tr>\n\
  \ </table> \n abweisen, damit ausschließlich die Apotheke für sich selbst eine Subscription\
  \ registrieren kann."
title: TI-Flow-Fachdienst – Subscription registrieren – Prüfung Telematik-ID
version: 1
