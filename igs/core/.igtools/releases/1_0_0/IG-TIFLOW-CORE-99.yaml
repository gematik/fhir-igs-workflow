text: Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt
  /Task mit HTTP-Header X-PoPP-Token durch eine abgebende LEI prüfen, dass die Differenz
  zwischen Zeitstempel iat im Token und dem aktuellen Zeitpunkt nicht größer als 30
  Minuten (konfigurierbar) ist und bei fehlerhafter Prüfung mit dem Fehler 403 abbrechen.
