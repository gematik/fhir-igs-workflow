text: Das E-Rezept-FdV MUSS, wenn es eine Authentifizierung des Nutzers über den IDP-Dienst,
  in seiner Rolle als Authorization-Server, unterstützt, entweder als anfragendes
  Anwendungsfrontend und Authenticator-Modul oder, wenn ein Authenticator-Modul in
  einer anderen für die TI zugelassene App genutzt wird, als anfragendes Anwendungsfrontend
  agieren.
