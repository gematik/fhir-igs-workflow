text: "Das Clientsystem des TI-Flow-Fachdienst MUSS für die Prüfung eines Zertifikats\
  \ für den TLS-Verbindungsaufbau zum TI-Flow-Fachdienst und IDP das Zertifikat auf\
  \ ein CA-Zertifikat einer CA, die die \"CA/Browser Forum Baseline Requirements for\
  \ the Issuance and Management of Publicly-Trusted Certificates\" [Baseline Requirements\
  \ for TLS Server Certificates] erfüllt, kryptographisch (Signaturprüfung) zurückführen\
  \ können. Ansonsten MUSS es das Zertifikat als \"ungültig\" bewerten. \n Das Clientsystem\
  \ des TI-Flow-Fachdienst MUSS die zeitliche Gültigkeit des Zertifikats prüfen und\
  \ falls diese Prüfung negativ ausfällt, das Zertifikat als \"ungültig\" bewerten."
title: 'CS: Prüfung der Zertifikate für TLS-Verbindung zu TI-Flow-Fachdienst und IDP-Dienst'
version: 1
