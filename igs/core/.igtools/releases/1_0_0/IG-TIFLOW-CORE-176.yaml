text: "Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation\
  \ über /Task/&#60;id&#62;/$activate den im Aufrufparameter übergebenen FHIR-Operationsparameter\
  \ des QES-Datensatzes als PKCS#7-Datei einer Enveloping CAdES-Signatur entgegennehmen\
  \ und verarbeiten und bei Fehlen oder ungültiger ASN.1 Datenstruktur die Weiterverarbeitung\
  \ im Fachdienst mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"border:\
  \ 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>400\
  \ - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n\
  \ <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>SVC_VALIDATION_FAILED</td>\n </tr>\n <tr>\n <th>Details Text</th>\n <td>FHIR\
  \ Profile Validation Failed</td>\n </tr>\n </table> \n beantworten, damit kein Schadcode\
  \ und keine \"fachfremden\" Daten in den TI-Flow-Fachdienst hochgeladen werden."
title: TI-Flow-Fachdienst - Task aktivieren - Schemavalidierung
