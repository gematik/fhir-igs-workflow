text: Der E-Rezept-Fachdienst MUSS das Einstellen einer Nachricht über die http-Operation
  POST auf den Endpunkt /Communication mit dem http-Status-Code 400 abbrechen, wenn
  der Empfänger Communication.recipient gleich der Absenderidentifikation im Attribut
  idNummer des übergebenen ACCESS_TOKEN im HTTP-Header "Authorization" ist, damit
  irreführende Kommunikationsbeziehungen nicht zu einer vermeidbaren Mehrbelastung
  des E-Rezept-Fachdienstes führen.
title: E-Rezept-Fachdienst - Nachricht einstellen - Ausschluss Nachrichten an Empfänger
  gleich Absender
