text: Der E-Rezept-Fachdienst MUSS für das Ermitteln des ePA-Aktensystem bei dem das
  Aktenkonto zu einer KVNR verwaltet wird, einmal den Endpunkt .../ehr/{insurantid}/consentdecisions
  des [I_Information_Service] jedes ePA-Aktensystem aufrufen und das Ermitteln abbrechen,
  wenn die Response den Statuscode 404 erhält.
