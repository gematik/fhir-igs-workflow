text: Der E-Rezept-Fachdienst MUSS beim Einstellen einer Nachricht über die http-Operation
  POST auf den Endpunkt /Communication, falls die Ressource dem GEM_ERP_PR_Communication_DispReq-Profil
  entspricht, den Inhalt der contentString-Eigenschaft auf valides JSON sowie gegen
  die Struktur in TAB_eRpDM_002 überprüfen und bei negativem Prüfergebnis, mit einem
  Http-Fehler 400 (Bad Request) abbrechen sowie mit einer aussagekräftigen Fehlermeldung
  in Form einer eingebetteten OperationOutcome-Ressource antworten.
