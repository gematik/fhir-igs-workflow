text: Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation auf den Endpunkt
  /Consent sicherstellen, dass noch keine Consent Ressource für die KVNR im ACCESS_TOKEN
  und Consent.category.coding.code = &lt;Einwilligungstyp&gt; aus URL-Parameter category
  gespeichert ist, um maximal eine Einwilligung für den Versicherten für jeden Einwilligungstypen
  zu speichern. Im Fehlerfall muss der HTTP-Request mit dem HTTP-Fehlercode 409 abgewiesen
  werden.
title: TI-Flow-Fachdienst - Consent schreiben - nur eine Einwilligung pro KVNR und
  Einwilligungstyp
