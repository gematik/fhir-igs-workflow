text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation auf den Endpunkt\
  \ /Consent sicherstellen, dass noch keine Consent Ressource für die KVNR im ACCESS_TOKEN\
  \ und Consent.category.coding.code = &lt;Einwilligungstyp&gt; aus URL-Parameter\
  \ category gespeichert ist und im Fehlerfall die Operation mit dem folgenden Fehler:\n\
  \ <table id=\"error-code\" style=\"border: 1px solid black; border-collapse: collapse;\"\
  >\n <tr>\n <th>HTTP-Code</th>\n <td>409 - Conflict</td>\n </tr>\n <tr>\n <th>Severity</th>\n\
  \ <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n\
  \ <th>Details Code</th>\n <td>TIFLOW_CONSENT_ALREADY_EXISTS</td>\n </tr>\n <tr>\n\
  \ <th>Details Text</th>\n <td>-</td>\n </tr>\n </table> \n abbrechen, um maximal\
  \ eine Einwilligung für den Versicherten für jeden Einwilligungstypen zu speichern."
title: TI-Flow-Fachdienst - Consent schreiben - nur eine Einwilligung pro KVNR und
  Einwilligungstyp
version: 1
