text: Der TI-Flow-Fachdienst MUSS die Aufrufe zum Ermitteln des ePA-Aktensystem für
  mindestens eine Minute unterbrechen, wenn ein Operationsaufruf im Information Service
  mit einem Statuscode 500 scheitert, und anschließend für weitere Aufrufe einen exponentiellen
  Backoff-Mechanismus anwenden, der die Wartezeit zwischen den Versuchen sukzessive
  verdoppelt, um die Belastung des Zielsystems zu minimieren.
title: TI-Flow-Fachdienst - ePA - Fehlerbehandlung - Information Service - Fehler
  im Information Service
