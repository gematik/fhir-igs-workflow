text: "Der TI-Flow-Fachdienst MUSS das QES-Signaturzertifikat C.HP.QES in der Signatur\
  \ des übergebenen QES-Datensatzes gemäß [gemSpec_PKI#TUC_PKI_030] mit folgenden\
  \ Parametern auf Gültigkeit prüfen:\n <table>\n <tr>\n <th>Parameter</th>\n <th>Wert</th>\n\
  \ </tr>\n <tr>\n <td>Zertifikat</td>\n <td>\n Signaturzertifikat des HBA (eingebettet\
  \ in Signatur-Objekt des QES-Datensatzes):\n <ul>\n <li>C.HP.QES (oid_hba_qes =\
  \ 1.2.276.0.76.4.72 gemäß gemSpec_OID)</li>\n </ul>\n </td>\n </tr>\n <tr>\n <td>Referenzzeitpunkt</td>\n\
  \ <td>Zeitpunkt der QES-Erstellung gemäß signingTime im QES-Datensatz</td>\n </tr>\n\
  \ <tr>\n <td>Offline-Modus</td>\n <td>nein</td>\n </tr>\n <tr>\n <td>OCSP-Response</td>\n\
  \ <td>eingebettet in QES-Datensatz</td>\n </tr>\n </table>\n <div><figcaption><strong>Tabelle:\
  \ </strong>TAB_eRPFD_006 Parameter Prüfung Signaturzertifikat QES des HBA</figcaption></div>\n\
  \n <br>\n \n Der TI-Flow-Fachdienst MUSS, wenn keine OCSP-Response eingebettet oder\
  \ die eingebettete OCSP Response nicht gültig ist, eine gecachte OCSP-Response verwenden,\
  \ wenn die gecachte OCSP-Response nach den Signaturzeitpunkt erstellt wurde, oder\
  \ eine OCSP-Response beim zugehörigen TSP anfragen.\n\n <br>\n\n Der TI-Flow-Fachdienst\
  \ MUSS das Signaturzertifikat prüfen, für [mathematisch gültig UND zeitlich gültig\
  \ UND online gültig ] befinden und andernfalls die Operation mit dem folgenden Fehler:\n\
  \ <table id=\"error-code\" style=\"border: 1px solid black; border-collapse: collapse;\"\
  >\n <tr>\n <th>HTTP-Code</th>\n <td>400 - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n\
  \ <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n\
  \ <th>Details Code</th>\n <td>TIFLOW_CERTIFICATE_INVALID</td>\n </tr>\n <tr>\n <th>Details\
  \ Text</th>\n <td>-</td>\n </tr>\n </table>\n abbrechen, damit sichergestellt wird,\
  \ dass ausschließlich Verordnungen verwaltet werden, die von einer gültigen, nicht\
  \ gesperrten Heilberufsidentität eines HBA signiert wurden."
title: TI-Flow-Fachdienst - Task aktivieren - QES Prüfung Signaturzertifikat des HBA
version: 1
