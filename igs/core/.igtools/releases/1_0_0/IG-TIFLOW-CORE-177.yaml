text: Der E-Rezept-Fachdienst MUSS bei der Validierung einer FHIR-Ressource vom Typ
  Bundle prüfen, ob die ID der Ressource (Bundle.entry.resource.id) und die ID ihrer
  fullUrl (Bundle.entry.fullurl) übereinstimmen und bei Auffälligkeiten mit dem HTTP-Fehlercode
  400 abbrechen und die Fehlermeldung "Die ID einer Ressource und die ID der zugehörigen
  fullUrl stimmen nicht überein." in Form eines OperationOutcome ausliefern.
