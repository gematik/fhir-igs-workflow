text: "Der TI-Flow-Fachdienst MUSS das QES-Signaturzertifikat C.HP.QES in der Signatur\
  \ des übergebenen QES-Datensatzes gemäß [gemSpec_PKI#TUC_PKI_030] mit folgenden\
  \ Parametern auf Gültigkeit prüfen:\n <table>\n <tr>\n <th>Parameter</th>\n <th>Wert</th>\n\
  \ </tr>\n <tr>\n <td>Zertifikat</td>\n <td>\n Signaturzertifikat des HBA (eingebettet\
  \ in Signatur-Objekt des QES-Datensatzes):\n <ul>\n <li>C.HP.QES (oid_hba_qes =\
  \ 1.2.276.0.76.4.72 gemäß gemSpec_OID)</li>\n <li>bzw. für HBA-Vorläuferkarten C.HP.ENC\
  \ (oid_vk_eaa_enc = 1.3.6.1.4.1.24796.1.10 gemäß gemSpec_OID) \n Hinweis: die OID\
  \ dieses Profil wird für Ärzte- und Zahnärzteschaft gleichermaßen genutzt</li>\n\
  \ </ul>\n </td>\n </tr>\n <tr>\n <td>Referenzzeitpunkt</td>\n <td>Zeitpunkt der\
  \ QES-Erstellung gemäß signingTime im QES-Datensatz</td>\n </tr>\n <tr>\n <td>Offline-Modus</td>\n\
  \ <td>nein</td>\n </tr>\n <tr>\n <td>OCSP-Response</td>\n <td>eingebettet in QES-Datensatz</td>\n\
  \ </tr>\n </table>\n <div><figcaption><strong>Tabelle: </strong>TAB_eRPFD_006 Parameter\
  \ Prüfung Signaturzertifikat QES des HBA</figcaption></div>\n\n und darf die OCSP-Response\
  \ für die Abfrage des Zertifikatsstatus für 12 Stunden zwischenspeichern.\n Ist\
  \ keine OCSP-Response eingebettet oder die eingebettete OCSP Response nicht gültig,\
  \ MUSS der TI-Flow-Fachdienst die gecachte OCSP-Response verwenden oder eine OCSP-Response\
  \ beim benannten TSP anfragen und die genutzte OCSP-Response nachträglich in den\
  \ QES-Datensatz einbetten.\n Das Signaturzertifikat muss anhand der Zertifikatsprüfung\
  \ für [mathematisch gültig UND zeitlich gültig UND online gültig ] befunden werden\
  \ und der HTTP-Request andernfalls mit dem folgenden Fehler:\n <table id=\"error-code\"\
  \ style=\"border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>400 - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_CERTIFICATE_INVALID</td>\n </tr>\n <tr>\n <th>Details Text</th>\n <td>-</td>\n\
  \ </tr>\n </table>\n HTTP-Status-Code 400 abgelehnt werden, damit sichergestellt\
  \ wird, dass ausschließlich E-Rezepte verwaltet werden, die von einer gültigen,\
  \ nicht gesperrten Heilberufsidentität eines HBA signiert wurden."
title: TI-Flow-Fachdienst - Task aktivieren - QES Prüfung Signaturzertifikat des HBA
version: 1
