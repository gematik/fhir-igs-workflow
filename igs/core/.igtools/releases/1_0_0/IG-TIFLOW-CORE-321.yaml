text: "Der TI-Flow-Fachdienst MUSS beim Einstellen einer Nachricht über die http-Operation\
  \ POST auf den Endpunkt /Communication, falls die Ressource dem GEM_ERP_PR_Communication_DispReq-Profil\
  \ entspricht, den Inhalt der contentString-Eigenschaft auf valides JSON sowie gegen\
  \ die Struktur in \"Tabelle: E-Rezept einer Apotheke zuweisen\" überprüfen und bei\
  \ negativem Prüfergebnis, die Operation mit dem folgenden Fehler:\n <table id=\"\
  error-code\" style=\"border: 1px solid black; border-collapse: collapse;\">\n <tr>\n\
  \ <th>HTTP-Code</th>\n <td>400 - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n\
  \ <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n\
  \ <th>Details Code</th>\n <td>SVC_VALIDATION_FAILED</td>\n </tr>\n <tr>\n <th>Details\
  \ Text</th>\n <td>FHIR Profile Validation Failed</td>\n </tr>\n </table> \n abbrechen\
  \ sowie mit einer aussagekräftigen Fehlermeldung in Form einer eingebetteten OperationOutcome-Ressource\
  \ antworten."
title: TI-Flow-Fachdienst - Nachricht einstellen - Validierung Payload GEM_ERP_PR_Communication_DispReq
version: 1
