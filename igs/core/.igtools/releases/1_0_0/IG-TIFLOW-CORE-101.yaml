text: "Der TI-Flow-Fachdienst MUSS die Prüfung des VSDM Prüfungsnachweises wie folgt\
  \ umsetzen: \n <ol type =\"1\">\n <li>die Prüfziffer aus dem Prüfungsnachweis extrahieren</li>\n\
  \ <li>Falls eine Prüfziffer im Prüfungsnachweis enthalten ist:\n <ol type=\"a\"\
  >\n <li>HMAC-Schlüssel auf Basis Kennung des Betreibers (Feld 4) und Version des\
  \ Hash-Schlüssels (Feld 5) ermitteln</li>\n <li>HMAC über Felder 1-5 der übermittelten\
  \ Prüfziffer berechnen</li>\n <li>Berechneten HMAC mit dem in der Prüfziffer übermittelten\
  \ HMAC auf Gleichheit prüfen</li>\n </ol>\n </li>\n </ol>"
