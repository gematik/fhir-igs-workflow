text: Das Clientsystem MUSS das vom Token-Endpunkt ausgegebene ACCESS_TOKEN in der
  HTTP/1.1 Statusmeldung 200 verarbeiten und mittels "Token Key" entschlüsseln. Das
  Clientsystem MUSS das ACCESS_TOKEN ablehnen, wenn dieses außerhalb der mit dem Token-Endpunkt
  etablierten TLS-Verbindung übertragen wird oder nicht mit dem vorher übermittelten
  "Token Key" verschlüsselt war.
