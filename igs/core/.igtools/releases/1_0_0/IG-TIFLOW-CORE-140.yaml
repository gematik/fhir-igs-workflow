text: Der TI-Flow-Fachdienst MUSS beim Löschen eines E-Rezepts durch einen Versicherten,
  wenn der HTTP-Request keinen HTTP-Header "X-AccessCode" oder URL-Parameter "?ac=..."
  enthält, den Versicherten anhand der KVNR aus dem ACCESS_TOKEN im "Authorization"-Header
  des HTTP-Requests identifizieren, diese gegen die in Task.for hinterlegte KVNR des
  begünstigten Patienten prüfen und bei Missmatch den Aufruf mit dem HTTP-Fehlercode
  403 abweisen, damit ausschließlich der begünstigte Versicherte als Berechtigter
  ohne Kenntnis des AccessCodes ein E-Rezept löscht.
title: TI-Flow-Fachdienst - E-Rezept löschen - Versicherter - Prüfung KVNR
