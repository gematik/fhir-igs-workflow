text: "Der TI-Flow-Fachdienst MUSS beim Löschen eines E-Rezepts durch einen Versicherten,\
  \ wenn der HTTP-Request keinen HTTP-Header \"X-AccessCode\" oder URL-Parameter \"\
  ?ac=...\" enthält, den Versicherten anhand der KVNR aus dem ACCESS_TOKEN im \"Authorization\"\
  -Header des HTTP-Requests identifizieren, diese gegen die in Task.for hinterlegte\
  \ KVNR des begünstigten Patienten prüfen und bei Missmatch den Aufruf mit dem folgenden\
  \ Fehler:\n <table id=\"error-code\" style=\"border: 1px solid black; border-collapse:\
  \ collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>403 - Forbidden</td>\n </tr>\n\
  \ <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n\
  \ </tr>\n <tr>\n <th>Details Code</th>\n <td>SVC_IDENTITY_MISMATCH</td>\n </tr>\n\
  \ <tr>\n <th>Details Text</th>\n <td>Identity mismatch: Access token or x-insurantid\
  \ header does not match FHIR data (Telematik-ID / KVNR)</td>\n </tr>\n </table>\
  \ \n abweisen, damit ausschließlich der begünstigte Versicherte als Berechtigter\
  \ ohne Kenntnis des AccessCodes ein E-Rezept löscht."
title: TI-Flow-Fachdienst - E-Rezept löschen - Versicherter - Prüfung KVNR
version: 1
