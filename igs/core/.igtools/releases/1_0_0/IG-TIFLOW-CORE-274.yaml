text: Der Fachdienst E-Rezept MUSS beim Einstellen einer Nachricht des Profils "https://gematik.de/fhir/erpchrg/StructureDefinition/GEM_ERPCHRG_PR_Communication_ChargChangeReq"
  oder "https://gematik.de/fhir/erpchrg/StructureDefinition/GEM_ERPCHRG_PR_Communication_ChargChangeReply"
  über die http-Operation POST auf den Endpunkt /Communication mit dem http-Status-Code
  400 abbrechen, wenn das Pflichtfeld Communication.basedOn einen ChargeItem referenziert,
  der nicht existiert, um Spam und nicht-rezeptbezogene Kommunikation zu verhindern.
title: E-Rezept-Fachdienst - Nachricht einstellen - Prüfung Existenz ChargeItem
