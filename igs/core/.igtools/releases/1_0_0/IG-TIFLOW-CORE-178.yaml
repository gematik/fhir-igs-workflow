text: "Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation\
  \ über /Task/&#60;id&#62;/$activate die qualifizierte Signatur des QES-Datensatzes\
  \ gemäß [ETSI_QES] prüfen und bei nicht gültiger qualifizierter Signatur die Operation\
  \ mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"border: 1px solid\
  \ black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>400 - Bad\
  \ Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n\
  \ <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n <td>TIFLOW_SIGNATURE_INVALID</td>\n\
  \ </tr>\n <tr>\n <th>Details Text</th>\n <td>-</td>\n </tr>\n </table>\n abbrechen,\
  \ damit der nachfolgende Workflow ausschließlich auf Basis vom Leistungserbringer\
  \ mittels Signatur freigegebener Daten erfolgt."
title: TI-Flow-Fachdienst - Task aktivieren - Verordnung QES prüfen
version: 1
