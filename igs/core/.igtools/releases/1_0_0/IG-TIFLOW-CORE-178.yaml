text: "Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation\
  \ über /Task/&#60;id&#62;/$activate \n <ul>\n <li>\n die qualifizierte Signatur\
  \ des QES-Datensatzes gemäß [ETSI_QES] prüfen und bei nicht gültiger qualifizierter\
  \ Signatur die Operation mit Status 400 abbrechen \n </li>\n <li>\n bzw. bei gültiger\
  \ Signatur das innerhalb des PKCS#7-Datensatz enveloping-enthaltene FHIR-Bundle\
  \ einer umfänglichen FHIR-Validierung gegen die eRezept-Schema-Definition der KBV\
  \ kbv.ita.erp oder kbv.itv.evdga unterziehen und bei Invalidität die Operation mit\
  \ Status 400 abbrechen\n </li>\n <li>\n bzw. bei gültiger Signatur und validem FHIR\
  \ den Datensatz als PKCS#7-Datei sicher speichern und in Task.input mit Codingsystem\
  \ https://gematik.de/fhir/erp/CodeSystem/GEM_ERP_CS_DocumentType = 1 über eine interne,\
  \ eindeutige UUID referenzieren,\n </li>\n </ul>\n damit der nachfolgende Workflow\
  \ ausschließlich auf Basis medizinisch korrekter und vom Leistungserbringer mittels\
  \ Signatur freigegebener Daten erfolgt."
title: TI-Flow-Fachdienst - Task aktivieren - QES prüfen Rezept aktualisieren
version: 0
