text: Das Clientsystem MUSS die JWS (JSON Web Signature) [RFC7515#section-3] Signatur
  des Discovery Document auf mathematische Korrektheit sowie auf Gültigkeit des ausstellenden
  Zertifikates innerhalb der TI prüfen. Das Clientsystem MUSS, wenn es den Konnektor
  oder den Basis-Consumer nutzt, die Gültigkeit des Zertifikates mit der Operation
  "VerifyCertificate" prüfen.
