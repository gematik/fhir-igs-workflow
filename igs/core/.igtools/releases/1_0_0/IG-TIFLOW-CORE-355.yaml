text: Der TI-Flow-Fachdienst MUSS in seinen Schnittstellen einen von der Standardfestlegung
  abweichenden MimeType umsetzen, wenn der jeweilige Client eine entsprechende Anforderung
  in der Aufrufschnittstelle über den URL-Parameter _format=fhir+xml bzw. _format=fhir+json
  gemäß http://hl7.org/fhir/http.html#general oder mittels des Accept-Attributs im
  HTTP-Request-Header als application/fhir+xml bzw. application/fhir+json anfordert,
  damit Clientsysteme ein für sie leichter verarbeitbares Format in der Antwort erhalten
  können.
title: TI-Flow-Fachdienst - RESTful API MimeType Aufrufparameter
