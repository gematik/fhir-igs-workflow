text: Das Clientsystem des TI-Flow-Fachdienstes SOLL bei serverseitigen Fehlermeldungen,
  die auf eine Überlastung des Zielsystems schließen lassen (z.B. http-status 5xx,
  429 - too many requests, etc.), erneute Verbindungsversuche nach dem Prinzips des
  Exponential Backoffs [ExpBack] durchführen.
