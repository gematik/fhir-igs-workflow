text: "Der E-Rezept-Fachdienst MUSS beim Erzeugen eines Tasks mittels HTTP-POST/$create-Operation\
  \ die Rolle \"professionOID\" des Aufrufenden im ACCESS_TOKEN im HTTP-RequestHeader\
  \ \"Authorization\" feststellen und sicherstellen, dass ausschließlich verordnende\
  \ Leistungserbringer in der Rolle\n    <ul>\n        <li>oid_praxis_arzt</li>\n\
  \        <li>oid_zahnarztpraxis</li>\n        <li>oid_praxis_psychotherapeut</li>\n\
  \        <li>oid_krankenhaus</li>\n        <li>oid_institution-vorsorge-reha</li>\n\
  \    </ul> \n    die Operation im Fachdienst aufrufen dürfen, damit E-Rezepte nicht\
  \ durch zur Verordnung Unberechtigte eingestellt werden können."
title: E-Rezept-Fachdienst - Task erzeugen - Rollenprüfung
