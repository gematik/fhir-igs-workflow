text: "Der TI-Flow-Fachdienst MUSS im Falle eines internen Serverfehlers die Anfrage\
  \ mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"border: 1px solid\
  \ black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>500 - Internal\
  \ Server Error</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n\
  \ <tr>\n <th>Code</th>\n <td>transient</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_INTERNAL_ERROR</td>\n </tr>\n <tr>\n <th>Details Text</th>\n <td>Internal\
  \ Server Error</td>\n </tr>\n </table>\n abbrechen, damit Clients über transiente\
  \ Serverfehler informiert werden und eine Wiederholung in Erwägung ziehen können."
