text: "Der TI-Flow-Fachdienst MUSS beim Aktivieren eines Tasks für ein E-Rezept mittels\
  \ HTTP-POST/$activate-Operation auf den in der URL referenzierten /Task/&#60;id&#62;\
  \ die Rolle \"professionOID\" des Aufrufers im ACCESS_TOKEN im HTTP-RequestHeader\
  \ \"Authorization\" feststellen und sicherstellen, dass ausschließlich Leistungserbringerinstitutionen\
  \ in der Rolle\n <ul>\n <li>oid_praxis_arzt</li>\n <li>oid_zahnarztpraxis</li>\n\
  \ <li>oid_praxis_psychotherapeut</li>\n <li>oid_krankenhaus</li>\n <li>oid_institution-vorsorge-reha</li>\
  \ \n </ul>\n die Operation am Fachdienst aufrufen und bei Abweichungen die Operation\
  \ mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"border: 1px solid\
  \ black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>403 - Forbidden</td>\n\
  \ </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n\
  \ <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n <td>TIFLOW_AUTH_ROLE_NOT_ALLOWED</td>\n\
  \ </tr>\n <tr>\n <th>Details Text</th>\n <td>Der Nutzer ist nicht berechtigt, die\
  \ aufgerufene Operation anzufordern</td>\n </tr>\n </table> \n abbrechen, damit\
  \ E-Rezepte nicht durch Unberechtigte eingestellt werden können."
title: TI-Flow-Fachdienst - Task aktivieren - Rollenprüfung
version: 1
