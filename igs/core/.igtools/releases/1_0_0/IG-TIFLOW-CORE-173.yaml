text: "Der TI-Flow-Fachdienst MUSS beim Aktivieren eines Tasks für ein E-Rezept mittels\
  \ HTTP-POST/$activate-Operation auf den in der URL referenzierten /Task/&#60;id&#62;\
  \ sicherstellen, dass ausschließlich verordnende Leistungserbringer in der Rolle\n\
  \ <ul>\n <li>oid_praxis_arzt</li>\n <li>oid_zahnarztpraxis</li>\n <li>oid_praxis_psychotherapeut</li>\n\
  \ <li>oid_krankenhaus</li>\n <li>oid_institution-vorsorge-reha</li> \n </ul>\n die\
  \ Operation am Fachdienst aufrufen dürfen und die Rolle \"professionOID\" des Aufrufers\
  \ im ACCESS_TOKEN im HTTP-RequestHeader \"Authorization\" feststellen, damit E-Rezepte\
  \ nicht durch Unberechtigte eingestellt werden können."
title: TI-Flow-Fachdienst - Task aktivieren - Rollenprüfung
