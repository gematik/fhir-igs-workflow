text: 'Der E-Rezept-Fachdienst MUSS beim Aufruf der http-POST-Operation /Task/&#60;id&#62;/$activate
  die im FHIR Profil KBV_PR_FOR_Coverage gespeicherten Werte für payor.identifier.extension:alternativeID.value[x]:valueIdentifier
  gemäß dem "Gemeinsames Rundschreiben Institutionskennzeichen (IK)" vom 01.06.2020
  unter Kapitel 1.2.5 "Prüfziffer" beschriebenen Prüfalgorithmus validieren, und bei
  einer fehlerhaften Prüfung mit einem Http-Fehler 400 (Bad Request) abbrechen sowie
  die Fehlermeldung "Ungültiges Institutionskennzeichen (IKNR): Das übergebene Institutionskennzeichen
  des Kostenträgers entspricht nicht den Prüfziffer-Validierungsregeln." in Form einer
  OperationOutcome ausliefern.'
title: E-Rezept-Fachdienst - Task aktivieren - Überprüfung der IK Nummer im Profil
  KBV_PR_FOR_Coverage - AlternativeID
