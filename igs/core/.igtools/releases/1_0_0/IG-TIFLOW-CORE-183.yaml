text: Der TI-Flow-Fachdienst MUSS im Zugriff auf einen Task mittels HTTP-POST-Operation
  über /Task/&#60;id&#62;/$activate die KVNR des Patienten dem Identifier http://fhir.de/sid/gkv/kvid-10
  der Patient-Ressource im E-Rezept-Bundle entnehmen und diesen als Identifier in
  Task.for mit system http://fhir.de/sid/gkv/kvid-10 hinzufügen, damit ausschließlich
  eine gültige, vom Arzt signierte Patientenreferenz im Workflow verwendet wird.
