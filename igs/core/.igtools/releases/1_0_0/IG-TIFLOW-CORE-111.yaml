text: "Das PS der verordnenden LEI MUSS den Anwendungsfall \"UC 2.3 - E-Rezept einstellen\"\
  \ gemäß TAB_ILFERP_003 umsetzen. \n  <table>\n    <tr> \n\t\t<th>Name</th>\n\t\t\
  <th>E-Rezept durch Verordnenden einstellen</th>\n\t</tr>\n\t<tr> \n\t\t<td>Auslöser</td>\n\
  \t\t<td>\n            <ul>\n                <li>Aufruf des Anwendungsfalls in der\
  \ GUI</li>\n                <li>kann durch \"E-Rezept durch Verordnenden erstellen\"\
  \ getriggert werden</li>\n            </ul>\n        </td>\n\t</tr>\n    <tr> \n\
  \t\t<td>Akteur</td>\n\t\t<td>Leistungserbringer, Mitarbeiter der verordnenden LEI</td>\n\
  \t</tr>\n    <tr> \n\t\t<td>Vorbedingung</td>\n\t\t<td>\n            <ul>\n    \
  \            <li>Das E-Rezept wurde erstellt. (Anwendungsfall \"E-Rezept erstellen\"\
  ). Es stehen ein QES-signiertes E-Rezept-Bundle als PKCS#7-Datei bereit.</li>\n\
  \                <li>Die LEI hat sich gegenüber der TI authentisiert.</li>\n   \
  \         </ul>\n        </td>\n\t</tr>\n    <tr> \n\t\t<td>Nachbedingung</td>\n\
  \t\t<td>Das E-Rezept ist auf dem E-Rezept-Fachdienst gespeichert. Es kann durch\
  \ den Versicherten oder einen Apotheker in Kenntnis der Einlöseinformationen (Task-ID\
  \ + AccessCode) abgerufen werden. Der Workflow hat den Status \"ready\".</td>\n\t\
  </tr>\n    <tr> \n\t\t<td>Standardablauf</td>\n\t\t<td>\n            <ol>\n    \
  \            <li>Task auf dem E-Rezept-Fachdienst aktivieren</li>\n            \
  \    <li>\n                    optional, wenn der Patientenausdruck ausgedruckt\
  \ werden soll:\n                    <ol>\n                        <li>E-Rezept-Token\
  \ erzeugen</li>\n                        <li>Patientenausdruck erstellen</li>\n\
  \                    </ol>\n                </li>\n            </ol>\n        </td>\n\
  \t</tr>\n  </table>\n  <div><figcaption><strong>Tabelle: </strong>TAB_ILFERP_003\
  \ - E-Rezept durch Verordnenden einstellen</figcaption></div>"
title: 'PS verordnende LEI: E-Rezept durch Verordnenden einstellen'
