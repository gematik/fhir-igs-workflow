text: Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf einen einzelnen
  /Task/&lt;id&gt; durch einen Versicherten, den Versicherten anhand der KVNR aus
  dem ACCESS_TOKEN im "Authorization"-Header des HTTP-Requests identifizieren, diese
  gegen die im gespeicherten Datensatz in Task.for.identifier hinterlegte KVNR des
  begünstigten Versicherten prüfen und bei Ungleichheit den Aufruf mit dem HTTP-Fehlercode
  403 abweisen, damit ausschließlich der begünstigte Versicherte den Task abrufen
  kann.
title: TI-Flow-Fachdienst - Task abrufen - Versicherter - Prüfung KVNR
