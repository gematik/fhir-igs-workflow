text: "Der TI-Flow-Fachdienst MUSS Verordnungs-IDs erzeugen und verwalten, welche\
  \ der Syntax \"aaa.bbb.bbb.bbb.bbb.cc\" und der folgenden Semantik genügen \n \n\
  \ <table>\n <thead>\n <tr>\n <th></th>\n <th>Bedeutung</th>\n <th>Datentyp</th>\n\
  \ </tr>\n </thead>\n <tbody>\n <tr>\n <td>aaa</td>\n <td>Workflow-Typ</td>\n <td>alphanummerisch,\
  \ mit der Belegung gemäß \"flowType\" in <a href=\"https://gematik.de/fhir/erp/CodeSystem/GEM_ERP_CS_FlowType\"\
  >https://gematik.de/fhir/erp/CodeSystem/GEM_ERP_CS_FlowType</a></td>\n </tr>\n <tr>\n\
  \ <td>bbb.bbb.bbb.bbb</td>\n <td>fortlaufende Nummer</td>\n <td>nummerisch, 12-stellig</td>\n\
  \ </tr>\n <tr>\n <td>cc</td>\n <td>Prüfnummer Verfahren gemäß [ISO 7064]</td>\n\
  \ <td>nummerisch</td>\n </tr>\n </tbody>\n</table>\n \n damit Tippfehler in der\
  \ manuellen Erfassung erkannt werden können und die Verordnungs-ID über 11 Jahre\
  \ eine eineindeutige Zuordnung zwischen allen Datenobjekten im Workflow erlaubt."
title: Aufbau Verordnungs-ID
version: 1
