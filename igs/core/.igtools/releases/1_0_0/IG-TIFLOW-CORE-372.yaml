text: "Der TI-Flow-Fachdienst MUSS bei der Handhabung der Rückgabe von mehreren FHIR-Objekten\
  \ die Paginierung nach FHIR für folgende Endpunkte mit den jeweiligen Parametern\
  \ unterstützen \n \n<table>\n<thead>\n<tr>\n<th>Endpunkt</th>\n<th>Paginierung</th>\n\
  <th>Total-Count</th>\n<th>Link-Relations</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n\
  <td>GET /Task</td>\n<td>Ja</td>\n<td>Ja</td>\n<td>self, next, prev, first, last</td>\n\
  </tr>\n<tr>\n<td>GET /Communication</td>\n<td>Ja</td>\n<td>Ja</td>\n<td>self, next,\
  \ prev, first, last</td>\n</tr>\n<tr>\n<td>GET /MedicationDispense</td>\n<td>Nein</td>\n\
  <td>immer \"0\"</td>\n<td>-</td>\n</tr>\n<tr>\n<td>GET /ChargeItem</td>\n<td>Ja</td>\n\
  <td>Ja</td>\n<td>self, next, prev, first, last</td>\n</tr>\n<tr>\n<td>GET /AuditEvent</td>\n\
  <td>Ja</td>\n<td>immer \"0\"</td>\n<td>self, next, first</td>\n</tr>\n</tbody>\n\
  </table>\n\n<div><figcaption><strong>Tabelle: </strong>Endpunkte mit Paginierung</figcaption></div>"
title: TI-Flow-Fachdienst - Handhabung der Rückgabe von mehreren FHIR-Objekten - Paginierung
