text: "Das PS der abgebenden LEI MUSS den Anwendungsfall \"UC 4.2 - E-Rezept durch\
  \ Abgebenden zurückgeben\" gemäß TAB_ILFERP_008 umsetzen.\n  <table>\n    <tr> \n\
  \t\t<th>Name</th>\n\t\t<th>E-Rezept durch Abgebenden zurückgeben</th>\n\t</tr>\n\
  \t<tr> \n\t\t<td>Auslöser</td>\n\t\t<td>Aufruf des Anwendungsfalls in der UI</td>\n\
  \t</tr>\n    <tr> \n\t\t<td>Akteur</td>\n\t\t<td>Leistungserbringer, Mitarbeiter\
  \ der abgebenden LEI</td>\n\t</tr>\n    <tr> \n\t\t<td>Vorbedingung</td>\n\t\t<td>\n\
  \            <ul>\n                <li>Die LEI hat das E-Rezept vom E-Rezept-Fachdienst\
  \ heruntergeladen und es befindet sich im Status \"in-progress\".</li>\n       \
  \         <li>Der Nutzer hat ein E-Rezept zum Zurückgeben markiert und das Zurückgeben\
  \ bestätigt.</li>\n                <li>Die LEI hat sich gegenüber der TI authentisiert.</li>\n\
  \            </ul>\n        </td>\n\t</tr>\n    <tr> \n\t\t<td>Nachbedingung</td>\n\
  \t\t<td>Das ausgewählte E-Rezept hat auf dem E-Rezept-Fachdienst den Status \"ready\"\
  </td>\n\t</tr>\n    <tr> \n\t\t<td>Standardablauf</td>\n\t\t<td>\n            <ol>\n\
  \                <li>Task-ID und Geheimnis des E-Rezepts bestimmen</li>\n      \
  \          <li>E-Rezept Status auf Fachdienst ändern</li>\n                <li>E-Rezept\
  \ und E-Rezept-Token in PS löschen</li>\n            </ol>\n        </td>\n\t</tr>\n\
  \  </table>\n  <div><figcaption><strong>Tabelle: </strong>TAB_ILFERP_008 - E-Rezept\
  \ durch Abgebenden zurückgeben</figcaption></div>"
title: 'PS abgebende LEI: E-Rezept durch Abgebenden zurückgeben'
