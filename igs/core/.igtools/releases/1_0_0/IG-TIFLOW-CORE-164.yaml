  beim Verbindungsaufbau prüfen, dass der Client einen zeitlich und kryptographisch
  gültigen Bearer-Token der Schnittstelle GET /Subscription übermittelt und bei nicht-erfolgreicher
  Prüfung die Verbindung mit dem Fehler 403 ablehnen.
