text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt
  /AuditEvent die Ergebnisliste der AuditEvent-Ressourcen bei mehr als einem Eintrag
  als Ergebnis-Bundle an den Aufrufer zurückgeben, damit der Versicherte eine vollständige
  Einsicht in das Zugriffsprotokoll erhält.
