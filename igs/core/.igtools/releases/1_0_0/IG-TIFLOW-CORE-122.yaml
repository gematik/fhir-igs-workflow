text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-PATCH-Operation auf eine konkrete\
  \ über &lt;id&gt; adressierte /Task/&lt;id&gt; Ressource durch einen Versicherten,\
  \ den Versicherten anhand der KVNR aus dem ACCESS_TOKEN im \"Authorization\"-Header\
  \ des HTTP-Requests identifizieren, diese gegen die im gespeicherten Datensatz in\
  \ Task.for.identifier hinterlegte KVNR des begünstigten Versicherten prüfen und\
  \ bei Ungleichheit die Operation mit dem folgenden Fehler:\n <table id=\"error-code\"\
  \ style=\"border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>403 - Forbidden</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_KVNR_MISMATCH</td>\n </tr>\n <tr>\n <th>Details Text</th>\n <td>-</td>\n\
  \ </tr>\n </table> \n abbrechen, damit ausschließlich der begünstigte Versicherte\
  \ als Berechtigter einen Task ändert."
title: TI-Flow-Fachdienst -Task markieren - Versicherter - Prüfung KVNR
version: 1
