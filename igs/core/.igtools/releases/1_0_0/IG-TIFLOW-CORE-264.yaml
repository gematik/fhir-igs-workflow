text: Das CS Kostenträger MUSS im Anwendungsfall "Nachrichten von Versicherten empfangen"
  zwischen den Aufrufen der Operation GET /Communication mindestens 5 Minuten warten.
  Der Zeitraum zwischen den Aufrufen muss um eine zufällige Zeitspanne zwischen 0
  und 10.000 Millisekunden verlängert werden, um eine Gleichverteilung der Anfragen
  am E-Rezept-Fachdienst über alle Apotheken zu erreichen.
