text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt /Task mit\
  \ den URL-Parameter pnw=\"...\" durch eine abgebende LEI, falls der passende Status\
  \ AcceptPN3VSDMxx = true, das Ergebnis im VSDM Prüfungsnachweis gleich 3 ist und\
  \ URL-Parameter kvnr=\"...\" übermittelt wurde, die Tasks nach \n <ul>\n <li>Task.status =\
  \ \"ready\", </li>\n <li>Task.for = KVNR aus dem URL-Parameter,</li>\n <li>Task.ExpiryDate\
  \ nicht vor dem aktuellen Datum liegt</li>\n <li>und Task.extension:flowType = 160\
  \ oder 166</li>\n </ul>\n filtern und in einem Bundle der gefundenen Tasks (ohne\
  \ den signierte Anhang QES) zurückgeben, damit eine Apotheke alle zu einem Versicherten\
  \ gehörenden E-Rezepte mit dem Status \"ready\" abrufen kann. Der TI-Flow-Fachdienst\
  \ MUSS für den Response den Returncode 202 verwenden."
title: TI-Flow-Fachdienst - Rezepte lesen - Apotheke - VSDM - PN3 - AcceptPN3 true
  - Filter Status, KVNR und Workflowtype
