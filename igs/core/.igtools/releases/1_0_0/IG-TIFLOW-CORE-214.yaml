text: Der E-Rezept-Fachdienst MUSS beim Abrufen von Nachrichten über die http-Operation
  GET auf den Endpunkt /Communication bzw. beim Abruf einer einzelnen Nachricht über
  /Communication/&lt;id&gt; ausschließlich die Nachrichten an den Aufrufer zurückgeben,
  die im Attribut Communication.recipient oder Communication.sender mit dem entsprechenden
  Identifier https://gematik.de/fhir/sid/telematik-id für Apotheken bzw. http://fhir.de/sid/gkv/kvid-10
  für Versicherte den gleichen Typ und den identischen Wert haben wie im Attribut
  "idNummer" des übergebenen ACCESS_TOKEN im HTTP-Header "Authorization" für Versicherten-ID
  bzw. Telematik-ID, damit keine Nachrichten an Dritte unrechtmäßig ausgelesen werden.
