text: "Der TI-Flow-Fachdienst MUSS beim Aktivieren eines Tasks mittels HTTP-POST-Operation\
  \ über /Task/&#60;id&#62;/$activate prüfen, dass Patient.identifier.system gleich\
  \ \"http://fhir.de/sid/gkv/kvid-10\" ist und andernfalls die Operation mit dem folgenden\
  \ Fehler:\n <table id=\"error-code\" style=\"border: 1px solid black; border-collapse:\
  \ collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>400 - Bad Request</td>\n </tr>\n\
  \ <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n\
  \ </tr>\n <tr>\n <th>Details Code</th>\n <td>TIFLOW_KVNR_INVALID</td>\n </tr>\n\
  \ <tr>\n <th>Details Text</th>\n <td>Als Identifier für den Patienten muss eine\
  \ VersichertenID (KVNR) angegeben werden.</td>\n </tr>\n </table> \n abbrechen."
title: TI-Flow-Fachdienst - Task aktivieren - Versicherten-ID als Identifikator von
  Versicherten
