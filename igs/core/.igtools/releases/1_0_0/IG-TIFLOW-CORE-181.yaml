text: Der E-Rezept-Fachdienst MUSS bei der Validierung einer FHIR-Ressource sicherstellen,
  dass keine Extensions vorhanden sind, die nicht an den in den FHIR-Profilen spezifizierten
  Stellen verwendet werden. Sollte eine solche Extension gefunden werden, gilt der
  Datensatz als ungültig. In diesem Fall ist eine Fehlermeldung mit dem HTTP-Status
  400 auszugeben.
