text: Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation
  über /Task/&#60;id&#62;/$activate bei gültiger Signatur und validem FHIR den Datensatz
  als PKCS#7-Datei sicher speichern und in Task.input mit Codingsystem https://gematik.de/fhir/erp/CodeSystem/GEM_ERP_CS_DocumentType
  = 1 über eine interne, eindeutige UUID referenzieren, damit der nachfolgende Workflow
  ausschließlich auf Basis medizinisch korrekter und vom Leistungserbringer mittels
  Signatur freigegebener Daten erfolgt.
