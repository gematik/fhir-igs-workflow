text: "Der E-Rezept-Fachdienst MUSS im Fehlerfall (http-Statuscodes &gt;= 400) Hinweise\
  \ zur Fehlerursache \n     \n     <ul>\n        <li>im der inneren http-Response-Body\
  \ als FHIR-Ressource OperationOutcome</li>\n        <li>falls keine innere VAU-Response\
  \ existiert, in einem \"äußeren\" http-Response-Body in einer JSON-Struktur mit\
  \ `\"x-request-id\", (http-)\"status\", \"error\"-Text, \"message\"-Details`</li>\n\
  \     </ul>\n      \n      an den Client zurückgeben, ohne Implementierungsdetails\
  \ (z.B. kein Stacktrace) preiszugeben und dabei sicherstellen, dass personenbezogene\
  \ oder medizinische Daten, falls für die qualifizierte Fehlerbeschreibung notwendig,\
  \ ausschließlich in der VAU-verschlüsselten inneren http-Response übertragen werden."
title: E-Rezept-Fachdienst - Fehlerdetails in OperationOutcome
version: 0
