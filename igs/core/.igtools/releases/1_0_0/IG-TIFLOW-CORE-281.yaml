text: "Der TI-Flow-Fachdienst MUSS bei der Validierung einer FHIR-Ressource prüfen,\
  \ ob angegebene Referenzen nach [FHIR Spezifikation Auflösen von Referenzen in Bundles]\
  \ ermittelt werden können und bei Auffälligkeiten mit dem folgenden Fehler:\n <table\
  \ id=\"error-code\" style=\"border: 1px solid black; border-collapse: collapse;\"\
  >\n <tr>\n <th>HTTP-Code</th>\n <td>400 - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n\
  \ <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n\
  \ <th>Details Code</th>\n <td>MSG_RESOURCE_ID_FAIL</td>\n </tr>\n <tr>\n <th>Details\
  \ Text</th>\n <td>Referenz einer Ressource konnte nicht aufgelöst werden.</td>\n\
  \ </tr>\n </table> \n abbrechen."
