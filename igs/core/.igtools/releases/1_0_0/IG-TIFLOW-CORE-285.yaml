text: "Der TI-Flow-Fachdienst MUSS bei der Validierung einer FHIR-Ressource sicherstellen,\
  \ dass keine Extensions vorhanden sind, die nicht an den in den FHIR-Profilen spezifizierten\
  \ Stellen verwendet werden. Sollte eine solche Extension gefunden werden, gilt der\
  \ Datensatz als ungültig. In diesem Fall ist eine Fehlermeldung mit dem folgenden\
  \ Fehler:\n <table id=\"error-code\" style=\"border: 1px solid black; border-collapse:\
  \ collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>400 - Bad Request</td>\n </tr>\n\
  \ <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n\
  \ </tr>\n <tr>\n <th>Details Code</th>\n <td>SVC_VALIDATION_FAILED</td>\n </tr>\n\
  \ <tr>\n <th>Details Text</th>\n <td>FHIR Profile Validation Failed</td>\n </tr>\n\
  \ </table> \n auszugeben."
title: TI-Flow-Fachdienst - FHIR-Ressource validieren - Ausschluss unspezifizierter
  Extensions
version: 1
