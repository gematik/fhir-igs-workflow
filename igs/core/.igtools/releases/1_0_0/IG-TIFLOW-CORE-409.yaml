text: "Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation\
  \ über /Task/&#60;id&#62;/$activate bei gültiger Signatur das innerhalb des PKCS#7-Datensatz\
  \ enveloping-enthaltene FHIR-Bundle einer umfänglichen FHIR-Validierung gegen die\
  \ eRezept-Schema-Definition der KBV kbv.ita.erp oder kbv.itv.evdga unterziehen und\
  \ bei Invalidität die Operation mit dem folgenden Fehler:\n      <table id=\"error-code\"\
  \ style=\"border: 1px solid black; border-collapse: collapse;\">\n        <tr>\n\
  \            <th>HTTP-Code</th>\n            <td>400 - Bad Request</td>\n      \
  \  </tr>\n        <tr>\n            <th>Severity</th>\n            <td>error</td>\n\
  \        </tr>\n        <tr>\n            <th>Code</th>\n            <td>invalid</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Code</th>\n            <td>SVC_VALIDATION_FAILED</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Text</th>\n            <td>FHIR\
  \ Profile Validation Failed</td>\n        </tr>\n    </table> \n    abbrechen damit\
  \ der nachfolgende Workflow ausschließlich auf Basis medizinisch korrekter und vom\
  \ Leistungserbringer mittels Signatur freigegebener Daten erfolgt."
title: TI-Flow-Fachdienst - Task aktivieren - QES prüfen Rezept aktualisieren
