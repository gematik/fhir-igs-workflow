text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf einen einzelnen\
  \ Task mittels \"/Task/&lt;id&gt;?ac=...\" durch eine abgebende Institution den\
  \ im referenzierten Task gespeicherten Status Task.status prüfen und, wenn Task.status\
  \ ungleich \"in-progress\" und ungleich \"completed\" ist, die Operation mit dem\
  \ folgenden Fehler:\n <table id=\"error-code\" style=\"border: 1px solid black;\
  \ border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>412 - Precondition\
  \ Failed</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n\
  \ <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n <td>TIFLOW_TASK_STATUS_MISMATCH</td>\n\
  \ </tr>\n <tr>\n <th>Details Text</th>\n <td>-</td>\n </tr>\n </table> \n abbrechen,\
  \ damit der Datensatz nur abgerufen werden, kann, wenn sich die Verordnung in Belieferung\
  \ befindet oder der Workflow abgeschlossen ist."
title: TI-Flow-Fachdienst - Task abrufen - abgebende Institution - Verordnung abrufen
  - Prüfung Status
version: 1
