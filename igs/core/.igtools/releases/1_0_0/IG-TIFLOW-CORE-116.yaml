text: Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf einen einzelnen
  Task mittels "/Task/&lt;id&gt;?ac=..." durch eine abgebende Institution den im referenzierten
  Task gespeicherten Status Task.status prüfen und mit dem Fehler 412 abbrechen, wenn
  Task.status ungleich "in-progress" und ungleich "completed" ist, damit der Datensatz
  nur abgerufen werden, kann, wenn sich die Verordnung in Belieferung befindet oder
  der Workflow abgeschlossen ist.
title: TI-Flow-Fachdienst - Task abrufen - abgebende Institution - Verordnung abrufen
  - Prüfung Status
