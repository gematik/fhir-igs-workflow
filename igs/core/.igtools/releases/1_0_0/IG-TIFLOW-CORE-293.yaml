text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt
  /AuditEvent die dem Versicherten zugeordneten AuditEvent-Ressourcen anhand der KVNR
  des Versicherten im ACCESS_TOKEN im "Authorization"-Header des HTTP-Requests identifizieren,
  die in AuditEvent.entity.name die entsprechende KVNR des begünstigten Patienten
  referenziert haben, damit ausschließlich Versicherte ihre eigenen Protokolleinträge
  einsehen können.
