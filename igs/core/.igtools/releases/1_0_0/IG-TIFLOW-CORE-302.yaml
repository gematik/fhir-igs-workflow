text: "Das PS der verordnenden LEI MUSS im Anwendungsfall \"E-Rezept durch Verordnenden\
  \ einstellen\" für das E-Rezept die HTTP-Operation POST /Task/&lt;id&gt;/$activate\
  \ mit\n  <ul>\n    <li>ACCESS_TOKEN im Authorization-Header</li>\n    <li>Task-ID\
  \ in URL &lt;id&gt; </li>\n    <li>AccessCode in X-AccessCode - Header oder URL-Parameter\
  \ ?ac=</li>\n    <li>QES signiertes E-Rezept-Bundle im http-Body des Aufrufs als\
  \ data</li>\n  </ul>\n  ausführen."
title: 'PS verordnende LEI: E-Rezept einstellen - Task auf Fachdienst aktivieren'
