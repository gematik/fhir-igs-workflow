text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt\
  \ /Task mit dem URL-Parameter pnw=\"...\" durch eine abgebende LEI prüfen, ob mit\
  \ dem Aufruf die Anzahl RATELIMIT_MAX1d_ERROR_UC4_12 überschritten ist und in diesem\
  \ Fall den Aufruf mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"\
  border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>423 - Locked</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n\
  \ <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>SVC_TELEMATIKID_TEMPORARILY_BLOCKED</td>\n </tr>\n <tr>\n <th>Details Text</th>\n\
  \ <td>The specified Telematik-ID is temporarily blocked</td>\n </tr>\n </table>\
  \ \n abbrechen."
title: TI-Flow-Fachdienst - Rezepte lesen - Apotheke - Ratelimit pro Telematik-ID
  prüfen
