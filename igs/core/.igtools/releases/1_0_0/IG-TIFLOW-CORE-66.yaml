text: Der E-Rezept-Fachdienst MUSS beim Aktivieren eines Tasks mittels HTTP-POST-Operation
  über /Task/&#60;id&#62;/$activate prüfen, dass Patient.identifier.system gleich
  "http://fhir.de/sid/gkv/kvid-10" ist und andernfalls die Operation mit dem http-Fehlercode
  400 und dem Hinweis im OperationOutcome "Als Identifier für den Patienten muss eine
  VersichertenID (KVNR) angegeben werden." abbrechen.
