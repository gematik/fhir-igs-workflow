text: Der TI-Flow-Fachdienst MUSS die im HTTP-POST-Operation auf die Ressource Consent
  übertragene Consent Ressource gegen das FHIR-Profil Consent prüfen und bei Nicht-Konformität
  das Anlegen der Ressource im TI-Flow-Fachdienst mit dem http-Status-Code 400 ablehnen,
  damit nur FHIR-valide Ressourcen in den TI-Flow-Fachdienst hochgeladen werden.
