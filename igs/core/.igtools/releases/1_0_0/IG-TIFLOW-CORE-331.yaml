text: "Der Fachdienst E-Rezept MUSS beim Einstellen einer Nachricht des Profils \"\
  https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_Communication_DispReq\"\
  , \"https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_Communication_Reply\"\
  \ oder \"https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_Communication_DiGA\"\
  \ über die http-Operation POST auf den Endpunkt /Communication prüfen und, wenn\
  \ das Pflichtfeld Communication.basedOn einen Task referenziert, der nicht existiert,\
  \ die Operation mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"border:\
  \ 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>400\
  \ - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n\
  \ <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_TASK_NOT_FOUND</td>\n </tr>\n <tr>\n <th>Details Text</th>\n <td>-</td>\n\
  \ </tr>\n </table> \n abbrechen, um Spam und nicht-verordnungsbezogene Kommunikation\
  \ zu verhindern."
title: TI-Flow-Fachdienst - Nachricht einstellen - Prüfung Existenz Task
version: 1
