text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt\
  \ /AuditEvent und auf einen konkreten über &lt;id&gt; adressierten /AuditEvent/&lt;id&gt;\
  \ sicherstellen, dass ausschließlich Versicherte in der Rolle oid_versicherter die\
  \ Operation am Fachdienst aufrufen dürfen und die Rolle \"professionOID\" des Aufrufers\
  \ im ACCESS_TOKEN im HTTP-RequestHeader \"Authorization\" feststellen, und bei Abweichungen\
  \ mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"border: 1px solid\
  \ black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>403 - Forbidden</td>\n\
  \ </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n\
  \ <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n <td>TIFLOW_AUTH_ROLE_NOT_ALLOWED</td>\n\
  \ </tr>\n <tr>\n <th>Details Text</th>\n <td>Der Nutzer ist nicht berechtigt, die\
  \ aufgerufene Operation anzufordern</td>\n </tr>\n </table> \n abrechen, damit Protokolleinträge\
  \ nicht durch Unberechtigte ausgelesen werden können."
title: TI-Flow-Fachdienst - AuditEvent lesen - Rollenprüfung
