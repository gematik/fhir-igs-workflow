text: "Der E-Rezept-Fachdienst MUSS einen Protokolleintrag mit den folgenden Werten\
  \ befüllen:\n\t<ul>\n    <li>AuditEvent.text: Generierung eines HTML-&lt;div&gt;-Elements\
  \ mit lesbarer Beschreibung in einfacher Sprache</li>\n    <li>AuditEvent.type:\
  \ Fester Wertrest gemäß [CodeSystem: Audit Event ID]</li>\n    <li>AuditEvent.subtype:\
  \ aus dem ValueSet [ValueSet http://hl7.org/fhir/ValueSet/auditevent-sub-type] gemäß\
  \ [CodeSystem http://hl7.org/fhir/restful-interaction]:\n    <ul>\n      <li>create\
  \ beim Hinzufügen/Speichern/Anlegen eines Datenobjekts mit Versichertenbezug (mit\
  \ Ausnahme von AuditEvent- und Communication-Ressource)</li>\n      <li>read beim\
  \ lesenden Zugriff auf ein Datenobjekt mit Versichertenbezug</li>\n      <li>update,\
  \ wenn das Datenobjekt mit Versichertenbezug geändert/aktualisiert wird</li>\n \
  \     <li>delete, wenn das Datenobjekt mit Versichertenbezug manuell oder automatisch\
  \ gelöscht wird</li>\n    </ul>\n    </li>\n    <li>AuditEvent.action: analog AuditEvent.subType\
  \ (C, R, U, D) gemäß [ValueSet http://hl7.org/fhir/ValueSet/audit-event-action]</li>\n\
  \    <li>AuditEvent.recorded: aktuelle Systemzeit des E-Rezept-Fachdienstes</li>\n\
  \    <li>AuditEvent.outcome: Ergebnis der aufgerufenen Operation gemäß [ValueSet\
  \ http://hl7.org/fhir/ValueSet/audit-event-outcome] (0 = Erfolg, 4 = Fehler auf\
  \ Clientseite, 8 = Serverfehler)</li>\n    <li>AuditEvent.agent.type: Fester Werthumanuser\
  \ bzw. bei Übermittlung an ePA oder NCPeH-FDdataprocessor aus [CodeSystem: Security\
  \ Role Type (Experimental)]</li>\n    <li>AuditEvent.agent.name:Lesbarer Name aus\
  \ ID_TOKEN des Zugreifenden, der die zu protokollierende Aktion getriggert hat,\
  \ z.B. \"Praxis Dr. Müller, Bahnhofstr. 78\" oder Versicherter z.B. \"Max Mustermann\"\
  \ bzw. bei Übermittlung an ePA \"E-Rezept-Fachdienst\"</li>\n    <li>AuditEvent.agent.who:\
  \ KVNR bzw. Telematik-ID des zugreifenden Nutzers aus ID_TOKEN, der diesen Protokolleintrag\
  \ ausgelöst hat</li>\n    <li>AuditEvent.agent.requestor: Fester Wert false, da\
  \ keine Protokolleinträge von außen erzeugt werden</li>\n    <li>AuditEvent.soure.site:\
  \ Fester Wert E-Rezept-Fachdienst</li>\n    <li>AuditEvent.soure.observer: Device-Informationen\
  \ des E-Rezept-Fachdienstes (status, serialnumber=gemäß Release)</li>\n    <li>AuditEvent.entity.what:\
  \ Referenz auf das durch den Abruf betroffene Datenobjekt Task, ChargeItem, MedicationDispense,\
  \ Consent oder Objekt der Zugriffsberechtigung</li>\n    <li>AuditEvent.entity.name:\
  \ Eintrag der KVNR des betroffenen Versicherten aus dem Identifier des protokollierten\
  \ Datenobjekts (String)</li>\n    <li>AuditEvent.entity.description: Rezept-ID als\
  \ Identifier, wird übernommen aus MedicationDispense, ChargeItem oder Task bzw.\
  \ Consent.category.coding.code bei Anlegen oder Löschen eines Consent bzw. countryCode\
  \ bei Anlegen oder Löschen einer Zugriffsberechtigung</li>\n  </ul>"
title: E-Rezept-Fachdienst - Inhalt Protokolleintrag
version: 0
