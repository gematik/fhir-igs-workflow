text: "Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation\
  \ über /Task/&#60;id&#62;/$reject den im referenzierten Task gespeicherten Status\
  \ Task.status prüfen und, wenn Task.status ungleich \"in-progress\" ist, die Operation\
  \ mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"border: 1px solid\
  \ black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>412 - Precondition\
  \ Failed</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n\
  \ <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n <td>TIFLOW_TASK_STATUS_MISMATCH</td>\n\
  \ </tr>\n <tr>\n <th>Details Text</th>\n <td>Task has invalid status.</td>\n </tr>\n\
  \ </table>\n abbrechen, damit die Verordnung nur zurückgegeben werden kann, wenn\
  \ sich die Verordnung in Belieferung befindet."
title: TI-Flow-Fachdienst - Task zurückweisen - Prüfung Status
version: 1
