text: Der E‑Rezept‑Fachdienst MUSS eingehende Datensätze strikt als UTF‑8 ohne Byte
  Order Mark (BOM) decodieren und bei fehlgeschlagener Decodierung oder beim Vorhandensein
  eines BOM die Verarbeitung mit einer HTTP‑Antwort 400 (Bad Request) und geeigneter
  Fehlermeldung abbrechen.
