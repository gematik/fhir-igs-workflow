text: "Der E‑Rezept‑Fachdienst MUSS eingehende Datensätze strikt als UTF‑8 ohne Byte\
  \ Order Mark (BOM) decodieren und bei fehlgeschlagener Decodierung oder beim Vorhandensein\
  \ eines BOM die Verarbeitung mit dem folgenden Fehler:\n <table id=\"error-code\"\
  \ style=\"border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>400 - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_BOM_DETECTED</td>\n </tr>\n <tr>\n <th>Details Text</th>\n <td>-</td>\n\
  \ </tr>\n </table> \n abbrechen."
