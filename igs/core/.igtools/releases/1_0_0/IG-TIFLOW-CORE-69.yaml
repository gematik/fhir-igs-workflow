text: "Der TI-Flow-Fachdienst MUSS, falls keine OCSP-Response für das Signaturzertifikat\
  \ der Quittung vorliegt bzw. die letzte vorliegende OCSP-Response älter als 24h\
  \ ist, die Operation mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"\
  border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>503 - Service Unavailable</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>transient</td>\n </tr>\n <tr>\n <th>Details\
  \ Code</th>\n <td>TIFLOW_SIGNATURE_NO_OCSP_RESPONSE</td>\n </tr>\n <tr>\n <th>Details\
  \ Text</th>\n <td>-</td>\n </tr>\n </table>\n abbrechen."
title: TI-Flow-Fachdienst - Task schließen - OCSP-Response nicht älter als 24h
