text: "Der TI-Flow-Fachdienst MUSS bei der Validierung einer FHIR-Ressource vom Typ\
  \ Bundle prüfen, ob für jedes entry im Bundle die ID der Ressource (Bundle.entry.resource.id)\
  \ vorhanden ist und bei Auffälligkeiten die Operation mit dem folgenden Fehler:\n\
  \ <table id=\"error-code\" style=\"border: 1px solid black; border-collapse: collapse;\"\
  >\n <tr>\n <th>HTTP-Code</th>\n <td>400 - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n\
  \ <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n\
  \ <th>Details Code</th>\n <td>MSG_RESOURCE_ID_MISSING</td>\n </tr>\n <tr>\n <th>Details\
  \ Text</th>\n <td>Die ID einer Ressource im Bundle ist nicht vorhanden.</td>\n </tr>\n\
  \ </table> \n abbrechen."
title: TI-Flow-Fachdienst - FHIR-Ressource validieren - Prüfung Existenz von Ressource.id
version: 1
