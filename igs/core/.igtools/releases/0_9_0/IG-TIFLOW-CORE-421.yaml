text: 'Das PS der verordnenden LEI MUSS den Anwendungsfall "UC 2.1 - E-Rezepte erzeugen"
  aus [gemSysL_eRp] gemäß TAB_ILFERP_002 umsetzen. Tabelle # : TAB_ILFERP_002 – E-Rezept
  durch Verordnenden erstellen Name E-Rezept durch Verordnenden erstellen Auslöser
  Aufruf des Anwendungsfalls in der GUI Akteur Leistungserbringer, Mitarbeiter verordnende
  LEI Vorbedingung Die LEI hat sich gegenüber der TI authentisiert. Der Workflow-Typ
  (FlowType) ist bekannt. Nachbedingung Im PS steht ein QES-Datensatz über den Verordnungsdatensatz
  des E-Rezept bereit. Standardablauf E-Rezept-ID von Fachdienst abrufen E-Rezept-Bundle
  erstellen E-Rezept-Bundle QES signieren (nur durch LE ausführbar)'
