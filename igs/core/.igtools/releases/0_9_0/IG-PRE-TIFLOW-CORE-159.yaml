text: "Das Clientsystem des E-Rezept-Fachdienstes MUSS in alle HTTP-Requests an den\
  \ E-Rezept-Fachdienst und IDP-Dienst im äußeren HTTP-Request den HTTP-Header user-agent gemäß\
  \ [RFC7231] mit &lt;Produktname&gt;/&lt;Produktversion&gt; &lt;Herstellername&gt;/&lt;client_id&gt;\
  \ mit \n    <ul>\n    <li>&lt;Produktname&gt; gemäß eigener Definition, Länge 1-20\
  \ Zeichen, Zeichenvorrat [0-9a-zA-Z\\-\\.]</li>\n    <li>&lt;Produktversion&gt;\
  \ gemäß Produktidentifikation</li>\n    <li>&lt;Herstellername&gt; gemäß eigener\
  \ Definition, Länge 1-20 Zeichen, Zeichenvorrat [0-9a-zA-Z\\-\\.] </li>\n    <li>&lt;client_id&gt;\
  \ gemäß Registrierung bei der gematik</li>\n    des Clientsystems befüllen."
title: 'CS: HTTP-Header user-agent'
