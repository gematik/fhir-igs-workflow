text: 'Das PS der abgebenden LEI MUSS den Anwendungsfall "E-Rezepte eines Versicherten
  durch Abgebenden abrufen" gemäß TAB_ILFERP_020 umsetzen. Tabelle # : TAB_ILFERP_020
  – E-Rezepte von Versicherten abrufen (VSDM) Name E-Rezepte von Versicherten abrufen
  (VSDM) Auslöser Aufruf des Anwendungsfalls in der GUI Akteur Leistungserbringer,
  Mitarbeiter der abgebenden LEI Vorbedingung Der eGK des Versicherten ist im eHealth-Kartenterminal
  gesteckt. Die LEI hat sich gegenüber der TI authentisiert. Nachbedingung Es steht
  eine Liste von Informationen mit Task-ID und zugehörigen AccessCode zu einlösbaren
  E-Rezepten des Versicherten für die Weiterverarbeitung zu Verfügung. Standardablauf
  VSD der eGK lesen VSDM Prüfungsnachweis ermitteln Hashwert hcv ermitteln E-Rezepte
  abrufen'
title: 'PS abgebende LEI: E-Rezepte von Versicherten abrufen (VSDM)'
