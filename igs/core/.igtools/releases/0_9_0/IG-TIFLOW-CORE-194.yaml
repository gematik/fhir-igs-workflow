text: "Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-Operation DELETE auf den\
  \ Endpunkt /Consent prüfen, dass der für ?category angegebene Wert in den CodeSystemen\
  \ \n  <ul>\n    <li>https://gematik.de/fhir/erpchrg/CodeSystem/GEM_ERPCHRG_CS_ConsentType</li>\n\
  \    <li>https://gematik.de/fhir/erp-eu/CodeSystem/GEM_ERPEU_CS_ConsentType</li>\n\
  \  </ul>\n  enthalten ist und bei fehlerhafter Prüfung den Request mit dem Fehler\
  \ 400 abbrechen, damit nur Löschrequests für definierte Consent Typen ausgeführt\
  \ werden."
title: E-Rezept-Fachdienst - Consent löschen - Prüfung category
