text: Der E-Rezept-Fachdienst MUSS beim Beenden eines Tasks mittels HTTP-POST-Operation
  über /Task/&lt;id&gt;/$close den im referenzierten Task gespeicherten Status Task.status
  prüfen und mit dem Fehler 412 abbrechen, wenn Task.status ungleich "in-progress"
  ist, damit der Workflow nur abgeschlossen werden kann, wenn sich die Verordnung
  in Belieferung befindet.
title: E-Rezept-Fachdienst - Task schließen - Prüfung Status
