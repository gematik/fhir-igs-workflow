text: "Der E-Rezept-Fachdienst MUSS beim Löschen eines E-Rezepts über den mittels\
  \ der &#60;id&#62; adressierten /Task/&#60;id&#62;/$abort alle personenbezogenen\
  \ medizinischen Daten, außer der KVNR in Task.for, aus dem referenzierten Task entfernen.\
  \ Dies gilt insbesondere für:\n  <ul>\n    <li>Task.input --> löschen (inkl. aller\
  \ referenzierten Elemente)</li>\n    <li>Task.output --> löschen (inkl. aller referenzierten\
  \ Elemente)</li>\n    <li>Task.identifier (AccessCode) --> löschen</li>\n    <li>Task.identifier\
  \ (Secret, falls vorhanden) --> löschen</li>\n    <li>Task.extension:lastMedicationDispense\
  \ (Zeitstempel, falls vorhanden) --> löschen</li>\n    <li>Task.owner --> löschen</li>\n\
  \    <li>Medication --> die in MedicationDispense.medication referenzierte Medication\
  \ löschen</li>\n    <li>MedicationDispense --> die in MedicationDispense.supportingInformation\
  \ auf Task.id verweist löschen</li>\n    <li>Communication --> die in Communication.basedOn\
  \ auf Task.id verweist</li>\n  </ul>\n  damit dem Betroffenenrecht auf Löschen durch\
  \ den Versicherten entsprochen wird und beim Löschen durch den Verordnenden dem\
  \ Versicherten eine aussagekräftige Fehlermeldung durch einen Apotheker vermittelt\
  \ werden kann."
title: E-Rezept-Fachdienst - E-Rezept löschen - Medizinische und personenbezogene
  Daten löschen
