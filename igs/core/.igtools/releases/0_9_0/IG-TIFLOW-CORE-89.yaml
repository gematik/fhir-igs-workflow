text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt
  /Task mit dem URL-Parameter pnw="..." durch eine abgebende LEI, falls im VSDM Prüfungsnachweis
  eine Prüfziffer enthalten ist, prüfen, dass die Differenz zwischen Zeitstempel aus
  der Prüfziffer des Prüfungsnachweises und dem aktuellen Zeitpunkt nicht größer als
  30 Minuten (konfigurierbar) ist und bei fehlerhafter Prüfung mit dem Fehler 403
  abbrechen. Im Fehlerfall ist die Meldung "Anwesenheitsnachweis konnte nicht erfolgreich
  durchgeführt werden (Zeitliche Gültigkeit des Anwesenheitsnachweis überschritten)."
  im OperationOutcome zu übermitteln.
