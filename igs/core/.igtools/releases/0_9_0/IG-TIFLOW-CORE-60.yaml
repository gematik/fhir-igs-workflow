text: "Der E-Rezept-Fachdienst MUSS beim Beenden eines Tasks mittels /Task/&lt;id&gt;/$close\
  \ ein Quittungsbundle gemäß des FHIR-Profils https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_Bundle\
  \ mit folgenden Informationen erstellen:\n    <ul>\n        <li>Telematik-ID der\
  \ aufrufenden Apotheke als Beneficiary in die GEM_ERP_PR_Composition</li>\n    \
  \    <li>Zeitstempel des Statuswechsel des Tasks \"in-progress\" in event.period.start</li>\n\
  \        <li>aktueller Zeitstempel in event.period.end</li>\n        <li>Identifier\
  \ PrescriptionID des Task als identifier des Quittungs-Bundle</li>\n        <li>Device-Ressource\
  \ mit Fachdienstinformationen als Autor der Signatur</li>\n        <li>Base64Binary-Ressource\
  \ mit Binary.data = &lt;base64-codierter Hashwert aus der QES Signatur des dem Task\
  \ zugrunde liegenden Verordnungsdatensatzes&gt; und contentTpe = \"application/octet-stream\"\
  </li>\n    </ul>\n    und dieses Quittungs-Bundle mit der Signaturidentität des\
  \ Fachdienstes ID.FD.OSIG gemäß [RFC5652] mit Profil CAdES-BES ([CAdES]) im Enveloping\
  \ signieren.\n    In die Signatur wird die letzte OCSP-Antwort der regelmäßigen\
  \ Statusprüfung des Signaturzertifikats C.FD.OSIG eingebettet.\n    Das Signatur-Ergebnis\
  \ wird als dss:Base64Signature-Objekt in Bundle.signature eingebettet und dieses\
  \ Quittungs-Bundle mit Referenz in Task.output mit Codingsystem https://gematik.de/fhir/erp/CodeSystem/GEM_ERP_CS_DocumentType\
  \ = 3 gespeichert sowie als Response des http-Requests an den Aufrufer zurückgeben,\
  \ damit die abgebende LEI einen Nachweis über den ordnungsgemäßen Abschluss des\
  \ E-Rezept-Workflows als Quittung erhält."
title: E-Rezept-Fachdienst - Task schließen - Quittung erstellen
version: 0
