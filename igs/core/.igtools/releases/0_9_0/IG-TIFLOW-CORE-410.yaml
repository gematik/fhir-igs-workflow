text: 'Das PS der verordnenden LEI MUSS den Anwendungsfall "UC 2.3 - E-Rezept einstellen"
  aus [gemSysL_eRp] gemäß TAB_ILFERP_003 umsetzen. Tabelle # : TAB_ILFERP_003 – E-Rezept
  durch Verordnenden einstellen Name E-Rezept durch Verordnenden einstellen Auslöser
  Aufruf des Anwendungsfalls in der GUI kann durch "E-Rezept durch Verordnenden erstellen"
  getriggert werden Akteur Leistungserbringer, Mitarbeiter verordnende LEI Vorbedingung
  Das E-Rezept wurde erstellt. (Anwendungsfall "E-Rezept erstellen"). Es stehen ein
  QES-signiertes E-Rezept-Bundle als PKCS#7-Datei bereit. Die LEI hat sich gegenüber
  der TI authentisiert. Nachbedingung Das E-Rezept ist auf dem E-Rezept-Fachdienst
  gespeichert. Es kann durch den Versicherten oder einen Apotheker in Kenntnis der
  Einlöseinformationen (Task-ID + AccessCode) abgerufen werden. Standardablauf Task
  auf dem E-Rezept-Fachdienst aktivieren optional, wenn das E-Rezept ausgedruckt werden
  soll: E-Rezept-Token erzeugen E-Rezept-Ausdruck erstellen'
title: 'PS verordnende LEI: E-Rezept durch Verordnenden einstellen'
