text: 'Das PS der abgebenden LEI MUSS den Anwendungsfall "UC 4.6 - Nachrichten durch
  Abgebenden empfangen" aus [gemSysL_eRp] gemäß TAB_ILFERP_010 umsetzen. Tabelle #
  : TAB_ILFERP_010 – Nachrichten von Versicherten empfangen Name Nachrichten von Versicherten
  empfangen Auslöser Aufruf des Anwendungsfalls in der GUI periodische Abfrage durch
  das PS Akteur Leistungserbringer, Mitarbeiter der abgebenden LEI Vorbedingung Die
  LEI hat sich gegenüber der TI authentisiert. Nachbedingung Die auf dem E-Rezept-Fachdienst
  für die abgebende LEI hinterlegten Communication Ressourcen wurden übertragen. Die
  E-Rezept-Nachrichten stehen im PS bereit. Standardablauf E-Rezept-Nachrichten am
  Fachdienst abrufen Mitteilung und E-Rezept-Token extrahieren'
