text: Der E-Rezept-Fachdienst MUSS bei der Validierung einer FHIR-Ressource vom Typ
  Bundle prüfen, ob der Wert von fullUrls der entries (Bundle.entry.fullUrl) dem [Format
  http-Schema] oder [Format urn:uuid-Schema] entsprechen und bei Auffälligkeiten mit
  dem HTTP-Fehlercode 400 abbrechen und die Fehlermeldung "Format der fullUrl ist
  ungültig." in Form eines OperationOutcome ausliefern.
