text: 'Das PS der abgebenden LEI MUSS den Anwendungsfall "UC 4.9 - Nachricht durch
  Abgebenden löschen" aus [gemSysL_eRp] gemäß TAB_ILFERP_013 umsetzen. Tabelle # :
  TAB_ILFERP_013 – Nachricht durch Abgebenden löschen Name Nachricht durch Abgebenden
  löschen Auslöser Aufruf des Anwendungsfalls in der GUI Akteur Leistungserbringer,
  Mitarbeiter der abgebenden LEI Vorbedingung Der Nutzer hat eine Nachricht zum Löschen
  markiert und das Löschen bestätigt. Die LEI hat sich gegenüber der TI authentisiert.
  Nachbedingung Die ausgewählte Nachricht ist vom E-Rezept-Fachdienst unwiederbringlich
  gelöscht. Standardablauf ID der Communication Ressource bestimmen Nachricht auf
  Fachdienst löschen Nachricht in PS löschen (optional)'
