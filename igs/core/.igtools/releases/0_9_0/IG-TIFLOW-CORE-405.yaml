text: 'Das PS der abgebenden LEI MUSS den Anwendungsfall "UC 4.7 - Nachricht durch
  Abgebenden übermitteln" aus [gemSysL_eRp] gemäß TAB_ILFERP_011 umsetzen. Tabelle
  # : TAB_ILFERP_011 – Nachricht an Versicherten versenden Name Nachricht an Versicherten
  versenden Auslöser Aufruf des Anwendungsfalls in der GUI Akteur Leistungserbringer,
  Mitarbeiter der abgebenden LEI Vorbedingung Die LEI hat eine E-Rezept-Nachricht
  vom E-Rezept-Fachdienst heruntergeladen. Der Nutzer hat eine Mitteilung als Antwort
  auf die Nachricht erfasst. Die LEI hat sich gegenüber der TI authentisiert. Nachbedingung
  Auf dem E-Rezept-Fachdienst steht eine E-Rezept-Nachricht für den Versicherten bereit.
  Standardablauf Versicherten-ID aus der Nachricht des Versicherten bestimmen Communication
  Ressource erstellen E-Rezept-Nachricht auf Fachdienst einstellen'
title: 'PS abgebende LEI: Nachricht an Versicherten versenden'
