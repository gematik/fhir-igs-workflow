text: "Der E-Rezept-Fachdienst MUSS das Konzept zur Handhabung der Rückgabe von mehreren\
  \ FHIR-Objekten auf folgende Endpunkte anwenden: Tabelle #: TAB_eRPFD_021 Endpunkte\
  \ des E-Rezept-Fachdienst, die das Konzept zur Handhabung der Rückgabe von mehreren\
  \ FHIR-Objekten bereitstellen müssen \n     \n     <table>\n<thead>\n<tr>\n<th>Endpunkt</th>\n\
  <th>Client</th>\n<th>Inhalt der Response</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n\
  <td>GET /Task</td>\n<td>Versicherte, Abgebende LEI</td>\n<td>Liste von verfügbaren\
  \ Tasks im E-Rezept-Fachdienst</td>\n</tr>\n<tr>\n<td>GET /Communication</td>\n\
  <td>Versicherte, Abgebende LEI</td>\n<td>Liste von verfügbaren Communications</td>\n\
  </tr>\n<tr>\n<td>GET /MedicationDispense</td>\n<td>Versicherte</td>\n<td>Liste von\
  \ eingestellten MedicationDispenses von Verordnungen</td>\n</tr>\n<tr>\n<td>GET\
  \ /ChargeItem</td>\n<td>Versicherte</td>\n<td>Liste von Abrechnungsinformationen\
  \ von Verordnungen</td>\n</tr>\n<tr>\n<td>GET /AuditEvent</td>\n<td>Versicherte</td>\n\
  <td>Liste von Protokolleinträgen des Versicherten</td>\n</tr>\n</tbody>\n</table>\n\
  \n<div><figcaption><strong>Tabelle: </strong>Endpunkte des E-Rezept-Fachdienst,\
  \ die das Konzept zur Handhabung der Rückgabe von mehreren FHIR-Objekten bereitstellen\
  \ müssen</figcaption></div>"
title: E-Rezept-Fachdienst - Handhabung der Rückgabe von mehreren FHIR-Objekten -
  Betroffene Endpunkte
