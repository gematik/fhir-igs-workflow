text: "Das E-Rezept-FdV KANN im Anwendungsfall \"E-Rezepte abrufen\" zum Herunterladen\
  \ eines E-Rezepts als Vertreter die HTTP-Operation GET /Task/&lt;id&gt; mit \n \
  \   <ul>\n        <li>ACCESS_TOKEN im http-Header</li>\n        <li>Task-ID in URL\
  \ &lt;id&gt; </li>\n        <li>AccessCode im http-Header </li>\n    </ul>\n   \
  \ ausführen."
