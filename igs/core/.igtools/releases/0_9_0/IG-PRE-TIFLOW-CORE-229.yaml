text: "Das E-Rezept-FdV und das PS der verordnenden LEI MÜSSEN zum Erstellen eines\
  \ E-Rezept-Token die ID auf einen Task zusammen mit dem AccessCode des Tasks aus\
  \ den lokal verfügbaren Informationen einer Verordnung als URL in der Form:\n  \
  \  <ul>\n    <li>2D-Code-Daten = \"Task/\" + Task.id + \"/$accept?ac=\" + AccessCode</li>\n\
  \    </ul>\n    zusammenstellen, damit diese Zeichenkette als Referenz in einer\
  \ E-Rezept-Nachricht oder in einem JSON-Array für die Generierung eines 2D-Codes\
  \ verwendet werden kann."
title: Datenstruktur Einlöseinformationen für E-Rezept
