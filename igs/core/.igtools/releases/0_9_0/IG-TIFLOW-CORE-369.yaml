text: 'Das PS der abgebenden LEI MUSS den Anwendungsfall "UC 4.4 - Quittung abrufen"
  aus [gemSysL_eRp] gemäß TAB_ILFERP_006 umsetzen. Tabelle # : TAB_ILFERP_006 – Quittung
  abrufen Name Quittung abrufen Auslöser Aufruf des Anwendungsfalls in der GUI Akteur
  Leistungserbringer, Mitarbeiter der abgebenden LEI Vorbedingung Die LEI hat das
  E-Rezept vom E-Rezept-Fachdienst heruntergeladen. Der Nutzer hat ein E-Rezept als
  abgeschlossen markiert. Die LEI hat sich gegenüber der TI authentisiert. Nachbedingung
  Die Quittung des E-Rezepts steht im PS bereit. Standardablauf optional (falls noch
  nicht vorab übermittelt): Informationen über das abgegebene Medikament erstellen
  nur für Fertigarzneimittel, die einen Data-Matrix-Code gemäß securPharm-System besitzen:
  Chargeninfo und Verfallsdatum ergänzen Task-ID und Geheimnis des E-Rezepts bestimmen
  E-Rezept-Status auf E-Rezept-Fachdienst ändern Quittung aus Response extrahieren
  optional: Signatur der Quittung prüfen'
title: 'PS abgebende LEI: Quittung abrufen'
