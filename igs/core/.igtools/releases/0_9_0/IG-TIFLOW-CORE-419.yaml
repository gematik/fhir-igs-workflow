text: 'Das PS der abgebenden LEI MUSS den Anwendungsfall "UC 4.2 - E-Rezept durch
  Abgebenden zurückgeben" aus [gemSysL_eRp] gemäß TAB_ILFERP_008 umsetzen. Tabelle
  # : TAB_ILFERP_008 – E-Rezept durch Abgebenden zurückgeben Name E-Rezept durch Abgebenden
  zurückgeben Auslöser Aufruf des Anwendungsfalls in der GUI Akteur Leistungserbringer,
  Mitarbeiter der abgebenden LEI Vorbedingung Die LEI hat das E-Rezept vom E-Rezept-Fachdienst
  heruntergeladen und es befindet sich im Status "in Abgabe (gesperrt). Der Nutzer
  hat ein E-Rezept zum Zurückgeben markiert und das Zurückgeben bestätigt. Die LEI
  hat sich gegenüber der TI authentisiert. Nachbedingung Das ausgewählte E-Rezept
  hat auf dem E-Rezept-Fachdienst den Status "offen" Standardablauf Task-ID und Geheimnis
  des E-Rezepts bestimmen E-Rezept Status auf Fachdienst ändern E-Rezept und E-Rezept-Token
  in PS löschen'
title: 'PS abgebende LEI: E-Rezept durch Abgebenden zurückgeben'
