text: "Das Clientsystem MUSS den Antrag zum AUTHORIZATION_CODE für ein ACCESS_TOKEN\
  \ beim Authorization-Endpunkt (URI_AUTH) in Form eines HTTP/1.1 GET Request stellen\
  \ und dabei die folgenden Attribute anführen:\n    <ul>\n        <li>\"response_type\"\
  </li>\n        <li>\"scope\"</li>\n        <li>\"client_id\"</li>\n        <li>\"\
  redirect_uri\"</li>\n        <li>\"code_challenge\" (Hashwert des \"code_verifier\"\
  ) [RFC7636#section-4.2]</li>\n        <li>\"code_challenge_method\" HASH-Algorithmus\
  \ (S256) [RFC7636#section-4.3]</li>\n    </ul>"
title: 'CS: Anfrage des AUTHORIZATION_CODE für ein ACCESS_TOKEN'
