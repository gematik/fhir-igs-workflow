text: "Der E-Rezept-Fachdienst MUSS E-Rezept-IDs erzeugen und verwalten, welche der\
  \ Syntax \"aaa.bbb.bbb.bbb.bbb.cc\" und der folgenden Semantik genügen \n     \n\
  \     <table>\n  <thead>\n    <tr>\n      <th></th>\n      <th>Bedeutung</th>\n\
  \      <th>Datentyp</th>\n    </tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td>aaa</td>\n\
  \      <td>E-Rezept-Typ</td>\n      <td>alphanummerisch, mit der Belegung gemäß\
  \ \"flowType\" in <a href=\"https://gematik.de/fhir/erp/CodeSystem/GEM_ERP_CS_FlowType\"\
  >https://gematik.de/fhir/erp/CodeSystem/GEM_ERP_CS_FlowType</a></td>\n    </tr>\n\
  \    <tr>\n      <td>bbb.bbb.bbb.bbb</td>\n      <td>fortlaufende Rezeptnummer</td>\n\
  \      <td>nummerisch, 12-stellig</td>\n    </tr>\n    <tr>\n      <td>cc</td>\n\
  \      <td>Prüfnummer Verfahren gemäß [ISO 7064]</td>\n      <td>nummerisch</td>\n\
  \    </tr>\n  </tbody>\n</table>\n     \n     damit Tippfehler in der manuellen\
  \ Erfassung erkannt werden können und die E-Rezept-ID über 11 Jahre eine eineindeutige\
  \ Zuordnung zwischen allen Datenobjekten im E-Rezept-Workflow erlaubt."
title: Aufbau E-Rezept-ID
version: 0
