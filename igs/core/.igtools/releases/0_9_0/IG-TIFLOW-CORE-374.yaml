text: 'Das PS der abgebenden LEI MUSS den Anwendungsfall "UC 4.1 - E-Rezept abrufen"
  aus [gemSysL_eRp] gemäß TAB_ILFERP_005 umsetzen. Tabelle # : TAB_ILFERP_005 – E-Rezept
  abrufen Name E-Rezept abrufen Auslöser Aufruf des Anwendungsfalls in der GUI Akteur
  Leistungserbringer, Mitarbeiter der abgebenden LEI Vorbedingung Die LEI hat den
  E-Rezept-Token zum E-Rezept übermittelt bekommen. Der E-Rezept-Token steht im PS
  bereit. Der Nutzer hat das E-Rezept zum Abruf markiert. Die LEI hat sich gegenüber
  der TI authentisiert. Nachbedingung Das E-Rezept steht im PS bereit. Standardablauf
  Task-ID und AccessCode des E-Rezepts bestimmen Task herunterladen QES prüfen Verordnung
  extrahieren E-Rezept-Daten speichern'
