text: "Das PS der verordnenden LEI MUSS im Anwendungsfall \"E-Rezept durch Verordnenden erstellen\"\
  \ für das E-Rezept die Signaturoperation des Konnektors mit \n  <ul>\n  <li>der\
  \ Referenz RFC-5652 für CMS-Signatur (CAdES)</li>\n  <li>Signaturtype für eine enveloping\
  \ Signature</li>\n  <li>dem base64-codierten E-Rezept-Bundle</li>\n  <li>eingebetteter\
  \ OCSP-Antwort (IncludeRevocationInfo = true)</li>\n  <li>Angabe des Mimetypes \"\
  text/plain; charset=utf-8\"</li>\n  </ul>\n  ausführen."
title: 'PS verordnende LEI: E-Rezept erstellen - E-Rezept-Bundle QES signieren'
