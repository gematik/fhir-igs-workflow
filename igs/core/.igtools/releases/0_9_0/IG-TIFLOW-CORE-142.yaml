text: "Das Clientsystem des E-Rezept-Fachdienstes MUSS in alle Anfragen an den E-Rezept-Fachdienst\
  \ im äußeren HTTP-Request den HTTP-Header \"X-erp-user\" mit dem Wert\n    <ul>\n\
  \    <li>\"l\" (kleines L) als PS eines Leistungserbringers</li>\n    <li>\"k\"\
  \ als CS eines Kostenträgers</li>\n    <li>\"v\" als E-Rezept-FdV oder</li>\n  \
  \  <li>\"n\" als NCPeH-FDeinfügen.</li>\n    </ul>"
