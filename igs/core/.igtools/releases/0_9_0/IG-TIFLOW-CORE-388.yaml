text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt
  /Task mit HTTP-Header X-PoPP-Token durch eine abgebende LEI, den im HTTP-Header X-PoPP-Token
  übermittelten Token extrahieren, prüfen und bei Fehlen oder fehlerhafter Prüfung
  mit dem Fehler 403 abbrechen, damit die Autorisierung zum Zugriff auf die Daten
  nur erfolgt, wenn ein Anwesenheitsnachweis erfolgreich durchgeführt wurde.
