text: "Der E-Rezept-Fachdienst MUSS, falls im VSDM Prüfungsnachweis eine Prüfziffer\
  \ enthalten ist, für den HMAC der Prüfziffer die führenden 23 Byte der Prüfziffer\
  \ (Felder 1-5) mittels SHA-256 Hashfunktion berechnen und für den nachfolgenden\
  \ Vergleich die ersten 24 Byte verwenden.<br>\n    Der E-Rezept-Fachdienst MUSS\
  \ im Fehlerfall die Meldung \"Anwesenheitsnachweis konnte nicht erfolgreich durchgeführt\
  \ werden (Fehler bei Prüfung der HMAC-Sicherung).\" im OperationOutcome zu übermitteln."
title: E-Rezept-Fachdienst - Prüfung Prüfziffer - Berechnung HMAC der Prüfziffer
