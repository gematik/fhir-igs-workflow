text: "Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt\
  \ /Task mit HTTP-Header X-PoPP-Token durch eine abgebende LEI mit der Rolle \n \
  \   <ul>\n    <li>oid_oeffentliche_apotheke</li>\n    <li>oid_krankenhausapotheke</li>\n\
  \    </ul>\n    , die Tasks nach  \n    <ul>\n    <li>Task.status = \"ready\",</li>\n\
  \    <li>Task.for = KVNR aus dem PoPP-Token (patientId),</li>\n    <li>Task.ExpiryDate\
  \ nicht vor dem aktuellen Datum liegt</li>\n    <li>und Task.extension:flowType\
  \ = 160 oder 166</li>\n    </ul>\n    filtern und in einem Bundle der gefundenen\
  \ Tasks (ohne den signierte Anhang QES) zurückgeben, damit eine abgebende LEI alle\
  \ zu einem Versicherten gehörenden einlösbaren E-Rezepte mit dem Status \"offen\"\
  \ abrufen kann."
title: E-Rezept-Fachdienst - Rezepte lesen - Apotheke - PoPP - PoPP - Filter KVNR
