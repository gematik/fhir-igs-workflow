text: "Das E-Rezept-FdV MUSS eine Sammlung von einer und bis zu drei E-Rezept-Referenzen\
  \ als Array in JSON-Notation gemäß [JSON] der folgenden Form  \n    <ul>\n    <li>2D-Code-Daten\
  \ = { \"urls\": [ \"E-Rezept 1\", \"E-Rezept 2\", \"E-Rezept 3\" ] }</li>\n    </ul>\n\
  \    zusammenfassen, um daraus einen 2D-Code generieren zu können."
