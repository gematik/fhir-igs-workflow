text: "Der E-Rezept-Fachdienst MUSS für die Sortierung bei der Handhabung der Rückgabe\
  \ von mehreren FHIR-Objekten folgende Ressourcen nach folgenden Kriterien aufsteigend\
  \ sortieren, wenn der Client keine Sortierung im Request angefragt hat: \n     \n\
  \     <table>\n<thead>\n<tr>\n<th>Endpunkt</th>\n<th>Default Sortierparameter</th>\n\
  </tr>\n</thead>\n<tbody>\n<tr>\n<td>GET /Task</td>\n<td>authored-on</td>\n</tr>\n\
  <tr>\n<td>GET /Communication</td>\n<td>sent</td>\n</tr>\n<tr>\n<td>GET /MedicationDispense</td>\n\
  <td>whenhandedover</td>\n</tr>\n<tr>\n<td>GET /ChargeItem</td>\n<td>entered-date</td>\n\
  </tr>\n<tr>\n<td>GET /AuditEvent</td>\n<td>date</td>\n</tr>\n</tbody>\n</table>\n\
  \n<div><figcaption><strong>Tabelle: </strong>Default Sortierparameter für die Handhabung\
  \ der Rückgabe von mehreren FHIR-Objekten</figcaption></div>"
title: E-Rezept-Fachdienst - Handhabung der Rückgabe von mehreren FHIR-Objekten -
  Sortieren von Einträgen
