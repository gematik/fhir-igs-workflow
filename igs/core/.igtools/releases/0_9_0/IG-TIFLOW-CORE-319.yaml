text: Der E-Rezept-Fachdienst MUSS beim Abrufen von Nachrichten über die http-Operation
  GET auf den Endpunkt /Communication bzw. beim Abruf einer einzelnen Nachricht über
  /Communication/&lt;id&gt; den Wert des Attributs Communication.received = &lt;aktuelle
  Systemzeit&gt setzen, wenn dieser Wert zum Zeitpunkt des Abrufs der Nachrichten
  NULL ist, damit Nutzer eine Filtermöglicheit auf "neue Nachrichten" haben.
title: E-Rezept-Fachdienst - Nachrichten abrufen - als abgerufen markieren
