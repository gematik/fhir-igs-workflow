text: "Das Clientsystem des E-Rezept-Fachdienstes MUSS für alle Anfragen an den E-Rezept-Fachdienst\
  \ für\n\t<ul>\n\t<li>die Abfrage des capability statement</li>\n\t<li>den Zugriff\
  \ auf Task, MedicationDispense, Communication, Consent, Prescription, AuditEvent\
  \ oder access-permission Ressourcen</li>\n\t</ul>\n\tdas Kommunikationsprotokoll\
  \ zwischen E-Rezept-VAU und E-Rezept-Clients in der Rolle E-Rezept-Client nutzen."
