text: "Das PS der abgebenden LEI MUSS im Anwendungsfall \"Nachrichten von Versicherten\
  \ empfangen\" die HTTP-Operation GET /Communication mit\n  <ul>\n    <li>ACCESS_TOKEN\
  \ im Authorization-Header</li>\n    <li>optional: ?received=null für nur ungelesene\
  \ Nachrichten</li>\n    <li>optional: ?received=gtYYYY-MM-DD für Nachrichten nach\
  \ Datum DD.MM.YYYY</li>\n  </ul>\n  ausführen."
