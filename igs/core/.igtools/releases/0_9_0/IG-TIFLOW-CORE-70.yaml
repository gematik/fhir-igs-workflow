text: "Das E-Rezept-FdV MUSS im Anwendungsfall \"Nachrichten löschen\" für die zu\
  \ löschende Nachricht die HTTP-Operation DELETE /Communication/&lt;id&gt; des E-Rezept-Fachdienstes\
  \ mit\n    <ul>\n        <li>ACCESS_TOKEN im Authorization-Header</li>\n       \
  \ <li>Communication-ID in URL &lt;id&gt;</li> \n    </ul>\n    ausführen."
