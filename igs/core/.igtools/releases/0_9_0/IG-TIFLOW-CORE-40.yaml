text: Der E-Rezept-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation
  über /Task/&#60;id&#62;/$reject den im referenzierten Task gespeicherten Status
  Task.status prüfen und mit dem Fehler 412 abbrechen, wenn Task.status ungleich "in-progress"
  ist, damit die Verordnung nur zurückgegeben werden kann, wenn sich die Verordnung
  in Belieferung befindet.
