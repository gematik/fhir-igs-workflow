text: Der E-Rezept-Fachdienst MUSS beim Anlegen eines neuen Tasks eine Rezept-ID gemäß
  der Bildungsregel [gemSpec_DM_eRp#A_19217-*] generieren und als Identifier mit Namingsystem
  https://gematik.de/fhir/erp/StructureDefinition/GEM_ERP_PR_PrescriptionId dem Task
  hinzufügen und sicherstellen, dass diese Rezept-ID innerhalb von 11 Jahren nach
  ihrer Erzeugung nicht erneut vergeben wird, damit es innerhalb der Aufbewahrungsfrist
  der Abrechnungsdaten bei den Krankenkassen zu keinen Dubletten kommt.
