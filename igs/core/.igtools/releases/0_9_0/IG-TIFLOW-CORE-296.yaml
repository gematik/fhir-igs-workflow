text: "Das PS der abgebenden LEI MUSS im Anwendungsfall \"Quittung abrufen\" für das\
  \ abgegebene E-Rezept die HTTP-Operation POST /Task/&#60;id&#62;/$close mit\n  \
  \  <ul> \n        <li>ACCESS_TOKEN im Authorization-Header</li>\n        <li>Task-ID\
  \ in URL &#60;id&#62;</li>\n        <li>Geheimnis in URL-Parameter ?secret=</li>\n\
  \        <li>optional, falls nicht zuvor mit Anwendungsfall \"Dispensierinformation\
  \ bereitstellen\" übermittelt: MedicationDispense bzw. Bundle Ressource</li>\n \
  \   </ul>\n    ausführen."
