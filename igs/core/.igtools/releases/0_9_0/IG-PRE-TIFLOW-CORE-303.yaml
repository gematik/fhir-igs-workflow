text: "Das Primärsystem MUSS bei der Prüfung von X.509-Zertifikaten der TI den CertificateService des\
  \ Konnektors mit der Operation VerifyCertificate gemäß [gemSpec_Kon#4.1.9.5.3] verwenden\
  \ und dabei\n    <ul>\n    <li>das zu prüfende Zertifikat als Parameter X509Certificate\
  \ verwenden</li>\n    <li>die aktuelle Systemzeit als Parameter VerificationTime\
  \ verwenden</li>\n    </ul>\n    Das Primärsystem MUSS bei Prüfung eines C.FD.ENC\
  \ den Rückgabewert in RoleList gegen die erwartete Rollen-OID gemäß TAB_ILFERP_012\
  \ prüfen und bei Abweichungen die Benutzung des Zertifikats für einen Verbindungsaufbau\
  \ zur VAU ablehnen."
title: 'CS: Prüfung TI-Zertifikate'
