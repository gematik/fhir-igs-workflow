text: Das Clientsystem MUSS das Discovery Document (DD) [RFC8414] regelmäßig alle
  24 Stunden einlesen und auswerten, und danach die darin aufgeführten URI zu den
  benötigten öffentlichen Schlüsseln (PUKs) und Diensten verwenden. Der Downloadpunkt
  wird als Teil der organisatorischen Registrierung des Clientsystems beim IDP-Dienst
  übergeben. Das Clientsystem MUSS den Downloadpunkt des Discovery Document als konfigurierbaren
  Parameter speichern.
title: 'CS: Regelmäßiges Einlesen des Discovery Document'
