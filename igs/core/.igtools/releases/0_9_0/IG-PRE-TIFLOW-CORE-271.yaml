text: Der E-Rezept-Fachdienst MUSS beim Aufruf der Operation GET /pushers die dem
  Versicherten zugeordneten Pusher-Ressourcen anhand der KVNR des Versicherten aus
  dem ACCESS_TOKEN im "Authorization"-Header des HTTP-Requests identifizieren, damit
  ausschließlich Versicherte ihre eigenen App-Registrierungen einsehen können.
