text: "Der E-Rezept-Fachdienst MUSS bei der Handhabung der Rückgabe von mehreren FHIR-Objekten\
  \ folgende Filteroperatoren für Suchkriterien anbieten, deren Datentyp \"date\"\
  \ ist: \n     \n<table>\n<thead>\n<tr>\n<th>Operator</th>\n<th>Übersetzung</th>\n\
  <th>Bedeutung</th>\n</tr>\n</thead>\n<tbody>\n<tr>\n<td>eq</td>\n<td>equals</td>\n\
  <td>ist gleich (=)</td>\n</tr>\n<tr>\n<td>ne</td>\n<td>not equals</td>\n<td>ist\
  \ nicht gleich (!=)</td>\n</tr>\n<tr>\n<td>gt</td>\n<td>greater than</td>\n<td>größer\
  \ als (&gt;)</td>\n</tr>\n<tr>\n<td>lt</td>\n<td>less than</td>\n<td>kleiner als\
  \ (&lt;)</td>\n</tr>\n<tr>\n<td>ge</td>\n<td>greater equals</td>\n<td>größer gleich\
  \ (&gt;=)</td>\n</tr>\n<tr>\n<td>le</td>\n<td>less equals</td>\n<td>kleiner gleich\
  \ (&lt;=)</td>\n</tr>\n</tbody>\n</table>\n\n<div><figcaption><strong>Tabelle: </strong>Filteroperatoren\
  \ für Datumsabfragen</figcaption></div>"
title: E-Rezept-Fachdienst - Handhabung der Rückgabe von mehreren FHIR-Objekten -
  Filteroperatoren für Datumsabfragen
