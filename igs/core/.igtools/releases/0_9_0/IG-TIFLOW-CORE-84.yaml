text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt
  /Task mit dem URL-Parameter pnw="..." durch eine abgebende LEI die Telematik-ID
  des Aufrufers im ACCESS_TOKEN im HTTP-Requestheader "Authorization" feststellen
  und den Aufruf in einer Statistik zur Prüfung des Ratelimits erfassen, wenn der
  Aufruf mit einem Fehler 456 oder 458 abgebrochen wird. Der E-Rezept-Fachdienst MUSS
  die Statistik zur Prüfung des Ratelimits alle 24h zurück auf 0 setzen.
