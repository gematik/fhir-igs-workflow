text: "Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt\
  \ /Task sicherstellen, dass ausschließlich Versicherte und Leistungserbringer in\
  \ der Rolle\n    <ul>\n        <li>oid_versicherter</li>\n        <li>oid_oeffentliche_apotheke</li>\n\
  \        <li>oid_krankenhausapotheke</li> \n    </ul>\n    die Operation am E-Rezept-Fachdienst\
  \ aufrufen dürfen und die Rolle \"professionOID\" des Aufrufers im ACCESS_TOKEN\
  \ im HTTP-RequestHeader \"Authorization\" feststellen, damit E-Rezepte nicht durch\
  \ Unberechtigte ausgelesen werden können."
