text: "Der E-Rezept-Fachdienst MUSS das Signatur-Zertifikat des PoPP-Service für die\
  \ Signatur des PoPP-Token gemäß [gemSpec_PKI#TUC_PKI_018] mit folgenden Parametern\
  \ auf Gültigkeit prüfen:\n    <table>\n    <tr>\n    <th>Parameter</th>\n    <th></th>\n\
  \    </tr>\n    <tr>\n    <td>Zertifikat</td>\n    <td>Signaturzertifikat des PoPP-Service</td>\n\
  \    </tr>\n    <tr>\n    <td>PolicyList</td>\n    <td>oid_zd_sig</td>\n    </tr>\n\
  \    <tr>\n    <td>intendedKeyUsage</td>\n    <td>nonRepudiation</td>\n    </tr>\n\
  \    <tr>\n    <td>intendedExtendedKeyUsage</td>\n    <td>(leer)</td>\n    </tr>\n\
  \    <tr>\n    <td>OCSP-Graceperiod</td>\n    <td>60 Minuten</td>\n    </tr>\n \
  \   <tr>\n    <td>Offline-Modus</td>\n    <td>nein</td>\n    </tr>\n    <tr>\n \
  \   <td>Prüfmodus</td>\n    <td>OCSP</td>\n    </tr>\n    </table>\n    <div><figcaption><strong>Tabelle:\
  \ </strong>TAB_eRPFD_031 Parameter Prüfung Signaturzertifikat PoPP-Service</figcaption></div>\n\
  \n    Das Signaturzertifikat muss gemäß dem TUC als befunden werden und im Fehlerfall\
  \ das Signaturzertifikat nicht zur Signaturprüfung der PoPP-Token verwenden, damit\
  \ sichergestellt wird dass, ausschließlich PoPP-Token von einem vertrauenswürdigen\
  \ PoPP-Service akzeptiert werden."
title: E-Rezept-Fachdienst - Prüfung PoPP-Token - Prüfung Signaturzertifikat PoPP-Service
version: 0
