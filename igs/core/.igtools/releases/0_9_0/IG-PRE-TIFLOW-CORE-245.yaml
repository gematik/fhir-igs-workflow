text: "Das Clientsystem des E-Rezept-Fachdienstes KANN einen einfachen Health-Check\
  \ auf der Endpunkt / (root) mit Abfrage ⇒ ( \"GET / [---]\" ) durchführen, welcher\
  \ mit Ausnahmen periodisch die Erreichbarkeit des E-Rezept-Fachdienstes feststellt\
  \ und folgende Kriterien erfüllt: \n    <ol>\n    <li>Die festgelegte Idle-Periode\
  \ darf 10 Minuten nicht unterschreiten.</li>\n    <li>Der Zeitraum zwischen den\
  \ Aufrufen (Idle-Periode) muss um eine zufällige Zeitspanne zwischen 0 und 10.000\
  \ Millisekunden verlängert werden, um eine Gleichverteilung der Anfragen am E-Rezept-Fachdienst\
  \ über alle Clientsysteme zu erreichen.</li>\n    </ol>"
