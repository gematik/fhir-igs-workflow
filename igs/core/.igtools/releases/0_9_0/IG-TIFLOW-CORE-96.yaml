text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf den Endpunkt /Task mit
  den URL-Parameter pnw="..." durch eine abgebende LEI, falls im VSDM Prüfungsnachweis
  keine Prüfziffer enthalten, das Ergebnis im Prüfungsnachweis gleich 3 und der passende
  Status AcceptPN3VSDMxx = false ist mit dem Fehler 454 abbrechen.
