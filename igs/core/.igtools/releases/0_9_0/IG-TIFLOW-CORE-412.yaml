text: 'Das E-Rezept-FdV und das PS der verordnenden LEI MÜSSEN zum Erstellen eines
  E-Rezept-Token die ID auf einen Task zusammen mit dem AccessCode des Tasks aus den
  lokal verfügbaren Informationen eines E-Rezepts als URL in der Form: 2D-Code-Daten
  = "Task/" + Task.id + "/$accept?ac=" + AccessCode zusammenstellen, damit diese Zeichenkette
  als Referenz in einer E-Rezept-Nachricht und in einem JSON-Array für die Generierung
  eines 2D-Codes verwendet werden kann.'
