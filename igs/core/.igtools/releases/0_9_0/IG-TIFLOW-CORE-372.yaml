text: 'Das PS der abgebenden LEI MUSS den Anwendungsfall "UC 4.8 - Quittung erneut
  abrufen" aus [gemSysL_eRp] gemäß TAB_ILFERP_007 umsetzen. Tabelle # : TAB_ILFERP_007
  – Quittung erneut abrufen Name Quittung erneut abrufen Auslöser Aufruf des Anwendungsfalls
  in der GUI Akteur Leistungserbringer, Mitarbeiter der abgebenden LEI Vorbedingung
  Die LEI hat bereits mindestens einmal die Quittung abgerufen (Anwendungsfall "Quittung
  abrufen"). Die LEI hat sich gegenüber der TI authentisiert. Nachbedingung Die Quittung
  zum E-Rezept steht im PS bereit. Standardablauf Task-ID und Geheimnis des E-Rezepts
  bestimmen Quittung abrufen Quittung aus Response extrahieren'
