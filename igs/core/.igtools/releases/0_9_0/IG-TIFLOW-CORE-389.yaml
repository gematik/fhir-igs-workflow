text: Das PS der abgebenden LEI MUSS im Anwendungsfall "E-Rezepte von Versicherten
  abrufen" den Anwendungsfall abbrechen, wenn die Operation ReadVSD mit einem Fehler
  antwortet oder im Response kein Prüfungsnachweis enthalten ist, um den Anwendungsfall
  nur fortzuführen, wenn der Operationsaufruf ReadVSD mit der Option "Onlineprüfung
  durchführen" erfolgreich durchgeführt werden konnte.
title: 'PS abgebende LEI: E-Rezepte von Versicherten abrufen - Abbruch bei Fehler
  ReadVSD'
