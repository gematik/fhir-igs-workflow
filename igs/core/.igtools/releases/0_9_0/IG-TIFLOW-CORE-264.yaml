text: "Das Clientsystem des E-Rezept-Fachdienst MUSS alle Zertifikate, die es aktiv\
  \ verwendet (bspw. TLS-Verbindungsaufbau), auf Integrität und Authentizität prüfen.\
  \ Falls die Prüfung kein positives Ergebnis (\"gültig\") liefert, so MUSS es die\
  \ von dem Zertifikat und den darin enthaltenen Attributen (bspw. öffentliche Schlüssel)\
  \ abhängenden Arbeitsabläufe ablehnen. <br>\n\tDas Clientsystem des E-Rezept-Fachdienst\
  \ MUSS alle öffentlichen Schlüssel, die es verwenden will, auf eine positiv verlaufene\
  \ Zertifikatsprüfung zurückführen können."
title: 'CS: verpflichtende Zertifikatsprüfung'
