text: Der E-Rezept-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation
  über /Task/&#60;id&#62;/$activate den im Aufrufparameter übergebenen FHIR-Operationsparameter
  des QES-Datensatzes als PKCS#7-Datei einer Enveloping CAdES-Signatur entgegennehmen
  und verarbeiten und bei Fehlen oder ungültiger ASN.1 Datenstruktur die Weiterverarbeitung
  im Fachdienst mit dem http-Status-Code 400 beantworten, damit kein Schadcode und
  keine "fachfremden" Daten in den E-Rezept-Fachdienst hochgeladen werden.
title: E-Rezept-Fachdienst - Task aktivieren - Schemavalidierung
