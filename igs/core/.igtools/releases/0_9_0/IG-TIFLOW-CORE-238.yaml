text: 'Das E-Rezept-FdV MUSS zum Erstellen eines Token für die Zugriffsinformationen
  für eine Abrechnungsinformation die ID auf einen ChargeItem zusammen mit dem AccessCode
  zum Ändern aus den lokal verfügbaren Informationen einer Abrechnungsinformation
  als URL in der Form: 2D-Code-Daten = "ChargeItem/" + ChargeItem.id  + "?ac=" + AccessCode
  zusammenstellen, damit diese Zeichenkette als Referenz in einer E-Rezept-Nachricht
  oder für die Generierung eines 2D-Codes verwendet werden kann.'
title: Datenstruktur Zugriffsinformationen für Abrechnungsinformation
