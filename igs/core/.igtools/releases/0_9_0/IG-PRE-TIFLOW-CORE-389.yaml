text: Der E-Rezept-Fachdienst MUSS das Übermitteln der Daten an den ePA Medication
  Service asynchron zur Bereitstellung der Daten durch die Clientsysteme umsetzen,
  damit für das bereitstellende Primärsystem der verordnenden oder abgebenden Leistungserbringerinstitution
  oder E-Rezept-FdV keine verlängerte Verarbeitungsdauer der auslösenden Operation
  auftritt.
