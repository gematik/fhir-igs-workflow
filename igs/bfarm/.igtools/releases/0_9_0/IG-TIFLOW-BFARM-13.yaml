text: Der E-Rezept-Fachdienst MUSS die Datenübermittlung an den BfArM Webdienst für
  mindestens eine Minute unterbrechen, wenn ein Aufruf mit dem Statuscode 500 oder
  429 scheitert. Bei anhaltenden Problemen MUSS der E-Rezept-Fachdienst einen exponentiellen
  Backoff-Mechanismus anwenden, der die Wartezeit zwischen den Versuchen sukzessive
  verdoppelt, um die Systembelastung zu minimieren.
title: E-Rezept-Fachdienst - BfArM - Fehlerbehandlung - Reaktion auf Scheitern des
  Operationaufrufs
