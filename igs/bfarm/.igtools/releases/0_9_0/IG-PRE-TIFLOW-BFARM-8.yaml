text: Der E-Rezept-Fachdienst MUSS das Übermitteln der Daten an den BfArM Webdienst
  asynchron zur Bereitstellung der Daten durch die Clientsysteme umsetzen, damit für
  das bereitstellende Primärsystem der abgebenden Leistungserbringerinstitution keine
  verlängerte Verarbeitungsdauer der auslösenden Operation auftritt.
