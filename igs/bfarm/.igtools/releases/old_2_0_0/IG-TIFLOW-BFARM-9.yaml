text: "Der TI-Flow-Fachdienst MUSS für das Bereitstellen eines digitalen Durchschlags\
  \ für ein E-T-Rezept die Daten der abgebenden Apotheke aus dem Verzeichnisdienst\
  \ ermitteln, indem an den Verzeichnisdienst folgende Abfrage gestellt wird: \n <ul>\n\
  \ <li>Abfrage der Ressource \"HealthcareService\", </li>\n <li>HealthcareServices,\
  \ deren Organisation aktiv sind, </li>\n <li>HealthcareServices, deren origin tag\
  \ = ldap ist, </li>\n <li>HealthcareServices, deren Organisation als Identifier\
  \ die Telematik-ID trägt, die im Dispensierdatensatz angegeben wurde, </li>\n <li>Einbeziehen\
  \ der Organisation in das Rückgabeergebnis, </li>\n <li>Einbeziehen der Location\
  \ in das Rückgabeergebnis</li>\n </ul>"
title: TI-Flow-Fachdienst - BfArM - Suche nach Apothekendaten
