text: "Der TI-Flow-Fachdienst MUSS zum Beziehen eines AccessTokens den Endpunkt /ords/rezepte/oauth/token\
  \ am BfArM Webdienst mit folgenden Parametern aufrufen: \n    <table>\n      <tr>\n\
  \        <th>HTTP-Methode </th>\n        <td>POST</td>\n      </tr>\n      <tr>\
  \ \n        <th>HTTP-Header </th>\n        <td>Content-Type: application/x-www-form-urlencoded\
  \ Authorization: Basic &lt;base64(client_id:client_secret)&gt; </td>\n      </tr>\n\
  \      <tr>\n        <th>HTTP-Body </th>\n        <td>Form-Parameter: grant_type=client_credential</td>\n\
  \      </tr>\n    </table>\n    , um einen AccessToken für den Zugriff auf den BfArM\
  \ Webdienst zu beziehen."
title: TI-Flow-Fachdienst - BfArM - Beziehen des AccessTokens
