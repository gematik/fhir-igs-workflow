text: "Der TI-Flow-Fachdienst MUSS für das Übertragen eines digitalen Durchschlags\
  \ den BfArM Webdienst RESTful wie folgt aufrufen: \n <table>\n <tr>\n <th>HTTP-Parameter</th>\n\
  \ <th>Wert</th>\n </tr>\n <tr>\n <td>Methode</td>\n <td>POST</td>\n </tr>\n <tr>\n\
  \ <td>Endpunkt</td>\n <td>/ords/rezepte/t-rezept/v1</td>\n </tr>\n <tr>\n <td>Header</td>\n\
  \ <td>\n <ul>\n <li>Authorization: Bearer &lt;AccessToken&gt;</li>\n <li>Content-Type:\
  \ application/fhir+json</li>\n <li>X-Request-ID: &lt;random-uuid&gt;</li>\n </ul>\n\
  \ </td>\n </tr>\n <tr>\n <td>Body</td>\n <td>&lt;digitaler Durchschlag E-T-Rezept&gt;</td>\n\
  \ </tr>\n </table>"
