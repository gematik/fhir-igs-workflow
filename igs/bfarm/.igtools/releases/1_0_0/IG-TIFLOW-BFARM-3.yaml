text: 'Der TI-Flow-Fachdienst MUSS zum Beziehen eines AccessTokens den Endpunkt /ords/rezepte/oauth/token
  am BfArM Webdienst mit folgenden Parametern aufrufen: HTTP-Methode POST HTTP-Header
  Content-Type: application/x-www-form-urlencoded Authorization: Basic &lt;base64(client_id:client_secret)&gt;
  HTTP-Body Form-Parameter: grant_type=client_credential um einen AccessToken für
  den Zugriff auf den BfArM Webdienst zu beziehen.'
