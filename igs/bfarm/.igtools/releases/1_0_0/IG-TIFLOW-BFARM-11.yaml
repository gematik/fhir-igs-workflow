text: "Der E-Rezept-Fachdienst MUSS den Anwendungsfall \"Übertragen des digitalen\
  \ Durchschlags\" gemäß Tabelle TAB_eRPFD_029 ausführen. \n    <table>\n    <tr>\n\
  \      <th>Name</th>\n      <td>Übertragen des digitalen Durchschlags</td>\n   \
  \ </tr>\n    <tr>\n      <th>Auslöser</th>\n      <td>Abschluss eines E-Rezept Workflows\
  \ mit Flowtype 166 via Aufruf der $close-Operation</td>\n    </tr>\n    <tr>\n \
  \     <th>Akteur</th>\n      <td>E-Rezept-Fachdienst</td>\n    </tr>\n    <tr>\n\
  \      <th>Vorbedingung</th>\n      <td>\n        <ul>\n          <li>Dem E-Rezept-Fachdienst\
  \ liegen Client Credentials des BfArM zur Authentifizierung vor</li>\n         \
  \ <li>Verordnungsdaten, Dispensierinformationen und Informationen aus dem FHIR-VZD\
  \ liegen vor</li>\n          <li>Ein gültiger AccessToken für den Zugriff auf den\
  \ BfArM Webdienst liegt vor</li>\n        </ul>\n      </td>\n    </tr>\n    <tr>\n\
  \      <th>Nachbedingung</th>\n      <td>Am BfArM Webdienst wurde der digitale Durchschlag\
  \ E-T-Rezept erfolgreich übertragen.</td>\n    </tr>\n    <tr>\n      <th>Standardablauf</th>\n\
  \      <td>\n        <ol>\n          <li>Prüfen, ob ein gültiger AccessToken vorliegt.</li>\n\
  \          <li>Falls nicht: Client Credentials an den Token-Endpunkt übertragen.</li>\n\
  \          <li>AccessToken speichern.</li>\n          <li>Erzeugen des digitalen\
  \ Durchschlags E-T-Rezept.</li>\n          <li>Auftrag zur Übertragung des digitalen\
  \ Durchschlags E-T-Rezept in einer Warteschlange einstellen.</li>\n          <li>Aufruf\
  \ des Endpunktes <code>/ords/rezepte/t-rezept/v1</code>.</li>\n          <li>Nach\
  \ erfolgreicher Übertragung: Löschen des Auftrags aus der Warteschlange.</li>\n\
  \        </ol>\n      </td>\n    </tr>\n  </table>\n  <div><figcaption><strong>Tabelle:\
  \ </strong>title</figcaption></div>"
title: E-Rezept-Fachdienst - BfArM - Anwendungsfall Übertragen des digitalen Durchschlags
