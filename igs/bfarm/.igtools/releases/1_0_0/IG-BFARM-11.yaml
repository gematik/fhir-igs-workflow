text: 'Der E-Rezept-Fachdienst MUSS für das Bereitstellen eines digitalen Durchschlags
  für ein E-T-Rezept die Daten der abgebenden Apotheke aus dem Verzeichnisdienst ermitteln,
  indem an den Verzeichnisdienst folgende Abfrage gestellt wird: Abfrage der Ressource
  "HealthcareService", HealthcareServices, deren Organisation aktiv sind, HealthcareServices,
  deren origin tag = ldap ist, HealthcareServices, deren Organisation als Identifier
  die Telematik-ID trägt, die im Dispensierdatensatz angegeben wurde, Einbeziehen
  der Organisation in das Rückgabeergebnis, Einbeziehen der Location in das Rückgabeergebnis'
title: E-Rezept-Fachdienst - BfArM - Suche nach Apothekendaten
