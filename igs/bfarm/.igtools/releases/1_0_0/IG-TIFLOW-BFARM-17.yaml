text: "Der TI-Flow-Fachdienst MUSS für das Bereitstellen eines digitalen Durchschlags\
  \ für ein E-T-Rezept, wenn die Daten der abgebenden Apotheke nicht aus dem Verzeichnisdienst\
  \ ermittelt werden können,\n <ul>\n <li>die Telematik-ID der Apotheke aus den Dispensierinformationen\
  \ und</li>\n <li>den Wert für zeta-user-info.commonName aus Nutzerinformationen\
  \ bzw. falls zeta-user-info.commonName = NULL den Wert \"unbekannt\" als Name der\
  \ Apotheke</li>\n </ul>\n in den digitalen Durchschlag übernehmen."
title: TI-Flow-Fachdienst - BfArM - Fehlerbehandlung - kein VZD Eintrag für die Apotheke
