# Übertrag T-Register
- id: 166-uebertrag-t-register
  anchor: 166-uebertrag-t-register
  link: menu-technische-umsetzung-anwendungsfaelle.html#166-uebertrag-t-register
  title: "UC 5.8 - Durchschlag E-T-Rezept beim BfArM einstellen"
  description: |
    Mit diesem Anwendungsfall übermittelt der TI-Flow-Fachdienst nach dem erfolgreichen Abruf einer Quittung für ein E-T-Rezept durch eine Apotheke die die notwendigen Daten des E-T-Rezeptes an den BfArM Webdienst.
  preconditions: |
    - Der Anwendungsfall "UC 4.4 - Quittung abrufen" wird ausgeführt.
  actions: |
    - Das PS einer abgebenden LEI ruft die Operation am TI-Flow-Fachdienst auf und übermittelt die Dispensierinformationen.
    - Der TI-Flow-Fachdienst führt die Prüfungen der Operation aus.
    - Der TI-Flow-Fachdienst erstellt, wenn die Prüfung erfolgreich abgeschlossen wurde, einen Datenübermittlungsauftrag inklusive des digitalen Durchschlags E-T-Rezept.
    - Der TI-Flow-Fachdienst überträgt den digitalen Durchschlag E-T-Rezept an den BfArM Webdienst.
    - Der BfArM Webdienst verarbeitet und persistiert die übermittelten Daten.
    - Der TI-Flow-Fachdienst löscht den Datenübermittlungsauftrag aus der Warteschlange, wenn der BfArM Webdienst die Daten erfolgreich verarbeiten konnte.
  postconditions: |
    - Die Daten des "digitalen Durchschlag E-T-Rezept" sind, sofern die Verarbeitung im BfArM Webdienst erfolgreich abgeschlossen werden konnten, im BfArM Webdienst gespeichert.
  interface: |
    - [API-ERP: Digitaler Durchschlag E-T-Rezept am T-Register einstellen](https://github.com/gematik/api-erp/blob/master/docs/erp_bfarm.adoc#digitaler-durchschlag-e-t-rezept-am-t-register-einstellen)
  diagram: seq-bfarm-t-rezept

