text: "Das E-Rezept-FdV MUSS Anwendungsfall \"Zugriffsberechtigung erteilen\" die\
  \ Liste aller zulässigen Länder aus dem Verzeichnisdienst ermitteln, indem an den\
  \ Verzeichnisdienst folgende Abfrage gestellt wird:\n    <ul>\n        <li>Abfrage\
  \ der Ressource \"HealthcareService\"</li>\n        <li>HealthcareServices, deren\
  \ Speciality \"57833-6\" aus https://loinc.org enthalten</li>\n        <li>HealthcareServices,\
  \ deren Organisation aktiv sind</li>\n        <li>HealthcareServices, deren Organisation\
  \ den OrganizationProfessionOIDType \"1.2.276.0.76.4.292\" entspricht</li>\n   \
  \     <li>Einbeziehen der Organisation in das Rückgabeergebnis</li>\n    </ul>"
title: 'E-Rezept-FdV: Zugriffsberechtigung - Liste zulässiger Länder'
