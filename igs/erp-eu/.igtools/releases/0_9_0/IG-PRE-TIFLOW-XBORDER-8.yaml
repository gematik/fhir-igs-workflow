text: 'Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation des Endpunkts
  /$get-eu-prescriptions durch den NCPeH-FD sicherstellen, dass nur Ressourcen eines
  Tasks bereitgestellt werden, die folgende Kriterien erfüllen: Task.for = KVNR für
  die KVNR aus Parameters.parameter:requestData.part:kvnr Task.ExpiryDate nicht vor
  dem aktuellen Datum Falls MedicationRequest.extension:Mehrfachverordnung.extension:Kennzeichen
  = true, dann MedicationRequest.extension:Mehrfachverordnung.extension:Zeitraum.value[x]:valuePeriod.start
  nicht nach dem aktuellen Datum Task.extension:eu-isRedeemableByProperties = true
  Task.extension:eu-isRedeemableByPatientAuthorization = true damit eine Apotheke
  im europäischen Ausland nur einlösbare E-Rezepte abrufen kann.'
title: E-Rezept-Fachdienst - eu-prescription abfragen - Filter einlösbarer E-Rezepte
