text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation auf den Endpunkt
  /$grant-eu-access-permission die Rolle professionOID des Aufrufers im ACCESS_TOKEN
  im HTTP-RequestHeader "Authorization" feststellen und sicherstellen, dass ausschließlich
  Versicherte in der Rolle oid_versicherter die Operation am E-Rezept-Fachdienst aufrufen
  dürfen, damit eine Zugriffsberechtigte nicht durch Unberechtigte erteilt werden
  kann.
title: E-Rezept-Fachdienst - Zugriffsberechtigung schreiben - Rollenprüfung
