text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation auf den Endpunkt
  /$grant-eu-access-permission prüfen, dass der im Request übermittelte Zugriffscode
  (Parameters.parameter:accessCode) das korrekte Format hat und bei fehlschlagender
  Prüfung die Operation mit dem HTTP-Fehlercode 400 und dem OperationOutcome "Der
  übermittelte Zugriffscode ist nicht zulässig." abbrechen.
