text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation des Endpunkts
  /$get-eu-prescriptions durch den NCPeH-FD sicherstellen, dass die FHIR-Ressourcen
  zu einlösbaren Verordnungen in einem übergreifenden FHIR-Bundle gruppiert werden,
  absteigend sortiert nach dem medicationrequest.authored-on Datum, wobei das Bundle
  pro Verordnung ein FHIR-Bundle vom Typ https://fhir.kbv.de/StructureDefinition/KBV_PR_ERP_Bundle
  enthält, mit der unter https://gematik.de/fhir/erp/NamingSystem/GEM_ERP_NS_PrescriptionId
  abgelegten Task-ID sowie den im MedicationRequest referenzierten Ressourcen MedicationRequest,
  Medication, Patient, Practitioner und Coverage.
