text: Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation des Endpunkts
  /Task/&lt;id&gt;/$eu-close durch den NCPeH-FD sicherstellen, dass die zulässige
  Beendigung eines übermittelten Tasks im Status Task.status = completed vollzogen
  wird, damit der Workflow für den Versicherten als beendet und das E-Rezept somit
  als eingelöst dargestellt wird.
