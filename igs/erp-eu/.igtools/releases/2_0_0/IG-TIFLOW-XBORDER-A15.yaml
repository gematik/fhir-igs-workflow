text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation des Endpunkts\
  \ /$get-eu-prescriptions durch den NCPeH-FD sicherstellen, dass wenn Parameters.parameter:requestData.part:prescription-id\
  \ nicht leer ist, die Ressourcen aller einlösbaren Verordnung zurückgegeben werden,\
  \ deren Task-IDs in Parameters.parameter:requestData.part:prescription-id enthalten\
  \ sind, und falls keine Verordnung vorliegt, die Operation mit dem folgenden Fehler:\n\
  \      <table id=\"error-code\" style=\"border: 1px solid black; border-collapse:\
  \ collapse;\">\n        <tr>\n            <th>HTTP-Code</th>\n            <td>404\
  \ - Not Found</td>\n        </tr>\n        <tr>\n            <th>Severity</th>\n\
  \            <td>error</td>\n        </tr>\n        <tr>\n            <th>Code</th>\n\
  \            <td>invalid</td>\n        </tr>\n        <tr>\n            <th>Details\
  \ Code</th>\n            <td>TIFLOW_XBORDER_NO_PRESCRIPTIONS_FOUND</td>\n      \
  \  </tr>\n        <tr>\n            <th>Details Text</th>\n            <td>-</td>\n\
  \        </tr>\n    </table> \n    abbrechen."
