text: 'Der TI-Flow-Fachdienst MUSS die Liste aller zulässigen Länder aus dem Verzeichnisdienst
  ermitteln, indem an den Verzeichnisdienst folgende Abfrage gestellt wird: Abfrage
  der Ressource "HealthcareService", HealthcareServices, deren Speciality "57833-6"
  aus https://loinc.org enthalten, HealthcareServices, deren Organisation aktiv sind,
  HealthcareServices, deren Organisation den OrganizationProfessionOIDType "1.2.276.0.76.4.292"
  entspricht, Einbeziehen der Organisation in das Rückgabeergebnis.'
