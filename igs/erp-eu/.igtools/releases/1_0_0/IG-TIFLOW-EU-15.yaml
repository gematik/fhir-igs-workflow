text: 'Der E-Rezept-Fachdienst MUSS bei Aufruf der HTTP-PATCH-Operation auf den Endpunkt
  /Task/&lt;id&gt; sicherstellen, dass ausschließlich Versicherte in der Rolle: oid_versicherter,
  die Operation am E-Rezept-Fachdienst aufrufen dürfen und die Rolle professionOID
  des Aufrufers im ACCESS_TOKEN im HTTP-RequestHeader "Authorization" feststellen,
  damit E-Rezepte nicht durch Unberechtigte markiert werden können.'
title: E-Rezept-Fachdienst - Task markieren - Versicherter - Rollenprüfung Versicherter
  markiert Rezepte
