text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation des Endpunkts
  /$get-eu-prescriptions durch den NCPeH-FD sicherstellen, dass zu dem in Parameters.parameter:requestData.part:kvnr,
  Parameters.parameter:requestData.part:accessCode und Parameters.parameter:requestData.part:countryCode
  übermittelte Tripple von KVNR, Zugriffs- und Ländercode eine zeitliche gültige Zugriffsberechtigung
  im E-Rezept-Fachdienst existiert und bei fehlgeschlagener Prüfung die Operation
  mit dem HTTP-Fehlercode 403 abbrechen, damit nur Verordnungsdaten für Versicherte
  übermittelt werden, wenn eine gültige Zugriffsberechtigung vorliegt.
title: E-Rezept-Fachdienst - eu-prescription abfragen - Prüfung Zugriffsberechtigung
