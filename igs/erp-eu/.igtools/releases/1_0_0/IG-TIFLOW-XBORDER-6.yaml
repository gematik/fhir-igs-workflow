text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation des Endpunkts\
  \ /$get-eu-prescriptions durch den NCPeH-FD sicherstellen, dass für die in Parameters.parameter:requestData.part:kvnr\
  \ übermittelte KVNR ein Consent-Datensatz mit Consent.patient.identifier = KVNR\
  \ und Consent.category.coding.code = EUDISPCONS existiert und bei fehlgeschlagener\
  \ Prüfung die Operation mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"\
  border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>403 - Forbidden</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_CONSENT_REQUIRED</td>\n </tr>\n <tr>\n <th>Details Text</th>\n <td>-</td>\n\
  \ </tr>\n </table> \n abbrechen, damit nur Verordnungsdaten für Versicherte übermittelt\
  \ werden, die eine Einwilligung erteilt haben."
title: TI-Flow-Fachdienst - eu-prescription abfragen - Prüfung Einwilligung für KVNR
version: 1
