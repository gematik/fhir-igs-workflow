text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation des Endpunkts
  /$get-eu-prescriptions durch den NCPeH-FD sicherstellen, dass wenn Parameters.parameter:requestData.part:prescription-id
  nicht leer ist, die Ressourcen aller einlösbaren Verordnung zurückgegeben werden,
  deren Task-IDs in Parameters.parameter:requestData.part:prescription-id enthalten
  sind, und falls keine Verordnung vorliegt, mit dem HTTP-Statuscode 404 antworten.
