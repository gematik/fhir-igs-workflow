text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation des Endpunkts\
  \ /$get-eu-prescriptions durch den NCPeH-FD sicherstellen, dass zu dem in Parameters.parameter:requestData.part:kvnr,\
  \ Parameters.parameter:requestData.part:accessCode und Parameters.parameter:requestData.part:countryCode\
  \ übermittelte Tripple von KVNR, Zugriffs- und Ländercode eine zeitliche gültige\
  \ Zugriffsberechtigung im TI-Flow-Fachdienst existiert und bei fehlgeschlagener\
  \ Prüfung die Operation mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"\
  border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>403 - Forbidden</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_ACCESS_PERMISSION_INVALID</td>\n </tr>\n <tr>\n <th>Details Text</th>\n\
  \ <td>-</td>\n </tr>\n </table> \n abbrechen, damit nur Verordnungsdaten für Versicherte\
  \ übermittelt werden, wenn eine gültige Zugriffsberechtigung vorliegt."
title: TI-Flow-Fachdienst - eu-prescription abfragen - Prüfung Zugriffsberechtigung
