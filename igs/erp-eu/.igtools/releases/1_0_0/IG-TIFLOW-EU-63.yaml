text: 'Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation des Endpunkts
  /Task/&lt;id&gt;/$eu-close sicherstellen, dass ausschließlich Nutzer in der Rolle:
  oid_ncpeh, die Operation am Fachdienst aufrufen dürfen und die Rolle professionOID
  des Aufrufers im ACCESS_TOKEN im HTTP-RequestHeader Authorization feststellen, damit
  der E-Rezept-Workflow nicht durch einen Unberechtigten abgeschlossen werden kann.'
