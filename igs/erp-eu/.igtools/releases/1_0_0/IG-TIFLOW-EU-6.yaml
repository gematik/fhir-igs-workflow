text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation des Endpunkts
  /$get-eu-prescriptions durch den NCPeH-FD sicherstellen, dass für die in Parameters.parameter:requestData.part:kvnr
  übermittelte KVNR ein Consent-Datensatz mit Consent.patient.identifier = KVNR und
  Consent.category.coding.code = EUDISPCONS existiert und bei fehlgeschlagener Prüfung
  die Operation mit dem HTTP-Fehlercode 403 abbrechen, damit nur Verordnungsdaten
  für Versicherte übermittelt werden, die eine Einwilligung erteilt haben.
title: E-Rezept-Fachdienst - eu-prescription abfragen - Prüfung Einwilligung für KVNR
