text: Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-PATCH-Operation auf eine konkrete
  über &lt;id&gt; adressierte /Task/&lt;id&gt; Ressource durch einen Versicherten
  prüfen, ob der adressierte Task in Task.extension:eu-isRedeemableByProperties.valueBoolean
  = true gesetzt ist und anderfalls mit dem HTTP-Fehlercode "409 - Conflict" und einer
  entsprechenden Fehlermeldung im OperationOutcome die Operation abbrechen.
title: TI-Flow-Fachdienst -Task markieren -Versicherter - nur einlösbare E-Rezepte
