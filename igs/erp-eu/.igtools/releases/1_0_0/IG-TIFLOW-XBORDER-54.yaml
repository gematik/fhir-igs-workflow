text: Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-DELETE-Operation auf den Endpunkt
  /$revoke-eu-access-permission die Rolle professionOID des Aufrufers im ACCESS_TOKEN
  im HTTP-RequestHeader "Authorization" feststellen und sicherstellen, dass ausschließlich
  Versicherte in der Rolle oid_versicherter die Operation am TI-Flow-Fachdienst aufrufen
  dürfen, damit die Information zur Zugriffsberechtigung nicht durch Unberechtigte
  gelöscht werden kann.
