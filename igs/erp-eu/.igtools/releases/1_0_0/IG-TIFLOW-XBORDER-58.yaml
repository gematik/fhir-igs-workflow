text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation auf den Endpunkt\
  \ /$grant-eu-access-permission prüfen, dass der im Request übermittelte Ländercode\
  \ (Parameters.parameter:countryCode) einem Land entspricht, welches die Anwendung\
  \ ePrescription/eDispensation Szenario Land A unterstützt und bei fehlschlagender\
  \ Prüfung die Operation mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"\
  border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>409 - Conflict</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_XBORDER_COUNTRY_CODE_INVALID</td>\n </tr>\n <tr>\n <th>Details Text</th>\n\
  \ <td>Für das angefragte Land ist Einlösen von E-Rezepten nicht möglich.</td>\n\
  \ </tr>\n </table> \n abbrechen, damit der Versicherte nur für zulässige europäische\
  \ Länder eine Zugriffsberechtigung erteilt."
title: TI-Flow-Fachdienst - Zugriffsberechtigung schreiben - Prüfung Ländercode
version: 1
