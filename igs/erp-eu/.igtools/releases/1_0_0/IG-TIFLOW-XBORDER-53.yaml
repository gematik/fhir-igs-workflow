text: "Das E-Rezept-FdV MUSS im Anwendungsfall \"Zugriffsberechtigung erteilen\" zum\
  \ Speichern der Information am TI-Flow-Fachdienst die HTTP-Operation POST /$grant-eu-access-permission\
  \ mit:\n <ul>\n <li>ACCESS_TOKEN im Authorization-Header</li>\n <li>Organization.extension:ncpehCountryEx.valueCodeableConcept.coding.code\
  \ des vom Nutzer ausgewählten Landes in Parameters.parameter:countryCode</li>\n\
  \ <li>erzeugter Zugriffscode in Parameters.parameter:accessCode</li>\n </ul>\n ausführen."
