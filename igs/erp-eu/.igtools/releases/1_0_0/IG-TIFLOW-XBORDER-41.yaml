text: Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation des Endpunkts
  /Task/&lt;id&gt;/$eu-close durch den NCPeH-FD sicherstellen, dass zu dem in Parameters.parameter:requestData.part:kvnr,
  Parameters.parameter:requestData.part:accessCode und Parameters.parameter:requestData.part:countryCode
  übermittelte Tripple von KVNR, Zugriffs- und Ländercode eine zeitliche gültige Zugriffsberechtigung
  im TI-Flow-Fachdienst existiert und bei fehlgeschlagener Prüfung die Operation mit
  dem HTTP-Fehlercode 403 abbrechen, damit nur Dispensierinformationen übermittelt
  werden, wenn eine gültige Zugriffsberechtigung vorliegt.
title: TI-Flow-Fachdienst - Task schließen - EU - Prüfung Zugriffsberechtigung
