text: Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation auf den Endpunkt
  /$grant-eu-access-permission die KVNR des Versicherten im ACCESS_TOKEN im HTTP-RequestHeader
  "Authorization" feststellen und sicherstellen, dass ein Consent-Datensatz mit Consent.patient.identifier
  = KVNR und Consent.category.coding.code = EUDISPCONS existiert und bei fehlgeschlagener
  Prüfung die Operation mit dem HTTP-Fehlercode 403 und dem OperationOutcome "Das
  Erstellen einer Zugriffsberechtigung ist erst zulässig, wenn eine Einwilligung durch
  den Nutzer zum Einlösen von E-Rezepten im europäischen Ausland erteilt wurde." abbrechen,
  damit nur Versicherte eine Zugriffsberechtigung schreiben, die eine Einwilligung
  erteilt haben.
title: TI-Flow-Fachdienst - Zugriffsberechtigung schreiben - Prüfung Einwillung für
  KVNR
version: 0
