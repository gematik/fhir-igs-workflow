text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation auf den Endpunkt
  /$grant-eu-access-permission prüfen, dass der im Request übermittelte Ländercode
  (Parameters.parameter:countryCode) einem Land entspricht, welches die Anwendung
  ePrescription/eDispensation Szenario Land A unterstützt und bei fehlschlagender
  Prüfung die Operation mit dem HTTP-Fehlercode 409 und dem OperationOutcome "Für
  das angefragte Land ist Einlösen von E-Rezepten nicht möglich." abbrechen, damit
  der Versicherte nur für zulässige europäische Länder eine Zugriffsberechtigung erteilt.
title: E-Rezept-Fachdienst - Zugriffsberechtigung schreiben - Prüfung Ländercode
