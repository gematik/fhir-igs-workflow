text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation auf den Endpunkt\
  \ /$grant-eu-access-permission prüfen, dass der im Request übermittelte Zugriffscode\
  \ (Parameters.parameter:accessCode) das korrekte Format hat und bei fehlschlagender\
  \ Prüfung die Operation mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"\
  border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>400 - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_ACCESS_CODE_INVALID</td>\n </tr>\n <tr>\n <th>Details Text</th>\n <td>Der\
  \ übermittelte Zugriffscode ist nicht zulässig.</td>\n </tr>\n </table> \n abbrechen."
title: TI-Flow-Fachdienst - Zugriffsberechtigung schreiben - Prüfung Zugriffscode
