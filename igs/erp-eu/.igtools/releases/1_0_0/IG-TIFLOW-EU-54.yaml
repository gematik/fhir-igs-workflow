text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation des Endpunkts
  /$get-eu-prescriptions durch den NCPeH-FD, wenn Parameters.parameter:requestData.part:prescription-id
  nicht leer ist, für alle Tasks deren Task-IDs in Parameters.parameter:requestData.part:prescription-id
  enthalten sind, eine 256 Bit Zufallszahl mit einer Mindestentropie von 120 Bit erzeugen,
  hexadezimal kodieren ([0-9a-f]{64}) und diese im zu speichernden Task als externe
  ID in Task.identifier:Secret als [Identifier Profile for Secret (GEM_ERP_PR_Secret)]
  hinzufügen.
