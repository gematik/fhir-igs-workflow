text: Der E-Rezept-Fachdienst MUSS beim Aufruf der HTTP-PATCH-Operation auf eine konkrete
  über &lt;id&gt; adressierte /Task/&lt;id&gt; Ressource durch einen Versicherten
  auf die Ressource übertragene Parameters Ressource gegen das FHIR-Profil GEM_ERPEU_PR_PAR_PATCH_Task_Input
  prüfen und bei Nicht-Konformität den Aufruf mit dem http-Status-Code 400 ablehnen,
  damit nur FHIR-valide Ressourcen in den E-Rezept-Fachdienst akzeptiert werden.
