text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation auf den Endpunkt\
  \ /$grant-eu-access-permission den zeta-user-info.identifier des Nutzers (KVNR)\
  \ bestimmen und sicherstellen, dass ein Consent-Datensatz mit Consent.patient.identifier\
  \ = KVNR und Consent.category.coding.code = EUDISPCONS existiert und bei fehlgeschlagener\
  \ Prüfung die Operation mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"\
  border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>403 - Forbidden</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_CONSENT_REQUIRED</td>\n </tr>\n <tr>\n <th>Details Text</th>\n <td>Das\
  \ Erstellen einer Zugriffsberechtigung ist erst zulässig, wenn eine Einwilligung\
  \ durch den Nutzer zum Einlösen von E-Rezepten im europäischen Ausland erteilt wurde.</td>\n\
  \ </tr>\n </table> \n abbrechen, damit nur Versicherte eine Zugriffsberechtigung\
  \ schreiben, die eine Einwilligung erteilt haben."
title: TI-Flow-Fachdienst - Zugriffsberechtigung schreiben - Prüfung Einwillung für
  KVNR
version: 1
