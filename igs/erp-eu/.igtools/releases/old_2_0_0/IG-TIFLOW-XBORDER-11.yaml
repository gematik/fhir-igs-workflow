text: 'Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-POST-Operation des Endpunkts
  /$get-eu-prescriptions durch den NCPeH-FD sicherstellen, dass wenn Parameters.parameter:requestData.part:prescription-id
  nicht leer ist, nur Ressourcen eines Tasks bereitgestellt werden, die folgendes
  Kriterium erfüllen: Task.status = ready ODER (Task.status = in-progress UND Task.owner
  = zeta-user-info.identifier).'
