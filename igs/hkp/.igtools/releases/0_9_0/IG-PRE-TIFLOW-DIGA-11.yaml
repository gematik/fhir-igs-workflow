text: "Das E-Rezept-FdV SOLL im Anwendungsfall \"Kostenträger suchen\", wenn die IKNR\
  \ oder Telematik-ID des Kostenträgers des Nutzers nicht verfügbar ist, die Liste\
  \ aller Kostenträger aus dem Verzeichnisdienst ermitteln, indem an den Verzeichnisdienst\
  \ folgende Abfrage gestellt wird:\n  <ul>\n  <li>Abfrage der Ressource \"HealthcareService\"\
  </li>\n  <li>HealthcareServices, deren Organisation aktiv sind</li>\n  <li>HealthcareServices,\
  \ deren Organisation den Typ-oid \"1.2.276.0.76.4.59\" haben</li>\n  <li>HealthcareServices,\
  \ deren Organisation einen Identifier vom Typ \"IKNR\" haben</li>\n  <li>HealthcareServices,\
  \ deren Organisation einen Identifier vom Typ \"Telematik-ID\" haben</li>\n  <li>Einbeziehen\
  \ der Organisation in das Rückgabeergebnis</li>\n  </ul>"
title: 'E-Rezept-FdV: Kostenträger Suchen - Liste verfügbarer Kostenträger ermitteln'
version: 0
