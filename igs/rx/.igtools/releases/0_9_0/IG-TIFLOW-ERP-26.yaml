text: "Der E-Rezept-Fachdienst MUSS bei der Bereitstellung von Dispensierinformationen\
  \ mittels POST /Task/&lt;id&gt;/$dispense auf den in der URL referenzierten /Task/&lt;id&gt;\
  \ sicherstellen, dass ausschließlich abgebende Leistungserbringer in einer der Rollen\n\
  \        <ul> \n        <li>oid_oeffentliche_apotheke</li>\n        <li>oid_krankenhausapotheke</li>\n\
  \        </ul>\n        die Operation am Fachdienst aufrufen dürfen und die Rolle\
  \ \"professionOID\" des Aufrufers im ACCESS_TOKEN im HTTP-RequestHeader \"Authorization\"\
  \ feststellen, damit Dispensierinformationen nicht durch einen Unberechtigten eingestellt\
  \ werden kann."
title: E-Rezept-Fachdienst - Dispensierinformationen bereitstellen - Rollenprüfung
  Abgebender stellt Dispensierinformationen bereit
