text: "Das PS der abgebenden LEI KANN im Anwendungsfall \"E-Rezept abrufen\" die QES\
  \ des E-Rezepts prüfen. Zum Prüfen der QES des E-Rezepts ist die Operation POST\
  \ //Konnektorservice mit \n    <ul>\n    <li>Header \"SOAPAction: \\\"http://ws.gematik.de/conn/SignatureService/v7.4#VerifyDocument\\\
  \"\" </li>\n    <li>PKCS#7-Datei in SignatureObject</li>\n    </ul>\n    auszuführen."
