text: "Der E-Rezept-Fachdienst MUSS beim Beenden eines Tasks mit Flowtype 160, 166,\
  \ 169, 200 oder 209 mittels HTTP-POST/$close-Operation auf den in der URL referenzierten\
  \ /Task/&lt;id&gt; sicherstellen, dass ausschließlich abgebende Institutionen in\
  \ der Rolle\n    <ul>\n      <li>oid_oeffentliche_apotheke</li> \n      <li>oid_krankenhausapotheke</li>\n\
  \    </ul>\n    die Operation am Fachdienst aufrufen dürfen und die Rolle \"professionOID\"\
  \ des Aufrufers im ACCESS_TOKEN im HTTP-RequestHeader \"Authorization\" feststellen,\
  \ damit der Workflow nicht durch einen Unberechtigten abgeschlossen werden kann."
title: E-Rezept-Fachdienst - Task schließen - Flowtype 160/166/169/200/209 - Rollenprüfung
