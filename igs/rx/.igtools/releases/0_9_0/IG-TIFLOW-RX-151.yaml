text: Das PS der verordnenden LEI SOLL dem Nutzer nach der Auswahl des Verordnungsinhalts
  die Möglichkeit geben, weitere Details (z.B. Anzahl der Packungen) der aktuellen
  als E-Rezept dargestellten Verordnung hinzuzufügen. Es SOLL den Nutzer darauf hinweisen,
  dass mit der Bestätigung dieser Auswahl die Verordnung erfolgen soll und der erste
  Schritt zur Signatur ausgelöst wird. Dieser Hinweis muss durch den Nutzer nicht
  bestätigt werden.
