text: Der E-Rezept-Fachdienst MUSS beim Löschen eines E-Rezepts über den mittels der
  &#60;id&#62; adressierten /Task/&#60;id&#62;/$abort durch abgebende Leistungserbringer
  (Apotheken) das im URL-Parameter "?secret=..." übertragene Geheimnis gegen das im
  referenzierten Task enthaltene Secret in Task.identifier prüfen und bei Missmatch
  oder Fehlen des URL-Parameters den Aufruf mit dem HTTP-Fehlercode 403 abweisen,
  damit ausschließlich Apotheker in Kenntnis des Secret als Berechtigte ein E-Rezept
  löschen.
title: E-Rezept-Fachdienst - E-Rezept löschen - Apotheke - Prüfung Secret
