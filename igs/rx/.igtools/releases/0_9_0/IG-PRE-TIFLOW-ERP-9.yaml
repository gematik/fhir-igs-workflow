text: "Das PS der abgebenden LEI MUSS im Anwendungsfall \"E-Rezepte von Versicherten\
  \ abrufen\" die HTTP-Operation GET /Task mit \n    <ul>\n    <li>ACCESS_TOKEN im\
  \ Authorization-Header</li>\n    <li>base64- und URL-codierter Prüfungsnachweis\
  \ in URL-Parameter pnw</li>\n    <li>Versicherten-ID in URL-Parameter kvnr</li>\n\
  \    <li>Base64URLSafe-kodierter Hashwert hcv in URL-Parameter hcv</li>\n    </ul>\n\
  \    ausführen."
