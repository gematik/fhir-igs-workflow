text: "Der E-Rezept-Fachdienst MUSS das Löschen eines E-Rezepts über den mittels der\
  \ &lt;id&gt; adressierten /Task/&lt;id&gt;/$abort verhindern und die Operation mit\
  \ dem HTTP-Fehlercode 403 abweisen, wenn der Status des adressierten Tasks ungleich\
  \ \"in-progress\" ist und die Rolle des aufrufenden Nutzers einer der folgenden\
  \ Rollen entspricht: \n    <ul>\n        <li>oid_oeffentliche_apotheke</li>\n  \
  \      <li>oid_krankenhausapotheke</li>\n    </ul>\n    damit kein Apotheker ein\
  \ Rezept löscht, das ihm nicht ausdrücklich zugewiesen wurde."
