text: 'Das PS der abgebenden LEI MUSS den Anwendungsfall "PKV-Abgabedatensatz durch
  Abgebenden ändern" gemäß TAB_ILFERP_xxx umsetzen. Tabelle # : TAB_ILFERP_xxx – Abrechnungsinformation
  ändern Name PKV-Abgabedatensatz ändern Auslöser Aufruf des Anwendungsfalls in der
  GUI Akteur Leistungserbringer, Mitarbeiter der abgebenden LEI Vorbedingung Der Versicherte
  hat den AccessCode übermittelt. Die abgebende LEI hat die Abrechnungsinformation
  für das E-Rezept auf dem E-Rezept-Fachdienst bereitgestellt. Die Information zur
  Prescription-ID ist bekannt. Die LEI hat sich gegenüber der TI authentisiert. Nachbedingung
  Der geänderte PKV-Abgabedatensatz ist auf dem E-Rezept-Fachdienst gespeichert. Standardablauf
  PKV-Abgabedatensatz erstellen PKV-Abgabedatensatz mit Konnektor signieren Prescription-ID
  und AccessCode der Abrechnungsinformation bestimmen Abrechnungsinformation speichern'
title: 'PS abgebende LEI: PKV-Abgabedatensatz ändern'
