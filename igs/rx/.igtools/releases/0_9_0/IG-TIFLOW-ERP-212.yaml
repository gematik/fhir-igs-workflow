text: Das PS der abgebenden LEI MUSS beim Erstellen einer MedicationDispense eines
  Fertigarzneimittels für ein E-Rezept des Flowtype 160, 166, 169, 200 oder 209 jede
  FHIR-Ressource Medication um Wirkstoff, Wirkstärke (inkl. Einheit) und Handelsnamen
  ergänzen, sofern die Informationen in der verwendeten Arzneimittel-Datenbank vorliegen.
