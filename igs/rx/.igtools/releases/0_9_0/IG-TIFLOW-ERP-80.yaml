text: "Der E-Rezept-Fachdienst MUSS nach der Feststellung der Prozessparametern die\
  \ folgenden Parameter mit abweichenden Werten belegen:\n    <ul>\n        <li>Task.AcceptDate\
  \ = &#60;Datum der QES.ErstellungBundle.signature.when&#62; + 2 Werktage (Montag\
  \ bis Samstag, ausgenommen bundeseinheitliche Feiertage) (Abweichende Regelungen\
  \ durch denGemeinsamen Bundesausschuss (G-BA) sind zu beachten.)</li>\n    </ul>\n\
  \    wenn das in der http-POST-Operation /Task/&#60;id&#62;/$activate übergebene,\
  \ gültig signierte E-Rezept-Bundle in der Extension https://fhir.kbv.de/StructureDefinition/KBV_EX_FOR_Legal_basis\
  \ in Bundle.Composition den code=\"04\" oder \"14\" des Code-Systems https://fhir.kbv.de/CodeSystem/KBV_CS_SFHIR_KBV_STATUSKENNZEICHEN\
  \ (\"Entlassmanagement-Kennzeichen\") enthält und die übrigen Prozessparameter unverändert\
  \ übernehmen, damit der Prozess für das E-Rezept mit den abweichenden Festlegungen\
  \ für das Entlassrezept gemäß Arzneimittelrichtlinie [AM-RL] umgesetzt wird."
title: E-Rezept-Fachdienst - Task aktivieren - Entlassparameter - Prozessparameter
