text: "Das PS der abgebenden LEI (Apotheke) MUSS im Anwendungsfall \"Nachricht an\
  \ Versicherten versenden\" bezüglich der Belieferung eines Arzneimittels eine Communication\
  \ Ressource mit dem Profil GEM_ERP_PR_Communication_Reply mit \n  <ul>\n    <li>Versicherten-ID\
  \ des Absenders der empfangenen Nachricht in recipient</li>\n    <li>Task-ID des\
  \ referenzierten E-Rezeptes in basedOn</li>\n    <li>Nachrichten-ID der empfangenen\
  \ Anfrage in inResponseTo</li>\n    <li>Nachricht in payload contentString</li>\n\
  \  </ul>\n  erstellen."
title: 'PS abgebende LEI: Nachricht versenden - Belieferung Arzneimittel - Communication
  Ressource erstellen'
