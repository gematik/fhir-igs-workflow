text: "Das PS der abgebenden LEI MUSS im Anwendungsfall \"Dispensierinformationen\
  \ bereitstellen\" für das abgegebene E-Rezept die HTTP-Operation POST /Task/&lt;id&gt;/$dispense\
  \ mit \n    <ul>\n        <li>ACCESS_TOKEN im Authorization-Header </li>\n     \
  \   <li>Task-ID in URL &lt;id&gt; </li>\n        <li>Geheimnis in URL-Parameter\
  \ ?secret= </li>\n        <li>MedicationDispense bzw. Bundle Ressource </li>\n \
  \   </ul>\n    ausführen."
title: 'PS abgebende LEI: Dispensierinformationen bereitstellen - Dispensierinformation
  übermitteln'
