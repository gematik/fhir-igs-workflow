text: "Der TI-Flow-Fachdienst MUSS beim Zurückweisen eines Tasks mit Flowtype 160,\
  \ 169, 200 oder 209 mittels HTTP-POST-Operation über /Task/&lt;id&gt;/$reject die\
  \ Dispensierinformationen, falls welche vorhanden sind, löschen: \n  <ul>\n    <li>Medication,\
  \ die aus der MedicationDispense referenziert wird --> löschen</li>\n    <li>MedicationDispense\
  \ zum dazugehörigen Task --> löschen</li>\n    <li>Task.extension:lastMedicationDispense\
  \ --> löschen</li>\n  </ul>"
