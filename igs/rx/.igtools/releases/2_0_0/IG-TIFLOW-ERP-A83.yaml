text: "Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation\
  \ über /Task/&#60;id&#62;/$activate den Wert für Task.extension:eu-isRedeemableByProperties\
  \ auf \"true\" setzen, wenn: \n    <ul>\n      <li>Task.extension:flowType = 160\
  \ oder 200 und</li>\n      <li>MedicationRequests.medication vom Typ KBV_PR_ERP_Medication_PZN.</li>\n\
  \    </ul>\n    Andernfalls ist der Wert der Extension auf \"false\" zu setzen."
