text: "Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mit Flowtype 166 mittels\
  \ HTTP-POST-Operation über /Task/&#60;id&#62;/$activate prüfen, dass im Bundle eine\
  \ MedicationRequest-Ressource und eine Medication mit Medication.extension:Arzneimittelkategorie\
  \ = 02 enthalten ist, und andernfalls die Operation mit dem folgenden Fehler:\n\
  \      <table id=\"error-code\" style=\"border: 1px solid black; border-collapse:\
  \ collapse;\">\n        <tr>\n            <th>HTTP-Code</th>\n            <td>400\
  \ - Bad Request</td>\n        </tr>\n        <tr>\n            <th>Severity</th>\n\
  \            <td>error</td>\n        </tr>\n        <tr>\n            <th>Code</th>\n\
  \            <td>invalid</td>\n        </tr>\n        <tr>\n            <th>Details\
  \ Code</th>\n            <td>TIFLOW_FLOWTYPE_MISMATCH</td>\n        </tr>\n    \
  \    <tr>\n            <th>Details Text</th>\n            <td>Für diesen Workflowtypen\
  \ sind nur T-Rezept Verordnungen zulässig</td>\n        </tr>\n    </table> \n \
  \   abbrechen."
