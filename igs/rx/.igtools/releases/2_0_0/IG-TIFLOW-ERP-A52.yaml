text: "Der TI-Flow-Fachdienst MUSS das Löschen eines E-Rezepts mit dem Flowtype 169\
  \ oder 209 über den mittels der &lt;id&gt; adressierten /Task/&lt;id&gt;/$abort\
  \ verhindern, wenn der Status des adressierten Tasks ungleich \"completed\" ist\
  \ und die Rolle des aufrufenden Nutzers der folgenden Rolle entspricht: \n    <ul>\n\
  \    <li>oid_versicherter</li>\n    </ul>\n    , und die Operation mit dem folgenden\
  \ Fehler:\n      <table id=\"error-code\" style=\"border: 1px solid black; border-collapse:\
  \ collapse;\">\n        <tr>\n            <th>HTTP-Code</th>\n            <td>403\
  \ - Forbidden</td>\n        </tr>\n        <tr>\n            <th>Severity</th>\n\
  \            <td>error</td>\n        </tr>\n        <tr>\n            <th>Code</th>\n\
  \            <td>invalid</td>\n        </tr>\n        <tr>\n            <th>Details\
  \ Code</th>\n            <td>TIFLOW_TASK_STATUS_MISMATCH</td>\n        </tr>\n \
  \       <tr>\n            <th>Details Text</th>\n            <td>Task has invalid\
  \ status.</td>\n        </tr>\n    </table> \n    abweisen, damit kein Versicherter\
  \ ein E-Rezept aus einem Workflow mit Workflowsteuerung durch Leistungserbringer\
  \ (169, 209) löscht, das nicht bereits beliefert wurde."
title: TI-Flow-Fachdienst - E-Rezept löschen - Flowtype 169 / 209 - Versicherter -
  Statusprüfung
version: 0
