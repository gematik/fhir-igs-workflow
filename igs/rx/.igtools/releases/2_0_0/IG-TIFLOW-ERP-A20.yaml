text: Der TI-Flow-Fachdienst MUSS beim Beenden eines Tasks mittels /Task/&lt;id&gt;/$close
  sicherstellen, dass alle vorhandenen MedicationDispenses und ihre referenzierten
  Medications gelöscht werden, wenn der Client im Aufruf eine neue MedicationDispense
  übermittelt, sodass nach Abschluss der Operation nur die neu übermittelten MedicationDispenses
  gespeichert sind.
