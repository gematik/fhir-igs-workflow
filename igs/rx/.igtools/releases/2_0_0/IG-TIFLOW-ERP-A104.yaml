text: "Der TI-Flow-Fachdienst MUSS beim Abrufen eines Tasks mit Flowtype 160, 166,\
  \ 169, 200 oder 209 mittels HTTP-POST/$accept-Operation auf den in der URL referenzierten\
  \ /Task/&lt;id&gt; die zeta-user-info.professionOID des Nutzers bestimmen und sicherstellen,\
  \ dass ausschließlich abgebende Institutionen in der Rolle\n    <ul>\n      <li>oid_oeffentliche_apotheke</li>\
  \ \n      <li>oid_krankenhausapotheke</li>\n    </ul>\n    die Operation am Fachdienst\
  \ aufrufen und bei Abweichungen die Operation mit dem folgenden Fehler:\n      <table\
  \ id=\"error-code\" style=\"border: 1px solid black; border-collapse: collapse;\"\
  >\n        <tr>\n            <th>HTTP-Code</th>\n            <td>403 - Forbidden</td>\n\
  \        </tr>\n        <tr>\n            <th>Severity</th>\n            <td>error</td>\n\
  \        </tr>\n        <tr>\n            <th>Code</th>\n            <td>invalid</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Code</th>\n            <td>TIFLOW_AUTH_ROLE_NOT_ALLOWED</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Text</th>\n            <td>Der\
  \ Nutzer ist nicht berechtigt, die aufgerufene Operation anzufordern</td>\n    \
  \    </tr>\n    </table> \n    abbrechen, damit E-Rezepte nicht durch Unberechtigte\
  \ abgerufen werden können."
title: TI-Flow-Fachdienst - Task akzeptieren - Flowtype 160/166/169/200/209 - Rollenprüfung
version: 0
