text: "Der TI-Flow-Fachdienst MUSS das Löschen eines E-Rezepts über den mittels der\
  \ &lt;id&gt; adressierten /Task/&lt;id&gt;/$abort verhindern und die Operation mit\
  \ dem folgenden Fehler:\n      <table id=\"error-code\" style=\"border: 1px solid\
  \ black; border-collapse: collapse;\">\n        <tr>\n            <th>HTTP-Code</th>\n\
  \            <td>403 - Forbidden</td>\n        </tr>\n        <tr>\n           \
  \ <th>Severity</th>\n            <td>error</td>\n        </tr>\n        <tr>\n \
  \           <th>Code</th>\n            <td>invalid</td>\n        </tr>\n       \
  \ <tr>\n            <th>Details Code</th>\n            <td>TIFLOW_TASK_STATUS_MISMATCH</td>\n\
  \        </tr>\n        <tr>\n            <th>Details Text</th>\n            <td>Task\
  \ has invalid status.</td>\n        </tr>\n    </table> \n    abweisen, wenn der\
  \ Status des adressierten Tasks gleich \"in-progress\" ist und die Rolle des aufrufenden\
  \ Nutzers nicht einer der folgenden Rollen entspricht:\n    <ul>\n        <li>oid_oeffentliche_apotheke</li>\n\
  \        <li>oid_krankenhausapotheke</li>\n    </ul>\n    damit Nutzer außerhalb\
  \ der Apotheke keine Rezepte löschen, die sich aktuell in Belieferung befinden."
title: TI-Flow-Fachdienst - E-Rezept löschen - Apotheke - Statusprüfung in-progress
