text: Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation
  über /Task/&lt;id&gt;/$dispense für den referenzierten Task den zeta-user-info.identifier
  des Nutzers (Telematik-ID) in Task.owner speichern, damit sichergestellt werden
  kann, dass nachfolgende Zugriffe auf diesen Datensatz nur durch Berechtigte erfolgen
  können.
title: TI-Flow-Fachdienst - Dispensierinformationen bereitstellen - Telematik-ID der
  abgebenden LEI speichern
