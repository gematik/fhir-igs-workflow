text: "Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation\
  \ über /Task/&#60;id&#62;/$activate prüfen und, wenn die Verordnung als Mehrfachverordnung\
  \ (MedicationRequest.extension:Mehrfachverordnung.extension:Kennzeichen = true)\
  \ gekennzeichnet und der Denominator kleiner als 2 ist, die Operation mit dem folgenden\
  \ Fehler:\n      <table id=\"error-code\" style=\"border: 1px solid black; border-collapse:\
  \ collapse;\">\n        <tr>\n            <th>HTTP-Code</th>\n            <td>400\
  \ - Bad Request</td>\n        </tr>\n        <tr>\n            <th>Severity</th>\n\
  \            <td>error</td>\n        </tr>\n        <tr>\n            <th>Code</th>\n\
  \            <td>invalid</td>\n        </tr>\n        <tr>\n            <th>Details\
  \ Code</th>\n            <td>TIFLOW_EREZEPT_MVO_INVALID</td>\n        </tr>\n  \
  \      <tr>\n            <th>Details Text</th>\n            <td>-</td>\n       \
  \ </tr>\n    </table> \n    abbrechen, weil eine Mehrfachverordnungen aus mindestens\
  \ 2 Teilverordnungen bestehen muss."
title: TI-Flow-Fachdienst - Task aktivieren - Mehrfachverordnung - Denominator größer
