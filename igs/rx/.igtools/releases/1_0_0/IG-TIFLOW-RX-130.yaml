text: "Das PS der abgebenden LEI SOLL zum Erstellen von neuen E-Rezepten folgenden\
  \ Klickpfad umsetzen.\n     <table>\n  <tr>\n    <th>Name</th>\n    <td>E-Rezept\
  \ erstellen - Optimaler Klickpfad</td>\n  </tr>\n  <tr>\n    <th>Vorbedingung</th>\n\
  \    <td>\n      Der Nutzer befindet sich in einer der Medikation des Patienten\
  \ bezogenen Ansicht, z.B. der Patientenakte des Primärsystems, \n      einer Übersicht\
  \ der bisher verordneten Medikationen, einer Ansicht des eMP/BMP.\n    </td>\n \
  \ </tr>\n  <tr>\n    <th>Nachbedingung</th>\n    <td>\n      Alle Verordnungen wurden\
  \ signiert, in den E-Rezept-Fachdienst eingestellt und ggf. der Patientenausdruck\
  \ gedruckt.\n    </td>\n  </tr>\n  <tr>\n    <th>Ablauf</th>\n    <td>\n      <ol>\n\
  \        <li>Der Arzt oder MFA startet den Prozess zur Erzeugen einer neuen Verordnung.</li>\n\
  \        <li>Suchmöglichkeiten zur Auswahl des Präparates werden angezeigt.</li>\n\
  \        <li>\n          a) Arzt: Detaillierter Verordnungsinhalt (als E-Rezept\
  \ dargestellt) wird ausgewählt und die Verordnung zur Signatur freigegeben.<br>\n\
  \          b) MFA: Detaillierter Verordnungsinhalt (als E-Rezept dargestellt) wird\
  \ ausgewählt und die Verordnung in der Aufgabenliste gespeichert \n          (und\
  \ zur späteren Signatur dem Arzt vorgelegt).\n        </li>\n        <li>Optional:\
  \ Die Schritte 1 bis 3 können bei mehreren auszustellenden Verordnungen wiederholt\
  \ werden.</li>\n        <li>\n          Mit dem Start des Prozesses „Jetzt Signieren“\
  \ durch den Arzt werden alle zur Signatur freigegebenen Verordnungen in einem \n\
  \          Hintergrundprozess qualifiziert signiert und in den E-Rezept-Fachdienst\
  \ eingestellt.\n        </li>\n        <li>\n          Es wird ein Hinweistext angezeigt,\
  \ wenn das Signieren und das Einstellen in den E-Rezept-Fachdienst erfolgreich abgeschlossen\
  \ wurde.\n        </li>\n        <li>\n          Ist die Einstellung „Patientenausdruck\
  \ erstellen“ gewählt, werden nach dem erfolgreichen Einstellen in den \n       \
  \   E-Rezept-Fachdienst die Patientenausdrucke automatisch gedruckt.\n        </li>\n\
  \      </ol>\n    </td>\n  </tr>\n  <tr>\n    <th>Alternative</th>\n    <td>\n \
  \     Alternativ zu Schritt 1 und 2 kann der Prozess zum Erzeugen einer wiederholten\
  \ Verordnung aus einer Patientenhistorie, \n      Verordnungen aus einer Hausapotheke\
  \ und aus einem Medikationsplan nach § 31a SGB V gestartet werden. \n      Die Regelungen\
  \ aus Anlage 23 BMV-Ä sind zu beachten.\n    </td>\n  </tr>\n</table>\n<div><figcaption><strong>Tabelle:\
  \ </strong>E-Rezept erstellen - UX Optimaler Klickpfad</figcaption></div>"
title: 'PS verordnende LEI: UX - Optimaler Klickpfad'
