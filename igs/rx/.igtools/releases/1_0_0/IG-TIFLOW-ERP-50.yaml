text: "Der TI-Flow-Fachdienst MUSS das Löschen eines E-Rezepts über den mittels der\
  \ &lt;id&gt; adressierten /Task/&lt;id&gt;/$abort verhindern, wenn der Status des\
  \ adressierten Tasks ungleich \"in-progress\" ist und die Rolle des aufrufenden\
  \ Nutzers einer der folgenden Rollen entspricht: \n <ul>\n <li>oid_oeffentliche_apotheke</li>\n\
  \ <li>oid_krankenhausapotheke</li>\n </ul>\n , und die Operation mit dem folgenden\
  \ Fehler:\n <table id=\"error-code\" style=\"border: 1px solid black; border-collapse:\
  \ collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>403 - Forbidden</td>\n </tr>\n\
  \ <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n\
  \ </tr>\n <tr>\n <th>Details Code</th>\n <td>TIFLOW_TASK_STATUS_MISMATCH</td>\n\
  \ </tr>\n <tr>\n <th>Details Text</th>\n <td>Task has invalid status.</td>\n </tr>\n\
  \ </table> \n abbrechen, damit kein Apotheker ein Rezept löscht, das ihm nicht ausdrücklich\
  \ zugewiesen wurde."
title: TI-Flow-Fachdienst - E-Rezept löschen - Apotheke - Statusprüfung ungleich in-progress
version: 1
