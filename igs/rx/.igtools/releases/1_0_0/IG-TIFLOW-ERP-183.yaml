text: 'Das PS der verordnenden LEI MUSS dem Nutzer beim Erstellen eines E-T-Rezeptes
  einen Warnhinweis darstellen, wenn die zulässige maximale Reichdauer, entsprechend
  den gesetzlichen Vorgaben, von 4 Wochen für gebärfähige Frauen und andernfalls 12
  Wochen überschritten wird. Folgende Texte* sind anzuzeigen: "Für gebärfähige Frauen
  darf die Reichdauer der Verordnung 4 Wochen nicht überschreiten" "Die Reichdauer
  der Verordnung darf 12 Wochen nicht überschreiten" *Die Formulierung des anzuzeigenden
  Textes werden durch eine Bekanntmachung des BfArM definiert.'
title: 'PS verordnende LEI: UX - E-T-Rezept – Warnung Reichdauer'
