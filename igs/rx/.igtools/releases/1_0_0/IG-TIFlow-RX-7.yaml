text: "<table>\n <thead>\n <tr>\n <th>Anzeige der fachlichen Bestätigung*</th>\n <th>Häufigkeit\
  \ der Abfrage des Nutzers</th>\n <th>Zulässigkeit der Vorbefüllung durch das PS</th>\n\
  \ </tr>\n </thead>\n <tbody>\n <tr>\n <td>Alle Sicherheitsbestimmungen gemäß der\
  \ Fachinformation entsprechender Fertigarzneimittel werden eingehalten</td>\n <td>Bei\
  \ jedem Verordnungsvorgang</td>\n <td>\"nein\" ist zulässig, \"ja\" ist nicht zulässig</td>\n\
  \ </tr>\n <tr>\n <td>Ich verfüge über ausreichende Sachkenntnisse zur Verschreibung\
  \ von Arzneimitteln nach § 3a AMVV</td>\n <td>Einmalig aktiv abfragen, danach darf\
  \ das Feld im Verordnungsvorgang angezeigt, aber vorbefüllt werden.</td>\n <td>\"\
  nein\" ist zulässig, \"ja\" ist ab der zweiten Verordnung zulässig</td>\n </tr>\n\
  \ <tr>\n <td>Der Patientin bzw. dem Patienten wurde vor Beginn der Behandlung medizinisches\
  \ Informationsmaterial gemäß den Anforderungen der Fachinformation entsprechender\
  \ Arzneimittel ausgehändigt.</td>\n <td>Bei jedem Verordnungsvorgang</td>\n <td>\"\
  nein\" ist zulässig, \"ja\" ist nicht zulässig</td>\n </tr>\n <tr>\n <td>Behandlung\
  \ erfolgt außerhalb der zugelassenen Anwendungsgebiete (Off-Label)</td>\n <td>Bei\
  \ jedem Verordnungsvorgang</td>\n <td>\"nein\" ist zulässig, \"ja\" ist nicht zulässig</td>\n\
  \ </tr>\n <tr>\n <td>Bei der Patientin handelt es sich um eine gebärfähige Frau</td>\n\
  \ <td>Bei jedem Verordnungsvorgang</td>\n <td>\"nein\" und \"ja\" sind zulässig</td>\n\
  \ </tr>\n </tbody>\n</table>"
title: 'PS verordnende LEI: E-Rezept erstellen – Flowtype 166 – Bestätigungen nach
  §3a Abs. 2, 5 AMVV'
