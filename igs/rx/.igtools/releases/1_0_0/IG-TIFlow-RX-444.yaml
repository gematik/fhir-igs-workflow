text: "<description>\n        Der E-Rezept-Fachdienst MUSS beim Aktivieren eines Tasks\
  \ mittels HTTP-POST-Operation über /Task/&lt;id&gt;/$activate die Operation mit\
  \ dem Fehlercode 400 abbrechen, wenn die Verordnung als Mehrfachverordnung (MedicationRequest.extension:Mehrfachverordnung.extension:Kennzeichen\
  \ = true) gekennzeichnet ist und das Startdatum (MedicationRequest.extension:Mehrfachverordnung.extension:Zeitraum.value[x]:valuePeriod.start)\
  \ vor dem Ausstellungsdatum (MedicationRequest.authoredOn) liegt.\n    </description>\n\
  \    <!-- A_23537 -->"
title: E-Rezept-Fachdienst - Task aktivieren - Mehrfachverordnung - Startdatum nicht
  vor Ausstellungsdatum
