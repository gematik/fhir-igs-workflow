text: 'Das PS der abgebenden LEI MUSS den Anwendungsfall "UC 4.16- Dispensierinformationen
  bereitstellen" gemäß TAB_ILFERP_022 umsetzen. Tabelle # : TAB_ILFERP_022 - Dispensierinformationen
  bereitstellen Name Dispensierinformationen bereitstellen Auslöser Aufruf des Anwendungsfalls
  in der GUI Akteur Leistungserbringer, Mitarbeiter der abgebenden LEI Vorbedingung
  Die LEI hat das E-Rezept vom E-Rezept-Fachdienst heruntergeladen. Der Nutzer hat
  im AVS ein E-Rezept als abgegeben markiert. Die LEI hat sich gegenüber der TI authentisiert.
  Nachbedingung Der Vorgang zum E-Rezept ist weiterhin im AVS verfügbar. Der Anwendungsfall
  "Dispensierinformationen bereitstellen" kann erneut ausgeführt werden. Der Anwendungsfall
  "Quittung abrufen" kann ausgeführt werden. Standardablauf Informationen über das
  abgegebene Medikament erstellt Nur für Fertigarzneimittel, die einen Data-Matrix-Code
  gemäß securPharm-System besitzen: Chargeninfo und Verfallsdatum ergänzen. Task-ID
  und Geheimnis des E-Rezepts bestimmen Dispensierinformationen dem E-Rezept-Fachdienst
  bereitstellen'
title: 'PS abgebende LEI: Dispensierinformationen bereitstellen'
