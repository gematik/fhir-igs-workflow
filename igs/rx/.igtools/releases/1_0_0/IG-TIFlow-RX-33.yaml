text: "<description>\n        Der E-Rezept-Fachdienst MUSS beim Aktivieren eines Tasks\
  \ mit Workflowtyp 166 mittels $activate prüfen, dass im Bundle eine MedicationRequest-Ressource\
  \ und eine Medication mit Medication.extension:Arzneimittelkategorie = 02 enthalten\
  \ ist. Der E-Rezept-Fachdienst MUSS andernfalls mit dem HTTP-Fehlercode 400 abbrechen\
  \ und in der OperationOutcome den Fehlertext \"Für diesen Workflowtypen sind nur\
  \ T-Rezept Verordnungen zulässig\" ausgeben.\n    </description>\n    <!-- A_27813\
  \ -->"
title: E-Rezept-Fachdienst - Task aktivieren - Flowtype 166 - Prüfung Arzneimittelverordnung
