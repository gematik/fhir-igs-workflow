text: 'Das PS der abgebenden LEI SOLL zum Erstellen von neuen E-Rezepten folgenden
  Klickpfad umsetzen. Tabelle # : TAB_ILFERP_021 – E-Rezept erstellen - UX Optimaler
  Klickpfad Name E-Rezept erstellen - Optimaler Klickpfad Vorbedingung Der Nutzer
  befindet sich in einer der Medikation des Patienten bezogenen Ansicht, z.B. der
  Patientenakte des Primärsystems, einer Übersicht der bisher verordneten Medikationen,
  einer Ansicht des eMP/BMP. Nachbedingung Alle Verordnungen wurden signiert, in den
  E-Rezept-Fachdienst eingestellt und ggf. der Patientenausdruck gedruckt. Ablauf
  Der Arzt oder MFA startet den Prozess zur Erzeugen einer neuen Verordnung Suchmöglichkeiten
  zur Auswahl des Präparates werden angezeigt. a) Arzt: Detaillierter Verordnungsinhalt
  (als E-Rezept dargestellt) wird ausgewählt und die Verordnung zur Signatur freigegeben.
  b) MFA: Detaillierter Verordnungsinhalt (als E-Rezept dargestellt) wird ausgewählt
  und die Verordnung in der Aufgabenliste gespeichert (und zur späteren Signatur dem
  Arzt vorgelegt). optional: Die Schritte 1 bis 3 können bei mehreren auszustellenden
  Verordnungen wiederholt werden. Mit dem Start des Prozesses "Jetzt Signieren" durch
  den Arzt, werden alle zur Signatur freigegeben Verordnungen in einem Hintergrundprozess
  qualifiziert signiert und in den E-Rezept-Fachdienst eingestellt. Es wird ein Hinweistext
  anzeigt, wenn das Signieren und das Einstellen in den E-Rezept-Fachdienst erfolgreich
  abgeschlossen wurde. Ist die Einstellung "Patientenausdruck erstellen" gewählt,
  werden nach dem erfolgreichen Einstellen in den E-Rezept-Fachdienst die Patientenausdrucke
  automatisch gedruckt. Alternative Alternativ zu Schritt 1 und 2 kann der Prozess
  zum Erzeugen einer wiederholten Verordnung aus einer Patientenhistorie, Verordnungen
  aus einer Hausapotheke und aus einem Medikationsplan nach § 31a SGB V gestartet
  werden. Die Regelungen aus Anlage 23 BMV-Ä sind zu beachten.'
title: 'PS verordnende LEI: UX - Optimaler Klickpfad'
