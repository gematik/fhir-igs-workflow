text: "Der TI-Flow-Fachdienst MUSS bei der Bereitstellung von Dispensierinformationen\
  \ mittels POST /Task/&lt;id&gt;/$dispense auf den in der URL referenzierten /Task/&lt;id&gt;\
  \ sicherstellen, dass ausschließlich abgebende Leistungserbringer in einer der Rollen\n\
  \ <ul> \n <li>oid_oeffentliche_apotheke</li>\n <li>oid_krankenhausapotheke</li>\n\
  \ </ul>\n die Operation am Fachdienst aufrufen dürfen und die Rolle \"professionOID\"\
  \ des Aufrufers im ACCESS_TOKEN im HTTP-RequestHeader \"Authorization\" feststellen,\
  \ und bei Abweichungen die Operation mit dem folgenden Fehler:\n <table id=\"error-code\"\
  \ style=\"border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>403 - Forbidden</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_AUTH_ROLE_NOT_ALLOWED</td>\n </tr>\n <tr>\n <th>Details Text</th>\n\
  \ <td>Der Nutzer ist nicht berechtigt, die aufgerufene Operation anzufordern</td>\n\
  \ </tr>\n </table> \n abbrechen, damit Dispensierinformationen nicht durch einen\
  \ Unberechtigten eingestellt werden kann."
title: TI-Flow-Fachdienst - Dispensierinformationen bereitstellen - Rollenprüfung
  Abgebender stellt Dispensierinformationen bereit
version: 1
