text: "<description>\n        Der E-Rezept-Fachdienst MUSS beim Aktivieren eines Tasks\
  \ mit Workflowtypen 160,169,200 oder 209 mittels $activate prüfen, dass im Bundle\
  \ eine MedicationRequest-Ressource und eine Medication mit Medication.extension:Arzneimittelkategorie\
  \ = 00 enthalten ist. Der E-Rezept-Fachdienst MUSS andernfalls mit dem HTTP-Fehlercode\
  \ 400 abbrechen und in der OperationOutcome den Fehlertext \"Für diesen Workflowtypen\
  \ sind nur Arzneimittelverordnungen zulässig\" ausgeben.\n    </description>\n \
  \   <!-- A_25642 -->"
title: E-Rezept-Fachdienst - Task aktivieren - Flowtype 160/169/200/209 - Prüfung
