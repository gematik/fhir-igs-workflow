text: Der E-Rezept-Fachdienst MUSS beim Aktivieren eines Tasks mittels HTTP-POST-Operation
  über /Task/&lt;id&gt;/$activate die Operation mit dem Fehlercode 400 abbrechen,
  wenn die Verordnung als Mehrfachverordnung (MedicationRequest.extension:Mehrfachverordnung.extension:Kennzeichen
  = true) gekennzeichnet ist und der Beginn der Einlösefrist (MedicationRequest.extension:Mehrfachverordnung.extension:Zeitraum.value[x]:valuePeriod.start)
  nicht angegeben ist, weil die Information des Beginns der Einlösefrist notwendig
  ist, um den Gültigkeitszeitraum zu ermitteln.
