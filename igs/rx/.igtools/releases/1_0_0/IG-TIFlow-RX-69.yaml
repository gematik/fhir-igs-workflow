text: Der E-Rezept-Fachdienst MUSS beim Aktivieren eines Tasks mittels HTTP-POST-Operation
  über /Task/&lt;id&gt;/$activate die Operation mit dem Fehlercode 400 abbrechen,
  wenn die Verordnung nicht als Mehrfachverordnung (MedicationRequest.extension:Mehrfachverordnung.extension:Kennzeichen
  = false) gekennzeichnet ist, aber eine Extension Nummerierung oder Zeitraum enthält,
  weil normale Verordnungen keine MVO-Angaben enthalten dürfen.
