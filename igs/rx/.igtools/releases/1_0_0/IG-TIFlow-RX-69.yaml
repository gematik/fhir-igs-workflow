text: "<description>\n        Das PS der abgebenden LEI MUSS beim Erstellen von Dispensierinformationen\
  \ mit Flowtype 160, 169, 200 oder 209, wenn mehrere Teilabgaben oder Stückelungen\
  \ enthalten sind, eine Profilversion zur Erstellung der Parameters Ressource nutzen,\
  \ die zum Zeitpunkt des neuesten Abgabedatums (MedicationDispense.whenHandedOver)\
  \ gültig ist.\n    </description>\n    <!-- A_27047 -->"
title: 'PS abgebende LEI: Dispensierinformationen – Flowtype 160/169/200/209 – Profilversion
  bei mehreren MedicationDispenses'
