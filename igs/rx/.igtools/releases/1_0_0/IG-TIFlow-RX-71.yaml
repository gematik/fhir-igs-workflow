text: "<description>\n        Das PS der abgebenden LEI MUSS beim Erstellen einer\
  \ MedicationDispense eines Fertigarzneimittels für ein E-Rezept des Flowtype 160,\
  \ 169, 200 oder 209 jede FHIR-Ressource Medication um Wirkstoff, Wirkstärke (inkl.\
  \ Einheit) und Handelsnamen ergänzen, sofern die Informationen in der verwendeten\
  \ Arzneimittel-Datenbank vorliegen.\n    </description>\n    <!-- A_27033 -->"
title: 'PS abgebende LEI: Dispensierinformationen – Flowtype 160/169/200/209 – Fertigarzneimittel:
  Wirkstoff, Wirkstärke und Handelsname'
