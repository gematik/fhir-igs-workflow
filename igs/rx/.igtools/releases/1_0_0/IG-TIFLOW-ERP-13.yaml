text: "Der TI-Flow-Fachdienst MUSS beim Zurückweisen eines Tasks mit Flowtype 160,\
  \ 169, 200 oder 209 mittels HTTP-POST-Operation über /Task/&lt;id&gt;/$reject die\
  \ Rolle \"professionOID\" des Aufrufers im ACCESS_TOKEN im HTTP-RequestHeader \"\
  Authorization\" feststellen und sicherstellen, dass ausschließlich Institutionen\
  \ in der Rolle\n <ul>\n <li>oid_oeffentliche_apotheke</li>\n <li>oid_krankenhausapotheke</li>\n\
  \ </ul>\n die Operation am Fachdienst aufrufen, damit das E-Rezept nicht durch einen\
  \ Unberechtigten zurückgewiesen werden kann."
title: TI-Flow-Fachdienst - Task zurückweisen - Flowtype 160/169/200/209 - Rollenprüfung
