text: "Der TI-Flow-Fachdienst MUSS beim Aktivieren eines Tasks mit Workflowtyp 166\
  \ mittels $activate prüfen, dass im Bundle eine MedicationRequest-Ressource und\
  \ eine Medication mit Medication.extension:Arzneimittelkategorie = 02 enthalten\
  \ ist. Der TI-Flow-Fachdienst MUSS andernfalls mit dem folgenden Fehler:\n <table\
  \ id=\"error-code\" style=\"border: 1px solid black; border-collapse: collapse;\"\
  >\n <tr>\n <th>HTTP-Code</th>\n <td>400 - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n\
  \ <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n\
  \ <th>Details Code</th>\n <td>TIFLOW_FLOWTYPE_MISMATCH</td>\n </tr>\n <tr>\n <th>Details\
  \ Text</th>\n <td>Für diesen Workflowtypen sind nur T-Rezept Verordnungen zulässig</td>\n\
  \ </tr>\n </table> \n abbrechen."
title: TI-Flow-Fachdienst - Task aktivieren - Flowtype 166 - Prüfung Arzneimittelverordnung
version: 1
