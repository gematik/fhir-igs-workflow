text: "Der TI-Flow-Fachdienst MUSS bei einem Task mit Task.flowType = 166 die Attribute\
  \ in Task in Abhängigkeit des in der http-POST-Operation /Task/&#60;id&#62;/$activate\
  \ übergebenen gültig signierte E-Rezept-Bundle gemäß TAB_eRpDM_006 belegen.<br>\n\
  \n <table>\n <tr> \n <th>Feld in Task</th>\n <th>Feldbelegung</th>\n </tr>\n <tr>\
  \ \n <td>Task.performerType.coding.system</td>\n <td>\"https://gematik.de/fhir/erp/CodeSystemGEM_ERP_CS_OrganizationType\"\
  </td>\n </tr>\n <tr> \n <td>Task.performerType.coding.code</td>\n <td>\"1.2.276.0.76.4.54\"\
  </td>\n </tr>\n <tr> \n <td>Task.performerType.coding.diplay</td>\n <td>\"Öffentliche\
  \ Apotheke\"</td>\n </tr>\n <tr> \n <td>Task.PrescriptionType.valueCoding.display</td>\n\
  \ <td>\"Flowtype für Arzneimittel nach § 3a AMVV\"</td>\n </tr>\n <tr> \n <td>Task.ExpiryDate</td>\n\
  \ <td>Task.ExpiryDate = &#60;Datum der QES.Erstellung im Signaturobjekt&#62; + 6\
  \ Kalendertage</td>\n </tr>\n <tr> \n <td>Task.AcceptDate</td>\n <td>Task.ExpiryDate\
  \ = &#60;Datum der QES.Erstellung im Signaturobjekt&#62; + 6 Kalendertage</td>\n\
  \ </tr>\n </table>\n <div><figcaption><strong>Tabelle: </strong>TAB_eRpDM_006 Prozessparameter\
  \ Flowtype 166</figcaption></div>"
title: TI-Flow-Fachdienst - Task aktivieren - Flowtype 166 - Prozessparameter
