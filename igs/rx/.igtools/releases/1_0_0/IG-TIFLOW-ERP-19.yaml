text: "Der TI-Flow-Fachdienst MUSS beim Beenden eines Tasks mittels POST /Task/&lt;id&gt;/$close\
  \ erlauben, dass der Aufruf ohne Übergabe einer MedicationDispense im Request Body\
  \ stattfindet.Der E-Rezept-Fachdienst MUSS in dem Fall sicherstellen, dass eine\
  \ MedicationDispense für diesen Task existiert. <br>\n Der E-Rezept-Fachdienst MUSS,\
  \ falls keine MedicationDispense zum dazugehörigen Task existiert, mit dem folgenden\
  \ Fehler:\n <table id=\"error-code\" style=\"border: 1px solid black; border-collapse:\
  \ collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>403 - Forbidden</td>\n </tr>\n\
  \ <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n\
  \ </tr>\n <tr>\n <th>Details Code</th>\n <td>TIFLOW_MEDICATION_DISPENSE_MISSING</td>\n\
  \ </tr>\n <tr>\n <th>Details Text</th>\n <td>Abschluss des Workflows konnte nicht\
  \ durchgeführt werden. Dispensierinformationen wurden nicht bereitgestellt.</td>\n\
  \ </tr>\n </table>\n abbrechen."
title: TI-Flow-Fachdienst - Task schließen - Aufruf ohne MedicationDispense
version: 1
