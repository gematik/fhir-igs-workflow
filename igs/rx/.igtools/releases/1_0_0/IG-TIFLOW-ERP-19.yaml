text: "Der TI-Flow-Fachdienst MUSS beim Beenden eines Tasks mittels POST /Task/&lt;id&gt;/$close\
  \ erlauben, dass der Aufruf ohne Übergabe einer MedicationDispense im Request Body\
  \ stattfindet.Der TI-Flow-Fachdienst MUSS in dem Fall sicherstellen, dass eine MedicationDispense\
  \ für diesen Task existiert. <br>\n Der TI-Flow-Fachdienst MUSS, falls keine MedicationDispense\
  \ zum dazugehörigen Task existiert, mit dem Fehler 403 abbrechen. Im Fehlerfall\
  \ ist die Meldung \"Abschluss des Workflows konnte nicht durchgeführt werden. Dispensierinformationen\
  \ wurden nicht bereitgestellt.\" im OperationOutcome zu übermitteln."
title: TI-Flow-Fachdienst - Task schließen - Aufruf ohne MedicationDispense
