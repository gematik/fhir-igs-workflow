text: Das PS der abgebenden LEI SOLL es dem Nutzer ermöglichen, eine vorkonfigurierte
  oder manuell erstellte Nachricht zu erstellen, die den Kunden darüber informiert,
  dass das Medikament nicht beliefert werden kann. Die Nachricht soll beinhalten,
  dass das E-Rezept freigegeben wurde und der Versicherte es einer anderen Apotheke
  zuweisen kann.
