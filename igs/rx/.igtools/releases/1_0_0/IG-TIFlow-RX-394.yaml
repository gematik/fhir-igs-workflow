text: "<Beschreibung>\n        Das PS der verordnenden LEI MUSS dem Nutzer beim Erstellen\
  \ eines E-T-Rezeptes die notwendigen Angaben für E-T-Rezepte nachfolgender Tabelle\
  \ anzeigen, abfragen und im Verordnungsdatensatz angeben: Tabelle # : notwendigen\
  \ Angaben für E-T-Rezepte Anzeige der fachlichen Bestätigung* Häufigkeit der Abfrage\
  \ des Nutzers Zulässigkeit der Vorbefüllung durch das PS \"Alle Sicherheitsbestimmungen\
  \ gemäß der Fachinformation entsprechender Fertigarzneimittel werden eingehalten\"\
  \ Bei jedem Verordnungsvorgang \"nein\" ist zulässig, \"ja\" ist nicht zulässig\
  \ \"Ich verfüge über ausreichende Sachkenntnisse zur Verschreibung von Arzneimitteln\
  \ nach § 3a AMVV\" Einmalig aktiv abfragen, danach darf das Feld im Verordnungsvorgang\
  \ angezeigt, aber vorbefüllt werden. \"nein\" ist zulässig, \"ja\" ist ab der zweiten\
  \ Verordnung zulässig \"Der Patientin bzw. dem Patienten wurde vor Beginn der Behandlung\
  \ medizinisches Informationsmaterial gemäß den Anforderungen der Fachinformation\
  \ entsprechender Arzneimittel ausgehändigt.\" Bei jedem Verordnungsvorgang \"nein\"\
  \ ist zulässig, \"ja\" ist nicht zulässig \"Behandlung erfolgt außerhalb der zugelassenen\
  \ Anwendungsgebiete (Off-Label)\" Bei jedem Verordnungsvorgang \"nein\" ist zulässig,\
  \ \"ja\" ist nicht zulässig \"Bei der Patientin handelt es sich um eine gebärfähige\
  \ Frau\" Bei jedem Verordnungsvorgang \"nein\" und \"ja\" sind zulässig *Die Formulierung\
  \ des anzuzeigenden Textes werden durch eine Bekanntmachung des BfArM definiert.\
  \ Aktuell sind die oberen drei Texte aus der Bekanntmachung zum Papierrezept gemäß\
  \ (BAnz AT 25.07.2022 B7) zu verwenden.\n    </Beschreibung>\n    <!-- A_27836 -->"
title: 'PS verordnende LEI: E-Rezept erstellen – Flowtype 166 – Bestätigungen nach
  §3a Abs. 2, 5 AMVV'
