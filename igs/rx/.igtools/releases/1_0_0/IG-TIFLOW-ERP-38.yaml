text: "Der TI-Flow-Fachdienst MUSS bei der Bereitstellung von Dispensierinformationen\
  \ mittels POST /Task/&lt;id&gt;/$dispense auf Task.status = in-progress prüfen\
  \ und bei Ungleichheit die Operation mit dem folgenden Fehler:\n <table id=\"error-code\"\
  \ style=\"border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>403 - Forbidden</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_TASK_STATUS_MISMATCH</td>\n </tr>\n <tr>\n <th>Details Text</th>\n\
  \ <td>Task has invalid status.</td>\n </tr>\n </table> \n abbrechen."
title: TI-Flow-Fachdienst - Dispensierinformationen bereitstellen - Prüfung Status
