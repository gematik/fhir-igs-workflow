text: Der TI-Flow-Fachdienst MUSS beim Aktivieren eines Tasks mittels HTTP-POST-Operation
  über /Task/&lt;id&gt;/$activate die Operation mit dem Fehlercode 400 abbrechen,
  wenn die Verordnung als Mehrfachverordnung (MedicationRequest.extension:Mehrfachverordnung.extension:Kennzeichen
  = true) gekennzeichnet, ein Endedatum (MedicationRequest.extension:Mehrfachverordnung.extension:Zeitraum.value[x]:valuePeriod.end)
  angegeben ist und das Endedatum vor dem Startdatum (MedicationRequest.extension:Mehrfachverordnung.extension:Zeitraum.value[x]:valuePeriod.start)
  liegt.
title: TI-Flow-Fachdienst - Task aktivieren - Mehrfachverordnung - Endedatum nicht
  vor Startdatum
