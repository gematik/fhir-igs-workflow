text: "Der TI-Flow-Fachdienst MUSS bei der Bereitstellung von Dispensierinformationen\
  \ mittels POST /Task/&lt;id&gt;/$dispense das im URL-Parameter \"?secret=...\" übertragene\
  \ Secret gegen das im referenzierten Task gespeicherte Secret Task.identifier:Secret\
  \ als https://gematik.de/fhir/erp/NamingSystem/GEM_ERP_NS_Secret prüfen und bei\
  \ Ungleichheit oder Fehlen des URL- Parameters die Operation mit dem folgenden Fehler:\n\
  \ <table id=\"error-code\" style=\"border: 1px solid black; border-collapse: collapse;\"\
  >\n <tr>\n <th>HTTP-Code</th>\n <td>403 - Forbidden</td>\n </tr>\n <tr>\n <th>Severity</th>\n\
  \ <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n\
  \ <th>Details Code</th>\n <td>TIFLOW_SECRET_MISMATCH</td>\n </tr>\n <tr>\n <th>Details\
  \ Text</th>\n <td>-</td>\n </tr>\n </table> \n abbrechen, damit der Zugriff auf\
  \ diesen Datensatz nur durch den Berechtigten in Kenntnis des Secrets erfolgt."
title: TI-Flow-Fachdienst - Dispensierinformationen bereitstellen - Prüfung Secret
version: 1
