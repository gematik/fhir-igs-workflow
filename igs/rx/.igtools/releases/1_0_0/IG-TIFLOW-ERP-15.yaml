text: Der TI-Flow-Fachdienst MUSS beim Zurückweisen eines Tasks mit Flowtype 160,
  169, 200 oder 209 mittels HTTP-POST-Operation über /Task/&lt;id&gt;/$reject, wenn
  bereits Dispensierinformationen im TI-Flow-Fachdienst zum Task gespeichert wurden,
  die Daten für die Löschinformation dieser Dispensierinformationen für die Übermittlung
  in den ePA Medication Service bereitstellen.
