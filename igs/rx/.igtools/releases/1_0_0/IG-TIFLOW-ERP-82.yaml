text: "Der TI-Flow-Fachdienst MUSS beim Aktivieren eines Tasks mittels HTTP-POST-Operation\
  \ über /Task/&lt;id&gt;/$activate prüfen und, wenn der übergebene QES-Datensatz\
  \ als Betäubungsmittel-Verordnung (Bundle.Medication.extension:KBV_EX_ERP_Medication_Category:code\
  \ gleich \"01\") gekennzeichnet ist, die Operation mit dem folgenden Fehler:\n <table\
  \ id=\"error-code\" style=\"border: 1px solid black; border-collapse: collapse;\"\
  >\n <tr>\n <th>HTTP-Code</th>\n <td>400 - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n\
  \ <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n\
  \ <th>Details Code</th>\n <td>TIFLOW_EREZEPT_DRUG_CATEGORY_FORBIDDEN</td>\n </tr>\n\
  \ <tr>\n <th>Details Text</th>\n <td>BTM nicht zulässig</td>\n </tr>\n </table>\
  \ \n abbrechen."
title: TI-Flow-Fachdienst - Task aktivieren - Ausschluss Betäubungsmittel
