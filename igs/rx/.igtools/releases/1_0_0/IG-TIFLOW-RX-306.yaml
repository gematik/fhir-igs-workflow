text: Das PS der verordnenden oder abgebenden LEI MUSS in einer Nachricht zu einem
  E-Rezept über KIM im KIM-Header "X-KIM-Dienstkennung" den Wert "eRezept;Kommunikation;V1.0"
  für die sonstige Kommunikation untereinander im Rahmen der Belieferung durch eine
  Apotheke verwenden.
