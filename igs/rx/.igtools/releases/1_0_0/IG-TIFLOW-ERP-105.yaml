text: "Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation\
  \ über /Task/&lt;id&gt;/$accept prüfen und, wenn die Verordnung als Mehrfachverordnung\
  \ (MedicationRequest.extension:Mehrfachverordnung.extension:Kennzeichen = true)\
  \ gekennzeichnet ist und und der Beginn der Einlösefrist (MedicationRequest.extension:Mehrfachverordnung.extension:Zeitraum.value[x]:valuePeriod.start)\
  \ zu einem späteren Zeitpunkt als das aktuelle Datum liegt, die Operation mit dem\
  \ folgenden Fehler:\n <table id=\"error-code\" style=\"border: 1px solid black;\
  \ border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>403 - Forbidden</td>\n\
  \ </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n\
  \ <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n <td>TIFLOW_EREZEPT_MVO_NOT_VALID</td>\n\
  \ </tr>\n <tr>\n <th>Details Text</th>\n <td>Teilverordnung zur Mehrfachverordnung\
  \ %1 ist ab %2 einlösbar.</td>\n </tr>\n </table> \n abbrechen, da Teilverordnungen\
  \ von Mehrfachverordnungen erst ab Beginn der Einlösefrist abgerufen werden dürfen.\
  \ \n Im Falle dieses Fehlers ist im OperationOutcome des Response der Beginn der\
  \ Einlösefrist wie folgt anzugeben: \"Teilverordnung zur Mehrfachverordnung &lt;MVO\
  \ Referenz&gt; ist ab &lt;Datum&gt; einlösbar.\", wobei &lt;MVO Referenz&gt; der\
  \ Wert MedicationRequest.extension:Mehrfachverordnung.extension:ID.value[x]:valueIdentifier.value\
  \ sowie &lt;Datum&gt; der Wert MedicationRequest.extension:Mehrfachverordnung.extension:Zeitraum.value[x]:valuePeriod.start\
  \ im Format \"dd.mm.yyyy\" ist."
title: TI-Flow-Fachdienst - Task akzeptieren - Mehrfachverordnung - Beginn Einlösefrist
  prüfen
version: 1
