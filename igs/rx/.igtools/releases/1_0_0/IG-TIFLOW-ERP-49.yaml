text: "Der TI-Flow-Fachdienst MUSS das Löschen eines E-Rezepts über den mittels der\
  \ &lt;id&gt; adressierten /Task/&lt;id&gt;/$abort verhindern und die Operation mit\
  \ dem HTTP-Fehlercode 403 abweisen, wenn der Status des adressierten Tasks gleich\
  \ \"in-progress\" ist und die Rolle des aufrufenden Nutzers nicht einer der folgenden\
  \ Rollen entspricht:\n <ul>\n <li>oid_oeffentliche_apotheke</li>\n <li>oid_krankenhausapotheke</li>\n\
  \ </ul>\n damit Nutzer außerhalb der Apotheke keine Rezepte löschen, die sich aktuell\
  \ in Belieferung befinden."
title: TI-Flow-Fachdienst - E-Rezept löschen - Apotheke - Statusprüfung in-progress
