text: 'Das PS der abgebenden LEI SOLL die Möglichkeit bieten, bestimmte Nachrichten
  zu konfigurieren, die entweder automatisch versendet oder als Vorlage für den manuellen
  Versand genutzt werden können. Folgende Nachrichtentypen sind zu berücksichtigen:
  Empfangsbestätigung nach Zuweisung eines E-Rezepts via KIM oder E-Rezept-FdV Abholbenachrichtigung
  an einen Kunden (Nicht-)Lieferbarkeit eines Medikament'
