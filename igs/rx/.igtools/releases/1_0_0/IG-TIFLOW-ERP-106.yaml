text: Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation
  über /Task/&lt;id&gt;/$accept, wenn der Verordnungsdatensatz Coverage.type.coding.code
  = "PKV" enthält und für die KVNR des begünstigten Versicherten (Task.for) eine Consent
  Ressource mit Consent.patient.identifier = KVNR und Consent.category.coding.code
  = "CHARGCONS" existiert, das Response Bundle um die Consent Ressource ergänzen,
  um der abgebenden LEI die Information zu übermitteln, dass der Versicherte eine
  Einwilligung zum Speichern der Abrechnungsinformationen auf dem TI-Flow-Fachdienst
  erteilt hat.
title: TI-Flow-Fachdienst - Task akzeptieren - Coverage PKV - Einwilligung Abrechnungsinformation
  ermitteln
