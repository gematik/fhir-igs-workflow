text: "Das PS der abgebenden LEI MUSS für die Umsetzung der Belieferung von E-Rezepten\
  \ für Arzneimittel die Anwendungsfälle\n    <ul>\n        <li>UC 4.1 - E-Rezept\
  \ durch Abgebenden abrufen</li>\n        <li>UC 4.2 - E-Rezept durch Abgebenden\
  \ zurückgeben</li>\n        <li>UC 4.3 - E-Rezept durch Abgebenden löschen</li>\n\
  \        <li>UC 4.4 - Quittung abrufen</li>\n        <li>UC 4.5 - Abgabedatensatz\
  \ durch Abgebenden signieren</li>\n        <li>UC 4.17 - Verordnung erneut abrufen</li>\n\
  \        <li>UC 4.8 - Quittung erneut abrufen</li>\n        <li>UC 4.6 - Nachrichten\
  \ durch Abgebenden empfangen</li>\n        <li>UC 4.7 - Nachricht durch Abgebenden\
  \ übermitteln</li>\n        <li>UC 4.9 - Nachricht durch Abgebenden löschen</li>\n\
  \    </ul>\n    umsetzen."
