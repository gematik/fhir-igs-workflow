text: "<description>\n        Der E-Rezept-Fachdienst MUSS beim Aktivieren eines Tasks\
  \ mittels HTTP-POST-Operation über /Task/&lt;id&gt;/$activate die Operation mit\
  \ dem Fehlercode 400 abbrechen, wenn die Verordnung als Mehrfachverordnung (MedicationRequest.extension:Mehrfachverordnung.extension:Kennzeichen\
  \ = true) und als Ersatzverordnung ( code=\"10\" oder \"11\" oder \"17\" in Extension\
  \ https://fhir.kbv.de/StructureDefinition/KBV_EX_FOR_Legal_basis in Bundle.Composition.extention:rechtsgrundlage)\
  \ gekennzeichnet ist, weil für Ersatzverordnungen keine Mehrfachverordnungen zulässig\
  \ sind.\n    </description>\n    <!-- A_22633 -->"
title: E-Rezept-Fachdienst - Task aktivieren - Mehrfachverordnung - keine Ersatzverordnung
