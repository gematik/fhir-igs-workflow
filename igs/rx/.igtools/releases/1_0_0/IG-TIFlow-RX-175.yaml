text: Das PS der verordnenden LEI MUSS, falls beim Löschen eines E-Rezeptes ein Fehler
  auftritt, dem Nutzer in einem Hinweis den Grund für den gescheiterten Löschversuch
  darstellen. Dieser leitet sich aus dem Fehlercode vom E-Rezept-Fachdienst ab.
