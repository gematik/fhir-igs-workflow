text: "Der TI-Flow-Fachdienst MUSS beim Abrufen eines Tasks mit Flowtype 160, 166,\
  \ 169, 200 oder 209 mittels HTTP-POST/$accept-Operation auf den in der URL referenzierten\
  \ /Task/&lt;id&gt; sicherstellen, dass ausschließlich abgebende Institutionen in\
  \ der Rolle\n <ul>\n <li>oid_oeffentliche_apotheke</li> \n <li>oid_krankenhausapotheke</li>\n\
  \ </ul>\n die Operation am Fachdienst aufrufen dürfen und die Rolle \"professionOID\"\
  \ des Aufrufers im ACCESS_TOKEN im HTTP-RequestHeader \"Authorization\" feststellen,\
  \ damit E-Rezepte nicht durch Unberechtigte abgerufen werden können."
title: TI-Flow-Fachdienst - Task akzeptieren - Flowtype 160/166/169/200/209 - Rollenprüfung
