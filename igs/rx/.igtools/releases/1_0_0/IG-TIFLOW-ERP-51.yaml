text: "Der TI-Flow-Fachdienst MUSS beim Löschen eines E-Rezepts über den mittels der\
  \ &#60;id&#62; adressierten /Task/&#60;id&#62;/$abort durch abgebende Leistungserbringer\
  \ (Apotheken) das im URL-Parameter \"?secret=...\" übertragene Geheimnis gegen das\
  \ im referenzierten Task enthaltene Secret in Task.identifier prüfen und bei Missmatch\
  \ oder Fehlen des URL-Parameters den Aufruf mit dem folgenden Fehler:\n <table id=\"\
  error-code\" style=\"border: 1px solid black; border-collapse: collapse;\">\n <tr>\n\
  \ <th>HTTP-Code</th>\n <td>403 - Forbidden</td>\n </tr>\n <tr>\n <th>Severity</th>\n\
  \ <td>error</td>\n </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n\
  \ <th>Details Code</th>\n <td>TIFLOW_SECRET_MISMATCH</td>\n </tr>\n <tr>\n <th>Details\
  \ Text</th>\n <td>-</td>\n </tr>\n </table> \n abweisen, damit ausschließlich Apotheker\
  \ in Kenntnis des Secret als Berechtigte ein E-Rezept löschen."
title: TI-Flow-Fachdienst - E-Rezept löschen - Apotheke - Prüfung Secret
version: 1
