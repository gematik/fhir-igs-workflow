text: 'Das PS der abgebenden LEI KANN eine Möglichkeit bieten, folgende Informationen
  an eine andere Filial-Apotheke über einen sicheren Kommunikationskanal zu übermitteln:
  Verordnungsdatensatz inklusive QES Task-ID des E-Rezepts AccessCode des E-Rezepts
  Secret des E-Rezepts. Der Kommunikationskanal muss so gewählt werden, dass die sehr
  hohe Vertraulichkeit des Informationen und deren Integrität geschützt wird.'
