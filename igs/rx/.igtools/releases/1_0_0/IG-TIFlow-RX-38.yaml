text: "<description>\n        Der E-Rezept-Fachdienst MUSS beim Aktivieren eines Tasks\
  \ mittels HTTP-POST-Operation über /Task/&lt;id&gt;/$activate die Operation mit\
  \ dem Fehlercode 400 abbrechen, wenn die Verordnung als Mehrfachverordnung (MedicationRequest.extension:Mehrfachverordnung.extension:Kennzeichen\
  \ = true) gekennzeichnet und der Flowtype ungleich 160, 169, 200 oder 209 ist, weil\
  \ Mehrfachverordnungen nur für die Verordnungen von apothekenpflichtigen Arzneimittel\
  \ (kein BtM, kein T-Rezept) zulässig sind.\n    </description>\n    <!-- A_22627-01\
  \ -->"
title: E-Rezept-Fachdienst - Task aktivieren - Mehrfachverordnung - zulässige Flowtype
