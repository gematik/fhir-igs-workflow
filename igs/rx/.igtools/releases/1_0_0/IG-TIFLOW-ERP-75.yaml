text: "Der TI-Flow-Fachdienst MUSS die Aktivierung eines Tasks mit Flowtype 160, 169,\
  \ 200 oder 209 mit dem HTTP-Status-Code 400 abbrechen, wenn die QES gemäß der professionOID\
  \ des Signaturzertifikats des Signierenden nicht von einer Berufsgruppe ausgestellt\
  \ wurde, die der folgenden professionOID entspricht:\n <ul>\n <li>oid_arzt</li>\
  \ \n <li>oid_zahnarzt</li> \n </ul>\n damit nur solche Leistungserbringer ein signiertes\
  \ E-Rezept einstellen, die zur Verordnung von Medikamenten ermächtigt sind."
title: TI-Flow-Fachdienst - Task aktivieren - Flowtype 160/169/200/209 - QES durch
  berechtigte Berufsgruppe
