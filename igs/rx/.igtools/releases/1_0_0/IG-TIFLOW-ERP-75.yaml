text: "Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mit Flowtype 160, 169,\
  \ 200 oder 209 mittels HTTP-POST-Operation über /Task/&#60;id&#62;/$activate prüfen,\
  \ ob die QES gemäß der professionOID des Signaturzertifikats von einer Berufsgruppe\
  \ ausgestellt wurde, die einer der folgenden professionOID entspricht:\n <ul>\n\
  \ <li>oid_arzt</li> \n <li>oid_zahnarzt</li> \n </ul>\n und bei einer Abweichung\
  \ die Operation mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"border:\
  \ 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>400\
  \ - Bad Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n\
  \ <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>TIFLOW_SIGNATURE_INVALID_ISSUING_ROLE</td>\n </tr>\n <tr>\n <th>Details Text</th>\n\
  \ <td>-</td>\n </tr>\n </table> \n abbrechen, damit nur solche Leistungserbringer\
  \ ein signiertes E-Rezept einstellen, die zur Verordnung von Medikamenten ermächtigt\
  \ sind."
title: TI-Flow-Fachdienst - Task aktivieren - Flowtype 160/169/200/209 - QES durch
  berechtigte Berufsgruppe
version: 1
