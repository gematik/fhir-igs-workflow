text: "<description>\n        Das PS der abgebenden LEI MUSS beim Erstellen von Dispensierinformationen\
  \ mit Flowtype 160, 169, 200 oder 209 die FHIR-Ressource Medication um Chargeninformation\
  \ und Verfallsdatum aus dem SecurPharm-Scan [SecurPharm] ergänzen, sofern es sich\
  \ bei dem abgegebenen Arzneimittel um ein Fertigarzneimittel handelt, das einen\
  \ Data-Matrix-Code gemäß securPharmSystem besitzt.\n    </description>\n    <!--\
  \ A_21105-01 -->"
title: 'PS abgebende LEI: Dispensierinformationen – Flowtype 160/169/200/209 – Fertigarzneimittel:
  Chargeninfo'
