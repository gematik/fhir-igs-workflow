text: Das PS der verordnenden LEI SOLL den Nutzer beim Berechnen und Ausfüllen der
  Einlösefristen der einzelnen Teilverordnungen unterstützen und sinnvolle Abstände
  zur Auswahl anbieten (z.B. quartalsweise, nach Ende der berechneten Reichweite,
  etc.). Eine manuelle Änderung der Einlösefristen MUSS einfach möglich sein (z.B.
  über Auswahl des Datums über einen Kalender).
title: 'PS verordnende LEI: UX - MVO - Unterstützung bei Einlösefristen'
