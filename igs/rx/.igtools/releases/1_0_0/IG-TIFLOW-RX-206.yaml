text: "Der E-Rezept-Fachdienst MUSS für den Anwendungsfall \"E-Rezept einer Apotheke\
  \ zuweisen\" Nachrichten mit der Datenstruktur gemäß der Tabelle in der contentString-Eigenschaft\
  \ des GEM_ERP_PR_Communication_DispReq-Profils unterstützen. \n     \n     <table>\n\
  \  <thead>\n    <tr>\n      <th>Attribut</th>\n      <th>verpflichtend</th>\n  \
  \    <th>Beschreibung</th>\n      <th>zulässige Werte</th>\n      <th>Beispiel</th>\n\
  \    </tr>\n  </thead>\n  <tbody>\n    <tr>\n      <td>version</td>\n      <td>ja</td>\n\
  \      <td>Gibt die Version des JSON an. Aktuell immer 3. Kann im weiteren Lebenszyklus\
  \ verändert werden.</td>\n      <td>nummerisch, bis zu 6 Stellen</td>\n      <td>3</td>\n\
  \    </tr>\n    <tr>\n      <td>communicationType</td>\n      <td>ja</td>\n    \
  \  <td>Beschreibt die Art der Nachricht.</td>\n      <td>order, text</td>\n    \
  \  <td>order</td>\n    </tr>\n    <tr>\n      <td>supplyOptionsType</td>\n     \
  \ <td>Falls communicationType = order: ja<br>Falls communicationType = text: verboten</td>\n\
  \      <td>Wird gemäß des Servicerequests gesetzt, den der Nutzer wählt. Die für\
  \ den Nutzer verfügbaren Services sind für die jeweilige Apotheke im FHIR-VZD hinterlegt.</td>\n\
  \      <td>onPremise, shipment, delivery</td>\n      <td>onPremise</td>\n    </tr>\n\
  \    <tr>\n      <td>firstname</td>\n      <td>Falls communicationType = order und\
  \ supplyOptionsType = delivery oder shipment: ja<br>Ansonsten: nein</td>\n     \
  \ <td>Vorname des Versicherten bzw. Lieferungsempfänger</td>\n      <td>45 Stellen</td>\n\
  \      <td>Maximilian</td>\n    </tr>\n    <tr>\n      <td>lastname</td>\n     \
  \ <td>Falls communicationType = order und supplyOptionsType = delivery oder shipment:\
  \ ja<br>Ansonsten: nein</td>\n      <td>Name des Versicherten bzw. Lieferungsempfänger.</td>\n\
  \      <td>45 Stellen</td>\n      <td>Dr. von Muster</td>\n    </tr>\n    <tr>\n\
  \      <td>address</td>\n      <td>Falls communicationType = order und supplyOptionsType\
  \ = delivery oder shipment: ja<br>Ansonsten: nein</td>\n      <td>Strasse und Hausnummer\
  \ des Versicherten bzw. Lieferungsempfänger</td>\n      <td>3-100 Stellen</td>\n\
  \      <td>Bundesallee 312</td>\n    </tr>\n    <tr>\n      <td>postcode</td>\n\
  \      <td>Falls communicationType = order und supplyOptionsType = delivery oder\
  \ shipment: ja<br>Ansonsten: nein</td>\n      <td>PLZ des Versicherten bzw. Lieferungsempfänger</td>\n\
  \      <td>3-10 Stellen</td>\n      <td>12345</td>\n    </tr>\n    <tr>\n      <td>city</td>\n\
  \      <td>Falls communicationType = order und supplyOptionsType = delivery oder\
  \ shipment: ja<br>Ansonsten: nein</td>\n      <td>Ort des Versicherten bzw. Lieferungsempfänger</td>\n\
  \      <td>2-100 Stellen</td>\n      <td>Berlin</td>\n    </tr>\n    <tr>\n    \
  \  <td>country</td>\n      <td>Falls communicationType = order und supplyOptionsType\
  \ = delivery oder shipment: ja<br>Ansonsten: nein</td>\n      <td>Land des Versicherten\
  \ bzw. Lieferungsempfänger</td>\n      <td>ISO 3166-1 Alpha-2 Code</td>\n      <td>DE</td>\n\
  \    </tr>\n    <tr>\n      <td>hint</td>\n      <td>Falls communicationType = text:\
  \ verboten<br>Ansonsten: nein</td>\n      <td>Lieferanweisung, die der Nutzer mit\
  \ angeben kann.</td>\n      <td>0-100 Stellen</td>\n      <td>Bitte im Morsecode\
  \ klingeln: -.-.</td>\n    </tr>\n    <tr>\n      <td>text</td>\n      <td>Falls\
  \ communicationType = text: ja<br>Ansonsten: nein</td>\n      <td>Zusätzliche Anmerkungen\
  \ des Nutzers zur Bestellung.</td>\n      <td>0-800 Stellen, keine URL</td>\n  \
  \    <td></td>\n    </tr>\n    <tr>\n      <td>phone</td>\n      <td>Falls communicationType\
  \ = order: ja<br>Ansonsten: nein</td>\n      <td>Telefonnummer. E-164 Format, jedoch\
  \ anstelle des „+\" mit „00\" / rein nummerisch.</td>\n      <td>32 Stellen</td>\n\
  \      <td>004916094858168</td>\n    </tr>\n    <tr>\n      <td>email</td>\n   \
  \   <td>nein</td>\n      <td>E-Mail-Adresse des Nutzers. Format mit @ und Punkt.</td>\n\
  \      <td>0-70 Stellen, RFC-5322-konforme E-Mail-Adresse</td>\n      <td>max@musterfrau.de</td>\n\
  \    </tr>\n    <tr>\n      <td>transactionID</td>\n      <td>ja</td>\n      <td>Dient\
  \ dazu, Nachrichten einer Transaktion zuordnen zu können.</td>\n      <td>36 Stellen,\
  \ UUID</td>\n      <td>8196b610-9b77-47ab-936e-362cd92ef2aa</td>\n    </tr>\n  </tbody>\n\
  </table>\n<div><figcaption><strong>Tabelle: </strong>E-Rezept einer Apotheke zuweisen</figcaption></div>"
title: 'E-Rezept-Fachdienst: Nachrichtenaustausch - E-Rezept einer Apotheke zuweisen
