text: "<description>\n        Der E-Rezept-Fachdienst MUSS beim Aktivieren eines Tasks\
  \ mittels HTTP-POST-Operation über /Task/&lt;id&gt;/$activate die Operation mit\
  \ dem Fehlercode 400 abbrechen, wenn die Verordnung nicht als Mehrfachverordnung\
  \ (MedicationRequest.extension:Mehrfachverordnung.extension:Kennzeichen = false)\
  \ gekennzeichnet ist, aber eine Extension Nummerierung oder Zeitraum enthält, weil\
  \ normale Verordnungen keine MVO-Angaben enthalten dürfen.\n    </description>\n\
  \    <!-- A_22631 -->"
title: E-Rezept-Fachdienst - Task aktivieren - Mehrfachverordnung - Unzulässige Angaben
