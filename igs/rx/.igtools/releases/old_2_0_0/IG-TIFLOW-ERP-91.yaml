text: "Der TI-Flow-Fachdienst MUSS beim Zugriff auf einen Task mittels HTTP-POST-Operation\
  \ über /Task/&#60;id&#62;/$activate prüfen und, wenn die Verordnung als Mehrfachverordnung\
  \ (MedicationRequest.extension:Mehrfachverordnung.extension:Kennzeichen = true)\
  \ gekennzeichnet und der Flowtype ungleich 160, 169, 200 oder 209 ist, die Operation\
  \ mit dem folgenden Fehler:\n <table id=\"error-code\" style=\"border: 1px solid\
  \ black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n <td>400 - Bad\
  \ Request</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n </tr>\n <tr>\n\
  \ <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n <td>TIFLOW_EREZEPT_MVO_FLOWTYPE_INVALID</td>\n\
  \ </tr>\n <tr>\n <th>Details Text</th>\n <td>-</td>\n </tr>\n </table> \n abbrechen,\
  \ weil Mehrfachverordnungen nur für die Verordnungen von apothekenpflichtigen Arzneimittel\
  \ (kein BtM, kein T-Rezept) zulässig sind."
title: TI-Flow-Fachdienst - Task aktivieren - Mehrfachverordnung - zulässige Flowtype
version: 1
