text: "Der TI-Flow-Fachdienst MUSS beim Aufruf der HTTP-GET-Operation auf einen einzelnen\
  \ /Task/&lt;id&gt; durch einen Versicherten, wenn Task.extension:flowType = 169\
  \ oder 209 und der zeta-user-info.identifier des Nutzers (KVNR) ungleich der KVNR\
  \ in Task.for ist, die Operation mit dem folgenden Fehler:\n <table id=\"error-code\"\
  \ style=\"border: 1px solid black; border-collapse: collapse;\">\n <tr>\n <th>HTTP-Code</th>\n\
  \ <td>403 - Forbidden</td>\n </tr>\n <tr>\n <th>Severity</th>\n <td>error</td>\n\
  \ </tr>\n <tr>\n <th>Code</th>\n <td>invalid</td>\n </tr>\n <tr>\n <th>Details Code</th>\n\
  \ <td>SVC_IDENTITY_MISMATCH</td>\n </tr>\n <tr>\n <th>Details Text</th>\n <td>Identity\
  \ mismatch: Access token or x-insurantid header does not match FHIR data (Telematik-ID\
  \ / KVNR)</td>\n </tr>\n </table> \n abbrechen."
title: TI-Flow-Fachdienst - Task abrufen - Flowtype 169/209 - Nicht verfügbar bei
  KVNR-Mismatch
version: 1
